# agent-orchestrator domain registry.
#
# Maps file paths (glob patterns) to named domains. Two PRs that touch
# files in the same domain will collide at spawn time.
#
# Pattern syntax: fnmatch globs. Leading "./" is stripped before matching.

domains:
  skeptic-core:
    advisory: true
    paths:
      - "packages/core/src/skeptic-reviewer.ts"
      - "packages/core/src/prompt-builder.ts"
      - "packages/core/src/config.ts"
    owners:
      - "@core"

  skeptic-cli:
    advisory: true
    paths:
      - "packages/cli/src/commands/skeptic.ts"
      - "packages/cli/src/commands/skeptic/*.ts"
      - "packages/cli/src/program.ts"
    owners:
      - "@core"

  core-runtime:
    advisory: true
    paths:
      - "packages/core/src/session*.ts"
      - "packages/core/src/lifecycle*.ts"
      - "packages/core/src/runtime*.ts"
    owners:
      - "@core"

  core-plugins:
    advisory: true
    paths:
      - "packages/core/src/plugin*.ts"
      - "packages/core/src/types.ts"
    owners:
      - "@core"

  core-review:
    advisory: true
    paths:
      - "packages/core/src/review*.ts"
      - "packages/core/src/merge-gate.ts"
      - "packages/core/src/terminal-guard.ts"
      - "packages/core/src/no-delta-watchdog.ts"
    owners:
      - "@review"

  core-gh:
    advisory: true
    paths:
      - "packages/core/src/gh-*.ts"
      - "packages/core/src/auto-resolve-threads.ts"
    owners:
      - "@integrations"

  core-messaging:
    advisory: true
    paths:
      - "packages/core/src/event-bus.ts"
      - "packages/core/src/slack*.ts"
      - "packages/core/src/mcp*.ts"
      - "packages/core/src/webhook*.ts"
    owners:
      - "@integrations"

  agent-plugins:
    advisory: true
    paths:
      - "packages/plugins/agent-*/**/*.ts"
    owners:
      - "@agents"

  runtime-plugins:
    advisory: true
    paths:
      - "packages/plugins/runtime-*/**/*.ts"
    owners:
      - "@infra"

  tracker-plugins:
    advisory: true
    paths:
      - "packages/plugins/tracker-*/**/*.ts"
    owners:
      - "@trackers"

  notifier-plugins:
    advisory: true
    paths:
      - "packages/plugins/notifier-*/**/*.ts"
    owners:
      - "@notifiers"

  scm-plugins:
    advisory: true
    paths:
      - "packages/plugins/scm-*/**/*.ts"
    owners:
      - "@scm"

  poller-plugins:
    advisory: true
    paths:
      - "packages/plugins/poller-*/**/*.ts"
    owners:
      - "@pollers"

  lock-plugins:
    advisory: true
    paths:
      - "packages/plugins/area-lock/**/*.ts"
    owners:
      - "@core"

  ci-workflows:
    advisory: true
    paths:
      - ".github/workflows/*.yml"
      - ".github/workflows/*.yaml"
    owners:
      - "@infra"

  docs:
    advisory: true
    paths:
      - "docs/*.md"
      - "README.md"
      - "ARCHITECTURE.md"
