# Gitleaks configuration for Agent Orchestrator
# Prevents accidental commits of secrets, API keys, tokens, etc.

title = "Agent Orchestrator Secret Scanning"

# Use all default gitleaks rules
[extend]
useDefault = true

# Allowlist to ignore false positives
[allowlist]
description = "Allowlisted patterns"

# Historical commits containing placeholder tokens committed by upstream contributors
commits = [
  "0393ab70a83e090883895d2168aa39a76f997ec8",
]

paths = [
  "node_modules/",
  "dist/",
  ".next/",
  "coverage/",
  "pnpm-lock.yaml",
  # Documentation files with intentional placeholder tokens
  "SECURITY\\.md",
  "examples/README\\.md",
  "docs/SECURITY-AUDIT-SUMMARY\\.md",
  "docs/DEVELOPMENT\\.md",
]

regexes = [
  # Environment variable references
  "\\$\\{[A-Z_]+\\}",

  # Placeholder values
  "your-api-key-here",
  "your-token-here",
  "example\\.com",

  # Known placeholder tokens in doc examples (SECURITY.md, agent-orchestrator.yaml)
  "lin_api_[a-zA-Z0-9]{20,}",
  "ghp_[a-zA-Z0-9]{36}",
  "sk-[a-zA-Z0-9]{32,}",
]
