# Gitleaks configuration for Agent Orchestrator
# Prevents accidental commits of secrets, API keys, tokens, etc.

title = "Agent Orchestrator Secret Scanning"

# Use all default gitleaks rules
[extend]
useDefault = true

# Allowlist to ignore false positives
[allowlist]
description = "Allowlisted patterns"

# Historical commits containing placeholder tokens committed by upstream contributors
commits = [
  "0393ab70a83e090883895d2168aa39a76f997ec8",
  # False positives: test data and docs with placeholder keys
  "656290f8af78d1c244094a453ff4b019a32ef8f2",
  "6ca0dc83f8ad348240ea5839bc090b2512c578c1",
  "7e7d9ab47ff0803dfc7a5d490da31c190915bd32",
  # False positive: test assertion containing string that matches aws-access-token pattern
  "fc7d76ad54d6a7350de0fca298a1294ce8a1f3a2",
]

paths = [
  "node_modules/",
  "dist/",
  ".next/",
  "coverage/",
  "pnpm-lock.yaml",
  # Documentation files with intentional placeholder tokens
  "SECURITY\\.md",
  "examples/README\\.md",
  "docs/SECURITY-AUDIT-SUMMARY\\.md",
  "docs/DEVELOPMENT\\.md",
]

regexes = [
  # Environment variable references
  "\\$\\{[A-Z_]+\\}",

  # Placeholder values
  "your-api-key-here",
  "your-token-here",
  "example\\.com",

  # Canonical AWS-published example access key ID (safe placeholder; see AWS docs)
  "AKIAIOSFODNN7EXAMPLE",
]
