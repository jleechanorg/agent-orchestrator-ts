# Aggressive automation with auto-merge
# Automatically merges approved PRs with passing CI

dataDir: ~/.agent-orchestrator
worktreeDir: ~/.worktrees

# -----------------------------------------------------------------------------
# Option A: Global auto-merge — applies to ALL projects unless overridden
# This is the simplest way to enable auto-merge across the board.
# -----------------------------------------------------------------------------
# autoMerge: true

projects:
  my-app:
    repo: owner/my-app
    path: ~/my-app
    defaultBranch: main

    # Option B: Per-project auto-merge — only enables for this project.
    # This overrides the global autoMerge setting for this project.
    autoMerge: true

    # Option C: Per-reaction override (equivalent to Option B).
    # Use this when you want auto-merge for ONLY the approved-and-green event,
    # not other reactions. Also works at the global level (reactions: {}).
    # reactions:
    #   approved-and-green:
    #     auto: true
    #     action: auto-merge

# Global reactions
reactions:
  # Auto-retry CI failures up to 3 times
  ci-failed:
    auto: true
    action: send-to-agent
    retries: 3

  # Auto-address review comments
  changes-requested:
    auto: true
    action: send-to-agent
    escalateAfter: 1h # Notify human if not resolved in 1 hour

  # Notify when agent is stuck
  agent-stuck:
    threshold: 10m
    action: notify
    priority: urgent
