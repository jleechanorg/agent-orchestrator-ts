# Aggressive automation with auto-merge
# Automatically merges approved PRs with passing CI

dataDir: ~/.agent-orchestrator
worktreeDir: ~/.worktrees

# bd-n047: Centralized auto-merge defaults — applied to all projects.
# Can be overridden per-project via projects.<projectId>.autoMerge.enabled.
defaults:
  autoMerge:
    enabled: true
    waitSeconds: 300      # Wait 5 minutes for CI before GitHub auto-merges
    mergeMethod: squash

projects:
  my-app:
    repo: owner/my-app
    path: ~/my-app
    defaultBranch: main

    # Enable auto-merge for this project (inherits waitSeconds/mergeMethod from defaults)
    # Note: autoMerge settings go at the project level, not inside reactions
    reactions:
      approved-and-green:
        auto: true
        action: auto-merge

# Global reactions
reactions:
  # Auto-retry CI failures up to 3 times
  ci-failed:
    auto: true
    action: send-to-agent
    retries: 3

  # Auto-address review comments
  changes-requested:
    auto: true
    action: send-to-agent
    escalateAfter: 1h # Notify human if not resolved in 1 hour

  # Notify when agent is stuck
  agent-stuck:
    threshold: 10m
    action: notify
    priority: urgent
