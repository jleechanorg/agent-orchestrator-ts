name: Skeptic Cron

# master logic managed by jleechanorg/agent-orchestrator-ts
# thin-caller implementation to ensure auto-updates of GHA logic.

on:
  schedule:
    # Hourly — lifecycle-worker is the primary dispatch mechanism; this is a
    # backup catchup for repos where the lifecycle-worker is not running.
    - cron: "0 * * * *"
  workflow_dispatch:
  push:
    branches-ignore:
      - "**"

jobs:
  skeptic_cron:
    uses: jleechanorg/agent-orchestrator-ts/.github/workflows/skeptic-cron-reusable.yml@main
    with:
      # Default: use self-hosted 'mikey' runner for cron/eval.
      runner_labels: ${{ vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","self-hosted-mikey"]' }}
    secrets: inherit
