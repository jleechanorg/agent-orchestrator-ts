name: Skeptic Gate

# master logic managed by jleechanorg/agent-orchestrator-ts
# thin-caller implementation to ensure auto-updates of GHA logic.

on:
  pull_request:
    types: [opened, synchronize, edited, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number"
        required: true
        type: string
      head_sha:
        description: "PR head commit SHA"
        required: true
        type: string

concurrency:
  group: green-gate-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

permissions:
  pull-requests: write
  issues: write
  contents: read
  statuses: read
  checks: read

jobs:
  skeptic_gate:
    uses: jleechanorg/agent-orchestrator-ts/.github/workflows/skeptic-gate-reusable.yml@main
    with:
      pr_number: ${{ inputs.pr_number || github.event.pull_request.number }}
      head_sha: ${{ inputs.head_sha || github.event.pull_request.head.sha }}
      runner_labels: ${{ vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","claude"]' }}
    secrets: inherit
