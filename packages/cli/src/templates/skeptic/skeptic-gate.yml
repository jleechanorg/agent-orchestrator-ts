name: Skeptic Gate

# master logic managed by jleechanorg/agent-orchestrator
# thin-caller implementation to ensure auto-updates of GHA logic.

on:
  pull_request:
    types: [opened, synchronize, edited, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number"
        required: true
        type: string
      head_sha:
        description: "PR head commit SHA"
        required: true
        type: string

concurrency:
  group: green-gate-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  skeptic_gate:
    uses: jleechanorg/agent-orchestrator/.github/workflows/skeptic-gate-reusable.yml@main
    with:
      pr_number: ${{ inputs.pr_number || github.event.pull_request.number }}
      # Fork-aware runner: use ubuntu-latest for forked PRs to avoid self-hosted exposure.
      fork: ${{ github.event.pull_request.head.repo.fork == true }}
      runner_labels: ${{ vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","claude"]' }}
      runner_labels_fork: '["ubuntu-latest"]'
    secrets:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
