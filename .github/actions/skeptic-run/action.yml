# =============================================================================
# Composite action: Run skeptic CLI and parse verdict
# Used by skeptic-gate.yml
# =============================================================================
name: "Run Skeptic"
description: "Run skeptic CLI with --dry-run, output verdict to GITHUB_OUTPUT"
inputs:
  pr_number:
    description: "PR number"
    required: true
  github_token:
    description: "GitHub token value"
    required: true
  anthropic_api_key:
    description: "ANTHROPIC_API_KEY value"
    default: ""
  openai_api_key:
    description: "OPENAI_API_KEY value"
    default: ""
outputs:
  verdict:
    description: "PASS | FAIL | UNKNOWN | SKIPPED"
    value: ${{ steps.run.outputs.verdict || steps.check.outputs.verdict }}
runs:
  using: composite
  steps:
    # Note: outputs.verdict prefers steps.run (PASS/FAIL/UNKNOWN) over
    # steps.check (SKIPPED/RUNNING) via GitHub Actions output interpolation.
    # See: value: ${{ steps.run.outputs.verdict || steps.check.outputs.verdict }}
    - name: Check API key and set verdict
      id: check
      shell: bash
      run: |
        # bd-ru7d: removed ANTHROPIC_API_KEY-only gate — skeptic runs regardless
        # of API key availability. Codex uses OAuth (no key needed), Claude falls
        # back when ANTHROPIC_API_KEY is set. If neither is available, skeptic
        # outputs VERDICT: SKIPPED from the CLI itself.
        if [ -z "${{ inputs.anthropic_api_key }}" ] && [ -z "${{ inputs.openai_api_key }}" ]; then
          echo "verdict=SKIPPED" >> "$GITHUB_OUTPUT"
          echo "VERDICT: SKIPPED — No API keys configured (ANTHROPIC_API_KEY or OPENAI_API_KEY required)" > skeptic-output.txt
          echo "SKIPPED: No API keys configured"
          exit 0
        fi
        echo "verdict=RUNNING" >> "$GITHUB_OUTPUT"

    - name: Run Skeptic
      id: run
      if: steps.check.outputs.verdict == 'RUNNING'
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        OPENAI_API_KEY: ${{ inputs.openai_api_key }}
      shell: bash
      run: |
        # bd-skp2: capture exit code explicitly (removed misleading || true)
        skeptic_exit=0
        (node packages/cli/dist/index.js skeptic verify \
          --pr ${{ inputs.pr_number }} \
          --dry-run \
          > skeptic-output.txt 2>&1) || skeptic_exit=$?
        cat skeptic-output.txt

        # Handle SKIPPED first — infra failures (Codex/Claude unavailable) emit VERDICT: SKIPPED
        if grep -qi "VERDICT: SKIPPED" skeptic-output.txt; then
          echo "verdict=SKIPPED" >> "$GITHUB_OUTPUT"
        elif grep -qi "VERDICT: FAIL" skeptic-output.txt; then
          echo "verdict=FAIL" >> "$GITHUB_OUTPUT"
          exit 1
        elif grep -qi "VERDICT: PASS" skeptic-output.txt; then
          echo "verdict=PASS" >> "$GITHUB_OUTPUT"
          exit 0
        else
          echo "verdict=UNKNOWN" >> "$GITHUB_OUTPUT"
          echo "" >> skeptic-output.txt
          echo "CONCLUSION: UNKNOWN — could not parse VERDICT (failing closed)" >> skeptic-output.txt
          echo "Exit code from skeptic: $skeptic_exit" >> skeptic-output.txt
          exit 1
        fi

    - name: Upload findings artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: skeptic-pr-${{ inputs.pr_number }}
        path: skeptic-output.txt
        retention-days: 7
