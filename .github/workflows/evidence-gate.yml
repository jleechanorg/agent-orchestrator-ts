name: Evidence Gate

on:
  pull_request:
    types: [opened, synchronize, edited, reopened]
  workflow_dispatch:

# Do not cancel in-progress runs: a second event (e.g. push + Bugbot PR-body edit)
# would cancel the first job; GitHub surfaces that as a failed check on the same SHA.
concurrency:
  group: evidence-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

permissions:
  pull-requests: read  # PR body, merged status, and gh api pulls/.../files (bd-vidcap frontend detection)
  contents: read

jobs:
  evidence-gate:
    name: Evidence Gate
    # Fork PRs use ubuntu-latest to avoid running untrusted code on self-hosted infrastructure.
    # Also uses ubuntu-latest when SELF_HOSTED_DISABLED var is set (self-hosted runners offline).
    runs-on: ${{ vars.SELF_HOSTED_DISABLED == 'true' && 'ubuntu-latest'
              || (github.event.pull_request.head.repo.fork && github.event_name == 'pull_request'
                  && 'ubuntu-latest'
                  || fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","Linux","ARM64","agent-orchestrator"]')) }}
    # bd-fisn: Skip entirely when PR is merged or closed — a merged PR stops receiving
    # pull_request events so a stale failed check run cannot be overwritten. Instead of
    # leaving a permanent failure that blocks the PR from showing green, we exit 0.
    # Evidence gate is a pre-merge gate; post-merge it has no function.
    if: github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == false && github.event.action != 'closed')
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4.1.1
        with:
          # Fix 3 (bd-7s0d): full history so base...head diff for claim-floor is available
          fetch-depth: 0

      - name: Resolve PR context
        id: pr-context
        run: bash scripts/resolve-pr-context.sh

      - name: Write PR body to temp file
        id: pr-body
        env:
          PR_BODY: ${{ steps.pr-context.outputs.pr_body }}
        run: |
          # Use the PR body from the workflow context — available without auth scope
          # Skip gracefully if PR body is empty (valid GitHub state — no evidence bundle)
          printf '%s' "$PR_BODY" > "$RUNNER_TEMP/pr_body.txt"
          echo "Body fetched: ${#PR_BODY} chars"
          if [ ${#PR_BODY} -eq 0 ]; then
            echo "PR body is empty — treating as no evidence bundle (workflow skips)"
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for evidence bundle in PR body
        id: check
        run: |
          # If body was empty, skip was already set
          if [ "${{ steps.pr-body.outputs.skip }}" = "true" ]; then
            echo "Skipping — empty PR body"
            exit 0
          fi

          BODY=$(cat "$RUNNER_TEMP/pr_body.txt")

          if printf '%s' "$BODY" | grep -qi '^[[:space:]]*## Evidence'; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail when no Evidence section found
        # This step MUST fail when no Evidence section is present. Exiting 0 (skipping)
        # enables a silent bypass of the merge gate: workers omit the ## Evidence section
        # from the PR body, the workflow passes, and gh pr merge --auto merges without
        # CodeRabbit approval or any human review. Branch protection has no required checks,
        # so the evidence gate is the only enforcement. Failing hard here is the correct
        # behavior — it prevents unevidenced PRs from sneaking through the merge gate.
        if: steps.check.outputs.found == 'false'
        run: |
          echo "ERROR: No ## Evidence section found in PR body."
          echo "The evidence gate MUST fail when Evidence section is absent —"
          echo "skipping allows workers to bypass the merge gate by omitting Evidence."
          echo "Fix: add a ## Evidence section with a Claim class and verdict to the PR body."
          exit 1

      # Shared: extract and normalize claim class once, write to RUNNER_TEMP for reuse.
      # CR bd-2oko nitpick fix: eliminates duplication across Validate bundle format,
      # Validate PR-lifecycle-e2e proofs, and Enforce strong artifact evidence steps.
      - name: Extract and normalize claim class
        id: claim
        if: steps.check.outputs.found == 'true'
        run: |
          BODY=$(cat "$RUNNER_TEMP/pr_body.txt")

          # Extract claim class — normalize to lowercase short form.
          # Supports: **Claim class**: value  (colon inside bold, space after colon)
          # and list-bullet format "- **Claim class**: ...".
          # tr ' ' '-' converts "Pipeline E2E" → "pipeline-e2e".
          # FIX bd-ao357: strip ** FIRST with tr -d '*', then use plain BRE (no asterisks in pattern).
          # In ERE, \*\* means "one-or-more *" not two literal *, so the ERE fix didn't work.
          # BRE sed's \*\* means "escaped * = one literal *", so the BRE fix also didn't work.
          # Solution: remove all asterisks first with tr -d '*', then strip label with plain sed.
          CLAIM=$(printf '%s' "$BODY" \
            | grep -i '\*\*Claim class' | grep -v '^- ' | head -1 \
            | tr -d '*' \
            | sed 's/.*Claim class: *//I' \
            | sed 's/(.*//' \
            | tr '[:upper:]' '[:lower:]' \
            | tr ' ' '-' | tr -d '\t' \
            | sed 's/^[ \t-]*//;s/[ \t-]*$//')

          # Fallback: list-bullet format
          if [ -z "$CLAIM" ]; then
            CLAIM=$(printf '%s' "$BODY" \
              | grep -i '^-.*\*\*Claim class' | head -1 \
              | tr -d '*' \
              | sed 's/.*Claim class: *//I' \
              | sed 's/(.*//' \
              | tr '[:upper:]' '[:lower:]' \
              | tr ' ' '-' | tr -d '\t' \
              | sed 's/^[ \t-]*//;s/[ \t-]*$//')
          fi

          # Normalize CLAUDE.md long forms to canonical short forms
          case "$CLAIM" in
            unit-test-coverage|unit-test) CLAIM="unit" ;;
            integration-test) CLAIM="integration" ;;
            pr-lifecycle) CLAIM="pr-lifecycle-e2e" ;;
            merge-gate-green) CLAIM="merge-gate" ;;
          esac

          echo "Claim class: $CLAIM"
          echo "claim=$CLAIM" >> "$GITHUB_OUTPUT"

      # Fix 3 (bd-7s0d): claim class floor — .ts/.js/.py/.go/.sh/.json changes cannot use
      # documentation-only or unit unless **Claim floor override** carries a non-empty justification.
      - name: Enforce claim class floor for code changes
        if: steps.check.outputs.found == 'true'
        run: |
          BODY=$(cat "$RUNNER_TEMP/pr_body.txt")
          CLAIM="${{ steps.claim.outputs.claim }}"
          BASE_SHA="${{ steps.pr-context.outputs.base_sha }}"
          HEAD_SHA="${{ steps.pr-context.outputs.head_sha }}"

          case "$CLAIM" in
            documentation-only|unit) ;;
            *)
              echo "Claim class '$CLAIM' — claim floor not applicable (not unit/documentation-only)"
              exit 0
              ;;
          esac

          EVIDENCE_SECTION=$(printf '%s' "$BODY" | sed -n '/^[[:space:]]*##[[:space:]]*[Ee]vidence/,$p')

          DIFF_NAMES=$(git diff --name-only "${BASE_SHA}...${HEAD_SHA}" 2>/dev/null || true)
          if [ -z "$DIFF_NAMES" ]; then
            echo "WARN: empty diff for ${BASE_SHA}...${HEAD_SHA} — skipping claim floor"
            exit 0
          fi

          if ! printf '%s\n' "$DIFF_NAMES" | grep -qiE '\.(ts|js|jsx|tsx|py|go|sh|json|cjs|mjs|vue|svelte)$'; then
            echo "Claim floor PASS: no code file changes in diff"
            exit 0
          fi

          LINE=$(printf '%s' "$EVIDENCE_SECTION" | grep -i 'Claim floor override' | head -1 || true)
          JUST=$(printf '%s' "$LINE" | sed 's/.*[Cc]laim floor override[^:]*:[[:space:]]*//' | tr -d '*')
          JUST=$(printf '%s' "$JUST" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          if [ -n "$JUST" ]; then
            echo "Claim floor override present with non-empty justification — PASS"
            exit 0
          fi

          echo "ERROR: Code files changed but claim class is unit/documentation-only. Add **Claim floor override**: <justification> or upgrade claim class to integration+"
          exit 1

      - name: Validate PR-lifecycle-e2e required proofs
        if: steps.check.outputs.found == 'true'
        run: |
          BODY=$(cat "$RUNNER_TEMP/pr_body.txt")
          CLAIM="${{ steps.claim.outputs.claim }}"

          if [ "$CLAIM" = "pr-lifecycle-e2e" ]; then
            echo "Checking required proofs for: $CLAIM"

            # Proof 1: PR creation — must have GitHub PR URL
            if ! printf '%s' "$BODY" | grep -qiE 'https://github\.com/[^/]+/[^/]+/pull/[0-9]+'; then
              echo "ERROR: Missing PR creation URL in evidence bundle"
              exit 1
            fi
            echo "PR creation proof: PASS"

            # Proof 2: Transition — require structured evidence of CI/review activity
            if ! printf '%s' "$BODY" | grep -qiE '(transition proof|CI timeline|review timeline|check run|workflow run|codecov|status check)'; then
              echo "ERROR: Missing transition proof (CI/review timeline) in evidence bundle"
              exit 1
            fi
            echo "Transition proof: PASS"

            # Proof 3: Merge outcome — structured phrase required
            if ! printf '%s' "$BODY" | grep -qiE '(commit SHA|mergeable|merged|merge commit)'; then
              echo "ERROR: Missing merge outcome proof in evidence bundle"
              exit 1
            fi
            echo "Merge outcome proof: PASS"

            # Proof 4: Cleanup — structured phrase required
            if ! printf '%s' "$BODY" | grep -qiE '(cleanup proof|branch.*deleted|session.*kill|worktree.*remov)'; then
              echo "ERROR: Missing cleanup proof in evidence bundle"
              exit 1
            fi
            echo "Cleanup proof: PASS"

            echo "All 4 required proofs present for $CLAIM"
          elif [ "$CLAIM" = "merge-gate" ]; then
            echo "Checking required proofs for: $CLAIM (merge-gate = all 7 green conditions)"
            # merge-gate requires evidence of all 7 merge-gate conditions per CLAUDE.md:
            # 1. CI green
            if ! printf '%s' "$BODY" | grep -qiE '(CI (passing|success|green)|checks (passing|success|green))'; then
              echo "ERROR: Missing CI-green proof in merge-gate evidence"
              exit 1
            fi
            echo "Condition 1/7 (CI green): PASS"

            # 2. No merge conflicts
            if ! printf '%s' "$BODY" | grep -qiE '(mergeable|MERGEABLE|conflict-free|no conflict)'; then
              echo "ERROR: Missing mergeable-state proof in merge-gate evidence"
              exit 1
            fi
            echo "Condition 2/7 (no merge conflicts): PASS"

            # 3. CR approved
            if ! printf '%s' "$BODY" | grep -qiE '(CodeRabbit APPROVED|CR APPROVED|crab.*approved)'; then
              echo "ERROR: Missing CR-approved proof in merge-gate evidence"
              exit 1
            fi
            echo "Condition 3/7 (CR approved): PASS"

            # 4. Bugbot finished
            if ! printf '%s' "$BODY" | grep -qiE '(Bugbot finished|Cursor Bugbot|bugbot (finished|neutral|success))'; then
              echo "ERROR: Missing Bugbot-finished proof in merge-gate evidence"
              exit 1
            fi
            echo "Condition 4/7 (Bugbot finished): PASS"

            # 5. All threads resolved
            if ! printf '%s' "$BODY" | grep -qiE '(all threads resolved|threads resolved|no unresolved threads)'; then
              echo "ERROR: Missing all-threads-resolved proof in merge-gate evidence"
              exit 1
            fi
            echo "Condition 5/7 (all threads resolved): PASS"

            # 6. Evidence review passed
            if ! printf '%s' "$BODY" | grep -qiE '(evidence review passed|/er PASS|evidence-gate PASS)'; then
              echo "ERROR: Missing evidence-review-passed proof in merge-gate evidence"
              exit 1
            fi
            echo "Condition 6/7 (evidence review passed): PASS"

            # Condition 7/7: Skeptic gate CI passed
            # Check both PR body (evidence bundle) AND skeptic verdict comments.
            # The verdict may be in the evidence bundle text OR posted by skeptic-cron
            # as a PR comment (<!-- skeptic-agent-verdict -->). Either source is valid.
            # Uses SKEPTIC_BOT_AUTHOR (defaults to jleechan2015) with github-actions[bot] fallback,
            # and selects the MOST RECENT verdict to handle FAIL-then-PASS ordering correctly.
            SKEPTIC_PASSED=false
            if printf '%s' "$BODY" | grep -qiE 'skeptic.*(verdict|gate).*pass'; then
              SKEPTIC_PASSED=true
            else
              # Fallback: check skeptic verdict comments via GitHub API
              # Honor SKEPTIC_BOT_AUTHOR (from repo vars, defaults to jleechan2015),
              # allow github-actions[bot] as fallback (when not the PR author),
              # require HTML verdict marker, and select the most recent verdict.
              SKEPTIC_BOT_AUTHOR="${{ vars.SKEPTIC_BOT_AUTHOR || 'jleechan2015' }}"
              PR_AUTHOR="${{ steps.pr-context.outputs.pr_author }}"
              SKEPTIC_COMMENT=$(
                gh api "repos/${{ github.repository }}/issues/${{ steps.pr-context.outputs.pr_number }}/comments" \
                  --paginate 2>/dev/null \
                | jq -s \
                  --arg author "$SKEPTIC_BOT_AUTHOR" \
                  --arg pr_author "$PR_AUTHOR" \
                  'add
                  | map(. + {is_gh_bot: (.user.login | ascii_downcase) == "github-actions[bot]"})
                  | map(select(
                      (
                        ((.user.login | ascii_downcase) == ($author | ascii_downcase))
                        or (
                          (.is_gh_bot == true)
                          and ((.user.login | ascii_downcase) != ($pr_author | ascii_downcase))
                        )
                      )
                      and (.body | test("<!--\\s*skeptic-agent-verdict\\s*-->"; "i"))
                      and (.body | test("VERDICT:\\s*PASS"; "i"))
                    ))
                  | sort_by(.updated_at)
                  | last.body // ""' 2>/dev/null || echo ""
              )
              if [ -n "$SKEPTIC_COMMENT" ] && printf '%s' "$SKEPTIC_COMMENT" | grep -qiE 'VERDICT:\\s*PASS'; then
                SKEPTIC_PASSED=true
              fi
            fi
            if [ "$SKEPTIC_PASSED" = "false" ]; then
              echo "ERROR: Missing Condition 7/7 (skeptic gate PASS) in evidence bundle or skeptic-agent comment"
              exit 1
            fi
            echo "Condition 7/7 (skeptic gate PASS): PASS"
            echo "All 7 merge-gate conditions verified for $CLAIM"
          else
            echo "No additional validation required for claim class: $CLAIM"
          fi

      - name: Enforce strong artifact evidence for non-unit claims
        if: steps.check.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BODY=$(cat "$RUNNER_TEMP/pr_body.txt")
          CLAIM="${{ steps.claim.outputs.claim }}"
          REQUIRES_STRONG_ARTIFACTS=false
          case "$CLAIM" in
            integration|pipeline-e2e|pr-lifecycle-e2e|merge-gate) REQUIRES_STRONG_ARTIFACTS=true ;;
          esac
          echo "requires_strong_artifacts=$REQUIRES_STRONG_ARTIFACTS"

          # bd-vidcap: detect frontend-touched paths for UI video enforcement (deterministic paths, not LLM routing).
          FRONTEND_TOUCH=false
          if [ "$REQUIRES_STRONG_ARTIFACTS" = "true" ]; then
            if ! FILES="$(gh api "repos/${{ github.repository }}/pulls/${{ steps.pr-context.outputs.pr_number }}/files" --paginate --jq '.[].filename' 2>/dev/null)"; then
              echo "ERROR: Could not list PR files (required for frontend UI media enforcement on integration+ claims)."
              exit 1
            fi
            if printf '%s' "$FILES" | grep -qiE '\.(tsx|jsx|vue|svelte)$'; then
              FRONTEND_TOUCH=true
            fi
          fi
          echo "frontend_touch=$FRONTEND_TOUCH"

          # integration + higher claims require rich artifacts; unit can use terminal evidence only.
          # CR bd-2oko fix: integration was missing from this list (let it bypass strong proof).
          if [ "$REQUIRES_STRONG_ARTIFACTS" = "true" ]; then
            # bd-ara.2: strip HTML comments before scanning for Evidence section.
            # CURSOR_SUMMARY and other bot comments appear after ## Evidence and would
            # otherwise pollute the EVIDENCE extraction (causing false failures on the
            # grep -qF label checks below).
            EVIDENCE=$(printf '%s\n' "$BODY" | awk '
              # Strip single-line HTML comment spans within lines (not whole lines).
              # Use gsub wrapped in braces to act unconditionally on every line.
              # Multi-line comment spans are handled by in_comment toggling.
              { gsub(/<!--[^>]*-->/, "") }
              # Multi-line comment: after <!-- not followed by -->, enter comment mode.
              /^[[:space:]]*<!--/ && $0 !~ /<!--[^>]*-->/ { in_comment=1; next }
              in_comment && /^[[:space:]]*-->/ { in_comment=0; next }
              in_comment { next }
              tolower($0) ~ /^[[:space:]]*##[[:space:]]+evidence([[:space:]]|$)/ { in_section=1; next }
              in_section && /^[[:space:]]*##[[:space:]]/ { exit }
              in_section { print }
            ')

            # Reject fabricated/placeholder evidence before accepting any artifact.
            # CR bd-2oko fix: placeholder checks were missing from strong-proof step.
            if printf '%s' "$EVIDENCE" | grep -qiE '\bsimulated\b'; then
              echo "ERROR: Evidence contains 'simulated' — fabricated output is not valid."
              exit 1
            fi
            if printf '%s' "$EVIDENCE" | grep -qiE 'https?://(www\.)?example\.com'; then
              echo "ERROR: Evidence contains example.com placeholder URL — use a real screenshot URL."
              exit 1
            fi
            if printf '%s' "$EVIDENCE" | grep -qiE '<screenshot[[:space:]]path>|<path>|<value>|\bTODO\b|\bTBD\b'; then
              echo "ERROR: Evidence contains placeholder template text — fill in real values."
              exit 1
            fi

            # 1. Repro gist: extract the **Repro gist:** line, then validate URL only on that line.
            # FIX bd-ao357+bd-ao357r2: scope to the specific label line to avoid false matches
            # from unrelated gist URLs elsewhere in the evidence section.
            HAS_GIST=false
            REPRO_LINE=$(printf '%s' "$EVIDENCE" | grep -iF '**Repro gist**:' | head -1)
            if [ -n "$REPRO_LINE" ] && printf '%s' "$REPRO_LINE" | grep -qE 'https://gist\.github\.com/[^[:space:]]+'; then
              HAS_GIST=true
            fi

            # 2. Terminal/test output: fenced code block (backtick or tilde) with a concrete
            #    test-command keyword present (pnpm, npm, pytest, vitest, go test, etc.).
            HAS_OUTPUT=false
            # FIX bd-ao357+bd-2oko: extract TTO_BLOCK scoped to **Terminal test output** section,
            # then check for fenced code block + concrete test command keywords (including bash/shell
            # scripts). Previously scanned entire EVIDENCE for fenced blocks, which could false-positive
            # on repro gist code snippets; scoping prevents that.
            TTO_BLOCK=$(printf '%s' "$EVIDENCE" | awk '
              /\*\*Terminal test output\*\*:/ { show=1 }
              show && /\*\*UI media\*\*:/ { exit }
              show { print }
            ')
            if printf '%s' "$TTO_BLOCK" | grep -q '```'; then
              # Scan the fenced block content for a concrete test command.
              # CR bd-cng3 fix: bash/sh accepted only when followed by test indicators in args.
              BLOCK=$(printf '%s' "$TTO_BLOCK" | sed -n '/```/,/```/p' | tail -n +2 | sed '$d')
              if printf '%s' "$BLOCK" | grep -qiE '\$[[:space:]]*(pnpm|npm|pytest|vitest|jest|go[[:space:]]+test|ruby[[:space:]].*test|bundle[[:space:]]exec[[:space:]]rspec|(bash|shell|sh)[[:space:]]+[^)]*(test|spec|e2e|integration))[[:space:]]'; then
                HAS_OUTPUT=true
              fi
            fi
            if [ "$HAS_OUTPUT" = "false" ] && printf '%s' "$TTO_BLOCK" | grep -q '~~~'; then
              BLOCK=$(printf '%s' "$TTO_BLOCK" | sed -n '/~~~/,/~~~/p' | tail -n +2 | sed '$d')
              if printf '%s' "$BLOCK" | grep -qiE '\$[[:space:]]*(pnpm|npm|pytest|vitest|jest|go[[:space:]]+test|ruby[[:space:]].*test|bundle[[:space:]]exec[[:space:]]rspec|(bash|shell|sh)[[:space:]]+[^)]*(test|spec|e2e|integration))[[:space:]]'; then
                HAS_OUTPUT=true
              fi
            fi
            # Also accept structured **Terminal test output**: label with an immediate URL/artifact
            # FIX bd-ao357: use grep -qF for fixed-string label checks.
            if [ "$HAS_OUTPUT" = "false" ] && printf '%s' "$TTO_BLOCK" | grep -qF '**Terminal test output**:' && printf '%s' "$TTO_BLOCK" | grep -qE 'https://[^[:space:]]+'; then
              HAS_OUTPUT=true
            fi

            # 3. Terminal media (bd-vidcap): real HTTPS URL + tmux caption; unknown artifact pattern → WARN only.
            HAS_TM_MEDIA=false
            TM_BLOCK=$(printf '%s' "$EVIDENCE" | awk '
              /\*\*Terminal media\*\*:/ { show=1 }
              show && /\*\*Terminal test output\*\*:/ { exit }
              show { print }
            ')
            if ! printf '%s' "$TM_BLOCK" | grep -qF '**Terminal media**:'; then
              echo "ERROR: Missing **Terminal media** label in evidence section."
              exit 1
            fi
            # Fix 1 (bd-cam93): integration+ must not omit URL or use N/A for Terminal media alone.
            if printf '%s' "$TM_BLOCK" | grep -qiE '\bN/A\b' && ! printf '%s' "$TM_BLOCK" | grep -qE 'https://'; then
              echo "ERROR: **Terminal media** must include an HTTPS URL for integration+ claims (not N/A)."
              exit 1
            fi
            if ! printf '%s' "$TM_BLOCK" | grep -qE 'https://[^[:space:]]+'; then
              echo "ERROR: **Terminal media** must include a real HTTPS URL for integration+ claims."
              exit 1
            fi
            TM_FIRST_URL=$(printf '%s' "$TM_BLOCK" | grep -oE 'https://[^[:space:])>]+' | head -1 | sed 's/[.,;]*$//')
            if [ -z "$TM_FIRST_URL" ]; then
              echo "ERROR: Could not extract a Terminal media HTTPS URL."
              exit 1
            fi
            if printf '%s' "$TM_FIRST_URL" | grep -qiE 'https?://(www\.)?example\.com'; then
              echo "ERROR: **Terminal media** URL must not be a placeholder (example.com)."
              exit 1
            fi
            KNOWN_TM=false
            if printf '%s' "$TM_FIRST_URL" | grep -qiE '\.(mp4|gif|cast|webm|mov)([/?#]|$)'; then KNOWN_TM=true; fi
            if [ "$KNOWN_TM" = "false" ] && printf '%s' "$TM_FIRST_URL" | grep -qiE 'gist\.github\.com'; then KNOWN_TM=true; fi
            if [ "$KNOWN_TM" = "false" ] && printf '%s' "$TM_FIRST_URL" | grep -qiE 'asciinema\.org'; then KNOWN_TM=true; fi
            if [ "$KNOWN_TM" = "false" ] && printf '%s' "$TM_FIRST_URL" | grep -qiE 'github\.com/user-attachments/assets/'; then KNOWN_TM=true; fi
            if [ "$KNOWN_TM" = "false" ]; then
              echo "::warning::bd-vidcap: Terminal media URL is not a recognized artifact pattern (.mp4, .gif, .webm, .mov, .cast, gist.github.com, asciinema.org, user-attachments). Prefer a captioned cast or video link; gate still passes."
            fi
            TM_URL_LINE=$(printf '%s' "$TM_BLOCK" | grep -n 'https://' | head -1 | cut -d: -f1)
            CAPTION_LINES=$(printf '%s' "$TM_BLOCK" | tail -n +"${TM_URL_LINE:-1}" | grep -v '^[[:space:]]*$' | grep -v '^[[:space:]]*```' | awk '{ sub(/^\*\*Terminal media\*\*:[[:space:]]*/, ""); gsub(/https:\/\/[^[:space:])>]+/, ""); print }')
            if [ -z "$CAPTION_LINES" ]; then
              echo "ERROR: Terminal media must include caption text (inline or following lines)."
              exit 1
            fi
            if ! printf '%s' "$CAPTION_LINES" | grep -qiE 'tmux|terminal'; then
              echo "ERROR: Terminal media caption must reference tmux or terminal context (not only the **Terminal media** label)."
              exit 1
            fi
            HAS_TM_MEDIA=true

            # 4. UI media: OR exact N/A text; else HTTPS image/video per claim.
            # bd-vidcap: frontend PRs require captioned UI video when UI is evidenced (ui-video-evidence).
            # Scope to UI_BLOCK (after **UI media** label) to avoid accepting Terminal media
            # URLs as satisfying the UI media requirement (copilot bd-2oko fix).
            HAS_UI_MEDIA=false
            UI_BLOCK=$(printf '%s' "$EVIDENCE" | awk '
              /\*\*UI media\*\*:/ { show=1 }
              show && /^[[:space:]]*##[[:space:]]/ { exit }
              show { print }
            ')
            if printf '%s' "$UI_BLOCK" | grep -qF '**UI media**:' && printf '%s' "$UI_BLOCK" | grep -qiE 'N/A.*no UI|N/A - no UI'; then
              HAS_UI_MEDIA=true
            elif [ "$FRONTEND_TOUCH" = "true" ]; then
              HAS_UI_VIDEO=false
              if printf '%s' "$UI_BLOCK" | grep -qiE 'https://[^[:space:]]+\.(mp4|gif|webm|mov)([[:space:]/?#]|$)'; then HAS_UI_VIDEO=true; fi
              if [ "$HAS_UI_VIDEO" = "false" ] && printf '%s' "$UI_BLOCK" | grep -qiE 'https://github\.com/user-attachments/assets/[a-f0-9-]+'; then HAS_UI_VIDEO=true; fi
              if [ "$HAS_UI_VIDEO" = "false" ] && printf '%s' "$UI_BLOCK" | grep -qiE '!\[[^]]*\]\(https://[^)]+\.(mp4|gif|webm|mov)([?#)]|$)'; then HAS_UI_VIDEO=true; fi
              if [ "$HAS_UI_VIDEO" != "true" ]; then
                echo "ERROR: Frontend-touch PRs require **UI media** captioned video URL (.mp4, .gif, .webm, .mov) or GitHub user-attachments, or exact N/A - no UI changes."
                exit 1
              fi
              if ! printf '%s' "$UI_BLOCK" | grep -qiE 'caption'; then
                echo "ERROR: Frontend-touch PR UI media must include caption text."
                exit 1
              fi
              HAS_UI_MEDIA=true
            else
              # bd-vidcap CR fix: require caption text for non-frontend UI media too,
              # for consistency with wholesome.yml and Evidence Bundle v2 docs.
              if printf '%s' "$UI_BLOCK" | grep -qiE 'https://[^[:space:]]+\.(png|jpg|jpeg|gif|webp|mp4|webm|mov)([[:space:]/?#]|$)'; then
                if ! printf '%s' "$UI_BLOCK" | grep -qiE 'caption'; then
                  echo "ERROR: Non-frontend UI media must include caption text."
                  exit 1
                fi
                HAS_UI_MEDIA=true
              elif printf '%s' "$UI_BLOCK" | grep -qiE 'https://github\.com/user-attachments/assets/[a-f0-9-]+'; then
                if ! printf '%s' "$UI_BLOCK" | grep -qiE 'caption'; then
                  echo "ERROR: Non-frontend UI media must include caption text."
                  exit 1
                fi
                HAS_UI_MEDIA=true
              elif printf '%s' "$UI_BLOCK" | grep -qiE '!\[[^]]*\]\(https://[^)]+\.(png|jpg|jpeg|gif|webp|mp4|webm|mov)([?#)]|$)'; then
                if ! printf '%s' "$UI_BLOCK" | grep -qiE 'caption'; then
                  echo "ERROR: Non-frontend UI media must include caption text."
                  exit 1
                fi
                HAS_UI_MEDIA=true
              fi
            fi

            # CR bd-357-fix: add self-validation language check for non-unit claims.
            # CLAUDE.md lines 269-273 require proof language (verified, confirmed, reproduced, etc.)
            # in addition to raw terminal output. Scoped to TTO_BLOCK to avoid false matches.
            HAS_SELF_VALIDATION=false
            if printf '%s' "$TTO_BLOCK" | grep -qiE 'verified|confirmed|reproduced|error case|test passed|test failed|all tests|results? (show|indicate|demonstrate)'; then
              HAS_SELF_VALIDATION=true
            fi

            if [ "$HAS_GIST" != "true" ] || [ "$HAS_OUTPUT" != "true" ] || [ "$HAS_TM_MEDIA" != "true" ] || [ "$HAS_UI_MEDIA" != "true" ] || [ "$HAS_SELF_VALIDATION" != "true" ]; then
              echo "ERROR: Strong evidence standard not met for claim class '$CLAIM'."
              echo "Required for non-unit claims (CR bd-2oko fix — explicit field validation restored):"
              echo "  - **Repro gist**: https://gist.github.com/... URL"
              echo "  - **Terminal media**: captioned HTTPS URL; unknown patterns get advisory WARN (bd-vidcap)"
              echo "  - **Terminal test output**: fenced code block with a concrete test command"
              echo "  - **UI media**: HTTPS media or 'N/A - no UI changes' (frontend PRs: captioned UI video)"
              echo "  - Self-validation language: verified, confirmed, reproduced, etc. (CLAUDE.md bd-357-fix)"
              echo "Detected: gist=$HAS_GIST tm_media=$HAS_TM_MEDIA test_output=$HAS_OUTPUT ui_media=$HAS_UI_MEDIA self_validation=$HAS_SELF_VALIDATION"
              exit 1
            fi

            echo "Strong evidence standard PASS for $CLAIM"
          else
            echo "Strong artifact check not required for claim class: $CLAIM"
          fi

      - name: Validate verdict is present and consistent
        if: steps.check.outputs.found == 'true'
        run: |
          BODY=$(cat "$RUNNER_TEMP/pr_body.txt")

          # Extract from "## Evidence" to EOF to avoid false matches from text that
          # appears before the Evidence section (e.g. "Previous PR's verdict: PASS"
          # in the Background or Goals sections). Extracting to EOF ensures that a
          # "## Verdict:" section header following ## Evidence is also captured.
          EVIDENCE_SECTION=$(printf '%s' "$BODY" \
            | sed -n '/^[[:space:]]*## [Ee]vidence/,$p')

          # Fallback to full body if Evidence section could not be isolated
          if [ -z "$EVIDENCE_SECTION" ]; then
            EVIDENCE_SECTION="$BODY"
          fi

          # Check for PASS verdict — scoped to Evidence section
          if printf '%s' "$EVIDENCE_SECTION" | grep -qi '[Vv]erdict.*:.*[Pp][Aa][Ss][Ss]'; then
            echo "Verdict: PASS — evidence gate passes"

          # Check for INSUFFICIENT verdict — gate passes; missing proof correctly triggers this
          elif printf '%s' "$EVIDENCE_SECTION" | grep -qi '[Vv]erdict.*:.*[Ii][Nn][Ss][Uu][Ff][Ff][Ii][Cc][Ii][Ee][Nn][Tt]'; then
            echo "Verdict: INSUFFICIENT — gate passes (INSUFFICIENT is a valid fail-closed verdict)"

          # Check for FAIL verdict — gate passes; claiming FAIL with a present bundle is contradictory
          elif printf '%s' "$EVIDENCE_SECTION" | grep -qi '[Vv]erdict.*:.*[Ff][Aa][Ii][Ll]'; then
            echo "Verdict: FAIL with present bundle — contradiction; gate passes but this bundle should be re-examined"

          # Check for SKIPPED verdict — terminal state, gate passes
          elif printf '%s' "$EVIDENCE_SECTION" | grep -qi '[Vv]erdict.*:.*[Ss][Kk][Ii][Pp][Pp][Ee][Dd]'; then
            echo "Verdict: SKIPPED — evidence gate passes"

          # Check for PENDING verdict — non-final state, fail closed.
          # The skeptic gate runs asynchronously and will update the verdict when complete.
          elif printf '%s' "$EVIDENCE_SECTION" | grep -qi '[Vv]erdict.*:.*[Pp][Ee][Nn][Dd][Ii][Nn][Gg]'; then
            echo "ERROR: Verdict: PENDING is non-final. Wait for PASS/FAIL/SKIPPED."
            exit 1

          # No verdict found — hard requirement, gate fails
          else
            echo "ERROR: No verdict found in evidence bundle. Verdict is a mandatory field — missing verdict fails the evidence gate."
            exit 1
          fi
