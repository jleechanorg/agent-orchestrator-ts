name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly to catch new vulnerabilities
    - cron: "0 8 * * 1"
  workflow_dispatch: # Allow manual triggering

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Scan for Secrets
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-latest' || fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","self-hosted-mikey"]') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Shallow for PRs (just need PR commits); full history for main/schedule scans
          fetch-depth: ${{ github.event_name == 'pull_request' && 1 || 0 }}
          # Prefer head.sha over head.ref for fork PRs to avoid ref resolution issues
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || '' }}

      # OSS CLI avoids gitleaks-action org-license requirement (see gitleaks-action README).
      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: "8.21.1"
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tgz

          # Verify SHA256 checksum before extracting — fail closed if checksum tool unavailable
          if ! command -v sha256sum &>/dev/null && ! command -v shasum &>/dev/null; then
            echo "ERROR: No SHA-256 verification tool available (sha256sum/shasum)" >&2
            exit 1
          fi
          EXPECTED="b46b0836ef7eefe8abe0cb21d7b5e7694b1d9f90fc9ee78fd8555dd4160b56d1"
          if command -v sha256sum &>/dev/null; then
            ACTUAL=$(sha256sum /tmp/gitleaks.tgz | cut -d' ' -f1)
          else
            ACTUAL=$(shasum -a 256 /tmp/gitleaks.tgz | cut -d' ' -f1)
          fi
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "ERROR: SHA256 mismatch. Expected $EXPECTED, got $ACTUAL" >&2
            exit 1
          fi

          tar -xzf /tmp/gitleaks.tgz -C /tmp
          sudo install -m 755 /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Run Gitleaks
        run: gitleaks detect --source . --verbose --redact --exit-code 1

  dependency-review:
    name: Dependency Review
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-latest' || fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","self-hosted-mikey"]') }}
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Requires dependency graph + GHAS; org repos without it always error — keep signal without blocking PRs.
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        continue-on-error: true # Requires GHAS — informational without it
        with:
          fail-on-severity: moderate

  npm-audit:
    name: NPM Audit
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-latest' || fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","self-hosted-mikey"]') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run npm audit
        run: pnpm audit --audit-level=moderate
        continue-on-error: true # Don't fail build on vulnerabilities in deps

      - name: Run pnpm audit (strict)
        run: pnpm audit --prod --audit-level=high
