name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly to catch new vulnerabilities
    - cron: "0 8 * * 1"
  workflow_dispatch: # Allow manual triggering

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Scan for Secrets
    runs-on: ${{ fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","Linux","ARM64","jleechanclaw"]') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 50 # Sufficient history for PR-scoped scan; avoids full clone overhead
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      # OSS CLI avoids gitleaks-action org-license requirement (see gitleaks-action README).
      # SHA256 verification prevents supply-chain attacks on the downloaded binary.
      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: "8.21.1"
        run: |
          set -e
          ARCH_SUFFIX=$(echo "${{ runner.arch }}" | tr '[:upper:]' '[:lower:]')
          # Map runner.arch to gitleaks release naming: x64→x64, arm64→arm64
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_${ARCH_SUFFIX}.tar.gz" -o /tmp/gitleaks.tgz
          # Verify checksum before extracting — fail closed if verification cannot run
          if command -v sha256sum >/dev/null 2>&1; then
            ACTUAL_SHA256=$(sha256sum /tmp/gitleaks.tgz | cut -d' ' -f1)
          elif command -v shasum >/dev/null 2>&1; then
            ACTUAL_SHA256=$(shasum -a 256 /tmp/gitleaks.tgz | cut -d' ' -f1)
          else
            echo "ERROR: neither sha256sum nor shasum available — cannot verify gitleaks binary checksum" >&2
            exit 1
          fi
          # Per-arch SHA256 checksums from official release
          case "$ARCH_SUFFIX" in
            x64)     EXPECTED_SHA256="b1e20dfbd81fa5eeefc91ace3371d4db75d2250c0d426cb6acf1e51722726779" ;;
            arm64)   EXPECTED_SHA256="6bdb864bf9183525513612942c94edcf47da7ff72331b4b660a313c251214437" ;;
            *)       echo "ERROR: unknown architecture suffix: $ARCH_SUFFIX" >&2; exit 1 ;;
          esac
          echo "Expected SHA256: $EXPECTED_SHA256"
          echo "Actual SHA256:   $ACTUAL_SHA256"
          if [ "$ACTUAL_SHA256" != "$EXPECTED_SHA256" ]; then
            echo "ERROR: gitleaks binary checksum mismatch — refusing to install" >&2
            exit 1
          fi
          tar -xzf /tmp/gitleaks.tgz -C /tmp
          sudo install -m 755 /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Run Gitleaks
        run: gitleaks detect --source . --verbose --redact --exit-code 1

  dependency-review:
    name: Dependency Review
    runs-on: ${{ fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","Linux","ARM64","jleechanclaw"]') }}
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Requires dependency graph + GHAS; org repos without it always error — keep signal without blocking PRs.
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        continue-on-error: true # Requires GHAS — informational without it
        with:
          fail-on-severity: moderate

  npm-audit:
    name: NPM Audit
    runs-on: ${{ fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","Linux","ARM64","jleechanclaw"]') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run npm audit
        run: pnpm audit --audit-level=moderate
        continue-on-error: true # Don't fail build on vulnerabilities in deps

      - name: Run pnpm audit (strict)
        run: pnpm audit --prod --audit-level=high
