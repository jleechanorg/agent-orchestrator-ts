name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly to catch new vulnerabilities
    - cron: "0 8 * * 1"
  workflow_dispatch: # Allow manual triggering

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Scan for Secrets
    # Fork PRs use ubuntu-latest to avoid running untrusted code on self-hosted infrastructure.
    runs-on: ${{ vars.SELF_HOSTED_DISABLED == 'true' && 'ubuntu-latest'
              || github.event.pull_request.head.repo.fork && github.event_name == 'pull_request'
              && 'ubuntu-latest'
              || fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","Linux","ARM64","agent-orchestrator"]') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 50 # Sufficient history for PR-scoped scan; avoids full clone overhead
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      # OSS CLI avoids gitleaks-action org-license requirement (see gitleaks-action README).
      # SHA256 verification prevents supply-chain attacks on the downloaded binary.
      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: "8.21.1"
        run: |
          set -e
          OS_SUFFIX="$(uname -s | tr '[:upper:]' '[:lower:]')"
          ARCH_SUFFIX=$(echo "${{ runner.arch }}" | tr '[:upper:]' '[:lower:]')
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_${OS_SUFFIX}_${ARCH_SUFFIX}.tar.gz" -o /tmp/gitleaks.tgz
          if command -v sha256sum >/dev/null 2>&1; then
            ACTUAL_SHA256=$(sha256sum /tmp/gitleaks.tgz | cut -d' ' -f1)
          elif command -v shasum >/dev/null 2>&1; then
            ACTUAL_SHA256=$(shasum -a 256 /tmp/gitleaks.tgz | cut -d' ' -f1)
          else
            echo "ERROR: neither sha256sum nor shasum available — cannot verify gitleaks binary checksum" >&2
            exit 1
          fi
          # Per-arch SHA256 checksums from official release
          case "$OS_SUFFIX:$ARCH_SUFFIX" in
            linux:x64)   EXPECTED_SHA256="b1e20dfbd81fa5eeefc91ace3371d4db75d2250c0d426cb6acf1e51722726779" ;;
            linux:arm64) EXPECTED_SHA256="6bdb864bf9183525513612942c94edcf47da7ff72331b4b660a313c251214437" ;;
            darwin:arm64) EXPECTED_SHA256="4e7bee2df7d61217e9af00c3507db1870a2676cb3b73fb5a3fdca3060734cc0e" ;;
            *)       echo "WARNING: no checksum for $OS_SUFFIX:$ARCH_SUFFIX — skipping verification" ;;
          esac
          if [ -n "${EXPECTED_SHA256:-}" ]; then
            echo "Expected SHA256: $EXPECTED_SHA256"
            echo "Actual SHA256:   $ACTUAL_SHA256"
            if [ "$ACTUAL_SHA256" != "$EXPECTED_SHA256" ]; then
              echo "ERROR: gitleaks binary checksum mismatch — refusing to install" >&2
              exit 1
            fi
          fi
          tar -xzf /tmp/gitleaks.tgz -C /tmp
          if [ -w /usr/local/bin ]; then
            install -m 755 /tmp/gitleaks /usr/local/bin/gitleaks
          else
            mkdir -p "$HOME/.local/bin"
            install -m 755 /tmp/gitleaks "$HOME/.local/bin/gitleaks"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi

      - name: Run Gitleaks
        run: gitleaks detect --source . --verbose --redact --exit-code 1

  dependency-review:
    name: Dependency Review
    # Fork PRs use ubuntu-latest to avoid running untrusted code on self-hosted infrastructure.
    runs-on: ${{ vars.SELF_HOSTED_DISABLED == 'true' && 'ubuntu-latest'
              || github.event.pull_request.head.repo.fork && github.event_name == 'pull_request'
              && 'ubuntu-latest'
              || fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","Linux","ARM64","agent-orchestrator"]') }}
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Requires dependency graph + GHAS; org repos without it always error — keep signal without blocking PRs.
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        continue-on-error: true # Requires GHAS — informational without it
        with:
          fail-on-severity: moderate

  npm-audit:
    name: NPM Audit
    runs-on: ${{ vars.SELF_HOSTED_DISABLED == 'true' && 'ubuntu-latest'
              || github.event.pull_request.head.repo.fork && github.event_name == 'pull_request'
              && 'ubuntu-latest'
              || fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","Linux","ARM64","agent-orchestrator"]') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run npm audit
        run: pnpm audit --audit-level=moderate
        continue-on-error: true # Don't fail build on vulnerabilities in deps

      - name: Run pnpm audit (strict)
        run: pnpm audit --prod --audit-level=high
        continue-on-error: true # Transitive deps (langsmith via composio-core) cannot be patched here
