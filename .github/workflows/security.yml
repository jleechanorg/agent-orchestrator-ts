name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly to catch new vulnerabilities
    - cron: "0 8 * * 1"
  workflow_dispatch: # Allow manual triggering

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Scan for Secrets
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-latest' || fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","self-hosted-mikey"]') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 50 # Enough for gitleaks --log-opts range; avoids full clone overhead
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      # OSS CLI avoids gitleaks-action org-license requirement (see gitleaks-action README).
      # SHA256 is fetched from GitHub releases API (authenticated via GITHUB_TOKEN to avoid rate limits).
      - name: Install Gitleaks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_VERSION: "8.21.1"
        run: |
          set -e
          ASSET_URL="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          AUTH_HEADER="Authorization: Bearer ${GITHUB_TOKEN}"

          download_with_auth() {
            local url="$1"
            local dest="$2"
            # gitleaks:allow - public GitHub release URL + GITHUB_TOKEN avoids unauthenticated rate limits
            curl -sSL "$url" -H "$AUTH_HEADER" -o "$dest"
          }

          # Download binary (always needed)
          download_with_auth "$ASSET_URL" /tmp/gitleaks.tgz

          # Fetch checksums.txt and verify (retried, graceful fallback)
          checksum_ok=false
          for attempt in 1 2 3; do
            checksums_url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_checksums.txt"
            if download_with_auth "$checksums_url" /tmp/checksums.txt && [ -s /tmp/checksums.txt ]; then
              SHA256=$(grep "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" /tmp/checksums.txt | awk '{print $1}')
              if [ -n "$SHA256" ]; then
                if echo "${SHA256}  /tmp/gitleaks.tgz" | sha256sum --check --status; then
                  echo "gitleaks binary verified (SHA256: ${SHA256})"
                  checksum_ok=true
                  break
                else
                  echo "WARN: checksum mismatch on attempt ${attempt}, retrying..."
                fi
              fi
            fi
            if [ "$attempt" -lt 3 ]; then sleep 2; fi
          done

          if [ "$checksum_ok" = false ]; then
            echo "WARN: checksum verification unavailable (network/GH API rate limit) — proceeding without verification"
          fi

          tar -xzf /tmp/gitleaks.tgz -C /tmp
          sudo install -m 755 /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Run Gitleaks
        run: gitleaks detect --source . --verbose --redact --exit-code 1

  dependency-review:
    name: Dependency Review
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-latest' || fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","self-hosted-mikey"]') }}
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Requires dependency graph + GHAS; org repos without it always error — keep signal without blocking PRs.
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        continue-on-error: true # Requires GHAS — informational without it
        with:
          fail-on-severity: moderate

  npm-audit:
    name: NPM Audit
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-latest' || fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","self-hosted-mikey"]') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run npm audit
        run: pnpm audit --audit-level=moderate
        continue-on-error: true # Don't fail build on vulnerabilities in deps

      - name: Run pnpm audit (strict)
        run: pnpm audit --prod --audit-level=high
