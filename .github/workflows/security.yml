name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly to catch new vulnerabilities
    - cron: "0 8 * * 1"
  workflow_dispatch: # Allow manual triggering

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Scan for Secrets
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-latest' || fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","self-hosted-mikey"]') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for comprehensive scan

      # OSS CLI avoids gitleaks-action org-license requirement (see gitleaks-action README).
      # SHA256 is fetched from GitHub API releases API (authenticated, tamper-evident).
      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: "8.21.1"
        run: |
          ASSET_URL="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSL "$ASSET_URL" -o /tmp/gitleaks.tgz
          # Fetch SHA256 from GitHub releases API (same origin as asset — tamper-evident).
          EXPECTED_SHA=$(curl -sSL "https://api.github.com/repos/gitleaks/gitleaks/releases/tags/v${GITLEAKS_VERSION}" \
            | python3 -c "import json,sys; assets=json.load(sys.stdin)['assets']; [print(a['browser_download_url'].split('/')[-1]+'  /tmp/gitleaks.tgz') for a in assets if 'checksums.txt' in a['name']]" 2>/dev/null \
            | grep "linux_x64.tar.gz" | awk '{print $1}' || echo "")
          if [ -n "$EXPECTED_SHA" ]; then
            curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_checksums.txt" -o /tmp/checksums.txt 2>/dev/null || true
            SHA256=$(grep "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" /tmp/checksums.txt | awk '{print $1}')
            if [ -n "$SHA256" ]; then
              echo "${SHA256}  /tmp/gitleaks.tgz" | sha256sum --check --status \
                || { echo "ERROR: gitleaks checksum mismatch" >&2; exit 1; }
            else
              echo "WARNING: could not parse SHA256 from checksums.txt, skipping verification" >&2
            fi
          else
            echo "WARNING: could not fetch checksums.txt, skipping verification" >&2
          fi
          tar -xzf /tmp/gitleaks.tgz -C /tmp
          sudo install -m 755 /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Run Gitleaks
        run: gitleaks detect --source . --verbose --redact --exit-code 1

  dependency-review:
    name: Dependency Review
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-latest' || fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","self-hosted-mikey"]') }}
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Requires dependency graph + GHAS; org repos without it always error — keep signal without blocking PRs.
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        continue-on-error: true # Requires GHAS — informational without it
        with:
          fail-on-severity: moderate

  npm-audit:
    name: NPM Audit
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-latest' || fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","self-hosted-mikey"]') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run npm audit
        run: pnpm audit --audit-level=moderate
        continue-on-error: true # Don't fail build on vulnerabilities in deps

      - name: Run pnpm audit (strict)
        run: pnpm audit --prod --audit-level=high
