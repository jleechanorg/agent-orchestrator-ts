name: Skeptic Cron

# Runs every 30 minutes — evaluates all open PRs with skeptic and merges when 7-green.
# This makes skeptic truly universal: even PRs that skip the evolve loop get skeptic
# review and automatic merge when ready.
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  skeptic_cron:
    name: Skeptic Cron
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      prs_evaluated: ${{ steps.list_prs.outputs.pr_numbers }}
      merged_count: ${{ steps.merge_prs.outputs.merged_count }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/skeptic-setup

      - name: List open PRs
        id: list_prs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_JSON=$(gh api repos/${{ github.repository }}/pulls \
            --jq '[.[] | select(.draft == false) | {number, title, head: {ref: .head.ref, sha: .head.sha}, base: {ref: .base.ref}, mergeable}]')

          echo "Open non-draft PRs found:"
          echo "$PR_JSON" | jq -c '.[]' 2>/dev/null || echo "$PR_JSON"

          echo "pr_numbers=$(echo "$PR_JSON" | jq -c '.')" >> "$GITHUB_OUTPUT"
          echo "pr_count=$(echo "$PR_JSON" | jq 'length')" >> "$GITHUB_OUTPUT"

      - name: Run skeptic on each open PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_JSON: ${{ steps.list_prs.outputs.pr_numbers }}
        run: |
          set -e

          for PR in $(echo "$PR_JSON" | jq -r '.[] | @base64'); do
            PR_DATA=$(echo "$PR" | base64 -d)
            PR_NUM=$(echo "$PR_DATA" | jq -r '.number')
            PR_TITLE=$(echo "$PR_DATA" | jq -r '.title')

            echo ""
            echo "========================================"
            echo "Skeptic evaluation: PR #${PR_NUM} — ${PR_TITLE}"
            echo "========================================"

            # Run skeptic with --dry-run so it does NOT try to post a comment
            # (the jleechan-agent[bot] lacks write access; cron workflow posts via GITHUB_TOKEN)
            # Output to file so the grep below can read it.
            # Wrap in subshell: prevents set -e from aborting the loop if skeptic exits non-zero
            # bd-skp2: removed || true (misleading) — capture real exit code and check explicitly
            skeptic_exit=0
            (node packages/cli/dist/index.js skeptic --pr "$PR_NUM" --dry-run > "skeptic-output-${PR_NUM}.txt" 2>&1) || skeptic_exit=$?
            # Print output for workflow logs
            cat "skeptic-output-${PR_NUM}.txt" || true

            # Verify output contains a VERDICT line (fail-closed — missing VERDICT means skeptic failed)
            if ! grep -qi "VERDICT:" "skeptic-output-${PR_NUM}.txt" 2>/dev/null; then
              echo "WARNING: No VERDICT line found for PR #${PR_NUM} (skeptic exit=${skeptic_exit}) — this PR will not be merged"
            fi

            echo "Skeptic complete for PR #${PR_NUM} (exit=${skeptic_exit})"
          done

      - name: Check 7-green conditions and merge ready PRs
        id: merge_prs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_JSON: ${{ steps.list_prs.outputs.pr_numbers }}
        run: |
          MERGED=0

          for PR in $(echo "$PR_JSON" | jq -r '.[] | @base64'); do
            PR_DATA=$(echo "$PR" | base64 -d)
            PR_NUM=$(echo "$PR_DATA" | jq -r '.number')
            PR_TITLE=$(echo "$PR_DATA" | jq -r '.title')

            echo ""
            echo "--- Checking 7-green for PR #${PR_NUM}: ${PR_TITLE} ---"

            # 1. CI green
            HEAD_SHA=$(gh api repos/${{ github.repository }}/pulls/"$PR_NUM" --jq '.head.sha')
            CI_STATUS=$(gh api repos/${{ github.repository }}/commits/"$HEAD_SHA"/status \
              --jq '.state' 2>/dev/null || echo "error")
            CI_RESULT=$([ "$CI_STATUS" = "success" ] && echo "PASS" || echo "FAIL (state=$CI_STATUS)")
            echo "  [1] CI green:          $CI_RESULT"

            # 2. No merge conflicts
            PR_DATA2=$(gh api repos/${{ github.repository }}/pulls/"$PR_NUM" \
              --jq '{mergeable: .mergeable, merged: .merged}' 2>/dev/null)
            MERGEABLE=$(echo "$PR_DATA2" | jq -r '.mergeable // "unknown"')
            MERGED_FLAG=$(echo "$PR_DATA2" | jq -r '.merged // false')
            MERGE_CONFLICT=$(if [ "$MERGEABLE" = "true" ] || [ "$MERGED_FLAG" = "true" ]; then echo "PASS"; else echo "FAIL (mergeable=$MERGEABLE)"; fi)
            echo "  [2] No merge conflicts: $MERGE_CONFLICT"

            # 3. CR APPROVED
            LATEST_CR=$(gh api repos/${{ github.repository }}/pulls/"$PR_NUM"/reviews \
              --jq '[.[] | select(.user.login == "coderabbitai[bot]")] | sort_by(.submitted_at) | reverse | .[0] | {state: .state}' 2>/dev/null)
            CR_STATE=$(echo "$LATEST_CR" | jq -r '.state // "none"')
            CR_APPROVED=$([ "$CR_STATE" = "APPROVED" ] && echo "PASS" || echo "FAIL (state=$CR_STATE)")
            echo "  [3] CR APPROVED:        $CR_APPROVED"

            # 4. Bugbot clean
            BUGBOT_ERRORS=$(gh api repos/${{ github.repository }}/pulls/"$PR_NUM"/comments \
              --jq '[.[] | select(.user.login == "cursor[bot]" and (.body | test("error"; "i")))] | length' 2>/dev/null || echo 0)
            BUGBOT_STATUS=$(if [ "$BUGBOT_ERRORS" = "0" ] || [ -z "$BUGBOT_ERRORS" ]; then echo "PASS"; else echo "FAIL ($BUGBOT_ERRORS error(s))"; fi)
            echo "  [4] Bugbot clean:       $BUGBOT_STATUS"

            # 5. Inline comments resolved
            UNRESOLVED=$(gh api repos/${{ github.repository }}/pulls/"$PR_NUM"/comments \
              --jq '[.[] | select(.in_reply_to_id == null) | select(.body | test("^(nit:|nitpick)"; "i") | not)] | length' 2>/dev/null || echo 0)
            COMMENTS_STATUS=$(if [ "$UNRESOLVED" = "0" ] || [ -z "$UNRESOLVED" ]; then echo "PASS"; else echo "FAIL ($UNRESOLVED unresolved)"; fi)
            echo "  [5] Comments resolved:   $COMMENTS_STATUS"

            # 6. Evidence review
            EVIDENCE_APPROVED=$(gh api repos/${{ github.repository }}/pulls/"$PR_NUM"/reviews \
              --jq '[.[] | select(.user.login == "evidence-review-bot" and .state == "APPROVED")] | length' 2>/dev/null || echo 0)
            EVIDENCE_STATUS=$(if [ "$EVIDENCE_APPROVED" = "0" ]; then echo "N/A (optional)"; else echo "PASS"; fi)
            echo "  [6] Evidence review:    $EVIDENCE_STATUS"

            # 7. Skeptic verdict — from skeptic-output file produced by skeptical-run step
            # bd-skp2: use the skeptic-output file from this cron run (not stale comments)
            if [ -f "skeptic-output-${PR_NUM}.txt" ]; then
              if grep -qi "VERDICT: FAIL" "skeptic-output-${PR_NUM}.txt"; then
                SKEPTIC_STATUS="FAIL"
              elif grep -qi "VERDICT: PASS" "skeptic-output-${PR_NUM}.txt"; then
                SKEPTIC_STATUS="PASS"
              else
                SKEPTIC_STATUS="MISSING"
              fi
            else
              SKEPTIC_VERDICT=$(gh api repos/${{ github.repository }}/issues/"$PR_NUM"/comments \
                --jq '[.[] | select(.user.login == "github-actions[bot]" and (.body | test("VERDICT:"; "i"))) | .body] | last' 2>/dev/null || echo "")
              if echo "$SKEPTIC_VERDICT" | grep -qi "VERDICT: PASS"; then
                SKEPTIC_STATUS="PASS"
              elif echo "$SKEPTIC_VERDICT" | grep -qi "VERDICT: FAIL"; then
                SKEPTIC_STATUS="FAIL"
              else
                SKEPTIC_STATUS="MISSING"
              fi
            fi
              else
                SKEPTIC_STATUS="MISSING"
              fi
            else
              SKEPTIC_VERDICT=$(gh api repos/${{ github.repository }}/issues/"$PR_NUM"/comments \
                --jq '[.[] | select(.user.login == "github-actions[bot]" and (.body | test("VERDICT:"; "i"))) | .body] | last' 2>/dev/null || echo "")
              if echo "$SKEPTIC_VERDICT" | grep -qi "VERDICT: PASS"; then
                SKEPTIC_STATUS="PASS"
              elif echo "$SKEPTIC_VERDICT" | grep -qi "VERDICT: FAIL"; then
                SKEPTIC_STATUS="FAIL"
              else
                SKEPTIC_STATUS="MISSING"
              fi
            fi
            echo "  [7] Skeptic verdict:    $SKEPTIC_STATUS"

            # All must PASS
            ALL_PASS=true
            for COND in "$CI_RESULT" "$MERGE_CONFLICT" "$CR_APPROVED" "$BUGBOT_STATUS" "$COMMENTS_STATUS"; do
              if echo "$COND" | grep -qi "FAIL"; then
                ALL_PASS=false
                break
              fi
            done
            if echo "$SKEPTIC_STATUS" | grep -Ei "FAIL|MISSING"; then
              ALL_PASS=false
            fi

            if [ "$ALL_PASS" = "true" ]; then
              echo ""
              echo "*** PR #${PR_NUM} is 7-green! Merging... ***"
              if [ "$MERGED_FLAG" = "true" ]; then
                echo "Already merged — skipping"
              else
                MERGE_RESULT=$(gh pr merge "$PR_NUM" \
                  --repo ${{ github.repository }} \
                  --squash --auto \
                  --delete-branch \
                  2>&1 || echo "MERGE_FAILED")
                if echo "$MERGE_RESULT" | grep -Ei "MERGE_FAILED|error"; then
                  echo "Merge failed for PR #${PR_NUM}: $MERGE_RESULT"
                else
                  echo "Successfully merged PR #${PR_NUM}"
                  MERGED=$((MERGED + 1))
                fi
              fi
            else
              echo "PR #${PR_NUM} not yet merge-ready — skipping"
            fi
          done

          echo "merged_count=$MERGED" >> "$GITHUB_OUTPUT"
          echo ""
          echo "=== Skeptic cron complete: $MERGED PR(s) merged ==="
