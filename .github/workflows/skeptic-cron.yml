name: Skeptic Cron

# Runs every 20 minutes — evaluates 6-green-eligible PRs via AO worker dispatch,
# then merges when 7-green.
#
# LLM evaluation (ao skeptic verify) runs via AO worker on the local machine
# using Codex OAuth auth — NO API keys needed in GitHub secrets.
#
# Flow: list open PRs → verify Skeptic Gate CI passed for current SHA →
# check 6-green eligible (gates 1-5, skip docs-only) →
# post trigger comment per PR → lifecycle-manager AO worker runs ao skeptic verify →
# posts VERDICT comment → this workflow checks 7th condition + merges.
#
on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:

jobs:
  skeptic_cron:
    name: Skeptic Cron
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      checks: read
    outputs:
      prs_evaluated: ${{ steps.list_prs.outputs.pr_numbers }}
      merged_count: ${{ steps.merge_prs.outputs.merged_count }}
    steps:
      # ----------------------------------------------------------------
      # Step 1: List open non-draft PRs
      # ----------------------------------------------------------------
      - name: List open PRs
        id: list_prs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_JSON=$(gh api repos/${{ github.repository }}/pulls \
            --jq '[.[] | select(.draft == false) | {number, title, head: {ref: .head.ref, sha: .head.sha}, base: {ref: .base.ref}, mergeable}]')

          echo "Open non-draft PRs found:"
          echo "$PR_JSON" | jq -c '.[]' 2>/dev/null || echo "$PR_JSON"

          echo "pr_numbers=$(echo "$PR_JSON" | jq -c '.')" >> "$GITHUB_OUTPUT"
          echo "pr_count=$(echo "$PR_JSON" | jq 'length')" >> "$GITHUB_OUTPUT"

      # ----------------------------------------------------------------
      # Step 2: Filter to 6-green eligible PRs, post trigger comments.
      # Verifies Skeptic Gate CI check passed before triggering LLM.
      # LLM evaluation is delegated to AO worker — this step only posts
      # the trigger comment. AO worker picks it up and runs ao skeptic verify.
      # ----------------------------------------------------------------
      - name: Post skeptic triggers for 6-green eligible PRs
        id: post_triggers
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_JSON: ${{ steps.list_prs.outputs.pr_numbers }}
          SKEPTIC_CUSTOM_PROMPT: ${{ vars.SKEPTIC_CUSTOM_PROMPT || '' }}
        run: |
          TRIGGERED=0
          SKIPPED_DOCS=0
          SKIPPED_NOT_6GREEN=0
          SKIPPED_GATE_NOT_PASSED=0

          for PR in $(echo "$PR_JSON" | jq -r '.[] | @base64'); do
            PR_DATA=$(echo "$PR" | base64 -d)
            PR_NUM=$(echo "$PR_DATA" | jq -r '.number')
            PR_TITLE=$(echo "$PR_DATA" | jq -r '.title')
            PR_SHA=$(echo "$PR_DATA" | jq -r '.head.sha')

            echo ""
            echo "=== Evaluating PR #${PR_NUM}: ${PR_TITLE} ==="

            # ----------------------------------------------------------------
            # Pre-check: Verify Skeptic Gate CI check passed for current SHA.
            # Look for the skeptic-gate-result comment marker OR the Skeptic Gate
            # check run conclusion. If not passed, skip LLM trigger.
            # ----------------------------------------------------------------
            GATE_COMMENT=$(gh api repos/${{ github.repository }}/issues/"$PR_NUM"/comments \
              --paginate \
              --jq "[.[] | select(.user.login == \"github-actions[bot]\" and (.body | test(\"skeptic-gate-result-${PR_SHA}\")))] | last // empty" 2>/dev/null || echo "")

            GATE_PASSED=false
            if [ -n "$GATE_COMMENT" ] && echo "$GATE_COMMENT" | jq -e '.body' > /dev/null 2>&1; then
              GATE_BODY=$(echo "$GATE_COMMENT" | jq -r '.body')
              if echo "$GATE_BODY" | grep -q "Result: PASS"; then
                GATE_PASSED=true
                echo "  [PRE-CHECK] Skeptic Gate comment: PASS for SHA ${PR_SHA:0:7}"
              else
                echo "  [PRE-CHECK] Skeptic Gate comment found but not PASS for SHA ${PR_SHA:0:7}"
              fi
            fi

            # Fallback: check the Skeptic Gate check run status
            if [ "$GATE_PASSED" = "false" ]; then
              GATE_CHECK=$(gh api repos/${{ github.repository }}/commits/"$PR_SHA"/check-runs \
                --jq '[.check_runs[] | select(.name == "Skeptic Gate")] | last | .conclusion // "none"' 2>/dev/null || echo "none")
              if [ "$GATE_CHECK" = "success" ]; then
                GATE_PASSED=true
                echo "  [PRE-CHECK] Skeptic Gate check run: success for SHA ${PR_SHA:0:7}"
              else
                echo "  [PRE-CHECK] Skeptic Gate check run: $GATE_CHECK for SHA ${PR_SHA:0:7}"
              fi
            fi

            if [ "$GATE_PASSED" = "false" ]; then
              echo "  [SKIP] Skeptic Gate not passed for current SHA — skipping LLM trigger"
              SKIPPED_GATE_NOT_PASSED=$((SKIPPED_GATE_NOT_PASSED + 1))
              continue
            fi

            # ----------------------------------------------------------------
            # Docs-only skip: check if the diff contains only docs files.
            # ----------------------------------------------------------------
            PR_BASE_REF=$(echo "$PR_DATA" | jq -r '.base.ref')
            DIFF_FILES=$(gh api repos/${{ github.repository }}/compare/"${PR_BASE_REF}...${PR_SHA}" \
              --jq '[.files[].filename] | map(select(test("\\.(js|ts|jsx|tsx|py|rs|go|java|cs|cpp|h|c|mk|toml|yaml|yml|json|xml|sh|bash|ps1|rb|php|swift|kt|gradle)$"; "i") | not))' \
              2>/dev/null | jq 'length' || echo 0)
            if [ "${DIFF_FILES:-0}" -eq 0 ]; then
              echo "  [SKIP] No doc files in diff — all code; skeptic evaluation optional"
              SKIPPED_DOCS=$((SKIPPED_DOCS + 1))
              continue
            fi

            # ----------------------------------------------------------------
            # Gate 1: CI green
            # ----------------------------------------------------------------
            CI_STATUS=$(gh api repos/${{ github.repository }}/commits/"$PR_SHA"/status \
              --jq '.state' 2>/dev/null || echo "error")
            if [ "$CI_STATUS" != "success" ]; then
              echo "  [SKIP] Gate-1 FAIL: CI=$CI_STATUS"
              SKIPPED_NOT_6GREEN=$((SKIPPED_NOT_6GREEN + 1))
              continue
            fi
            echo "  [GATE-1] CI: success"

            # ----------------------------------------------------------------
            # Gate 2: No merge conflicts
            # ----------------------------------------------------------------
            PR_META=$(gh api repos/${{ github.repository }}/pulls/"$PR_NUM" \
              --jq '{mergeable: .mergeable, merged: .merged}' 2>/dev/null)
            MERGEABLE=$(echo "$PR_META" | jq -r '.mergeable // "unknown"')
            MERGED_FLAG=$(echo "$PR_META" | jq -r '.merged // false')
            if [ "$MERGEABLE" != "true" ]; then
              echo "  [SKIP] Gate-2 FAIL: mergeable=$MERGEABLE"
              SKIPPED_NOT_6GREEN=$((SKIPPED_NOT_6GREEN + 1))
              continue
            fi
            echo "  [GATE-2] No conflicts"

            # ----------------------------------------------------------------
            # Gate 3: CR APPROVED
            # ----------------------------------------------------------------
            LATEST_CR=$(gh api repos/${{ github.repository }}/pulls/"$PR_NUM"/reviews \
              --jq '[.[] | select(.user.login == "coderabbitai[bot]" and .state == "APPROVED")] | sort_by(.submitted_at) | reverse | .[0].state // "none"' \
              2>/dev/null || echo "none")
            if [ "$LATEST_CR" != "APPROVED" ]; then
              echo "  [SKIP] Gate-3 FAIL: CR=$LATEST_CR"
              SKIPPED_NOT_6GREEN=$((SKIPPED_NOT_6GREEN + 1))
              continue
            fi
            echo "  [GATE-3] CR=APPROVED"

            # ----------------------------------------------------------------
            # Gate 4: Bugbot clean
            # ----------------------------------------------------------------
            BUGBOT_ERRORS=$(gh api repos/${{ github.repository }}/pulls/"$PR_NUM"/comments \
              --jq '[.[] | select(.user.login == "cursor[bot]" and (.body | test("error"; "i")))] | length' \
              2>/dev/null || echo 0)
            if [ "${BUGBOT_ERRORS:-0}" -gt 0 ]; then
              echo "  [SKIP] Gate-4 FAIL: Bugbot=$BUGBOT_ERRORS error(s)"
              SKIPPED_NOT_6GREEN=$((SKIPPED_NOT_6GREEN + 1))
              continue
            fi
            echo "  [GATE-4] Bugbot=clean"

            # ----------------------------------------------------------------
            # Gate 5: Inline comments resolved (GraphQL — REST lacks isResolved)
            # ----------------------------------------------------------------
            PR_AUTHOR=$(gh api repos/${{ github.repository }}/pulls/"$PR_NUM" --jq '.user.login' 2>/dev/null || echo "")
            REPO_NAME="${GITHUB_REPOSITORY#*/}"
            GQL_RESULT=$(gh api graphql -f query='
              query($owner: String!, $name: String!, $number: Int!) {
                repository(owner: $owner, name: $name) {
                  pullRequest(number: $number) {
                    reviewThreads(first: 100) {
                      pageInfo { hasNextPage }
                      nodes {
                        isResolved
                        comments(first: 50) {
                          pageInfo { hasNextPage }
                          nodes { author { login } body }
                        }
                      }
                    }
                  }
                }
              }
            ' -f owner='${{ github.repository_owner }}' -f name="$REPO_NAME" -F number="$PR_NUM" 2>/dev/null)
            if [ -z "$GQL_RESULT" ]; then
              UNRESOLVED="__GQL_ERROR__"
            elif [ "$(echo "$GQL_RESULT" | jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.hasNextPage')" = "true" ] || [ "$(echo "$GQL_RESULT" | jq -r '[.data.repository.pullRequest.reviewThreads.nodes[].comments.pageInfo.hasNextPage | select(. == true)] | length')" -gt 0 ]; then
              UNRESOLVED="__TRUNCATED__"
            else
              UNRESOLVED=$(echo "$GQL_RESULT" | jq -r "[.data.repository.pullRequest.reviewThreads.nodes[] | select(.isResolved == false) | .comments.nodes[] | select(.author.login != null and (.author.login | ascii_downcase) != (\"$PR_AUTHOR\" | ascii_downcase) and (.body | test(\"^\\\\s*(nit:|nitpick)\"; \"i\") | not))] | length")
            fi
            if [ "$UNRESOLVED" = "__GQL_ERROR__" ] || [ "$UNRESOLVED" = "__TRUNCATED__" ]; then
              echo "  [SKIP] Gate-5 FAIL: GraphQL error or pagination truncated"
              SKIPPED_NOT_6GREEN=$((SKIPPED_NOT_6GREEN + 1))
              continue
            elif [ "${UNRESOLVED:-0}" -gt 0 ]; then
              echo "  [SKIP] Gate-5 FAIL: $UNRESOLVED unresolved comments"
              SKIPPED_NOT_6GREEN=$((SKIPPED_NOT_6GREEN + 1))
              continue
            fi
            echo "  [GATE-5] All comments resolved"

            # ----------------------------------------------------------------
            # 6-green eligible + Skeptic Gate passed — post trigger comment
            # for AO worker. Lifecycle-manager picks this up and runs
            # ao skeptic verify via AO worker (Codex OAuth, no GHA API keys).
            # ----------------------------------------------------------------
            echo "  [TRIGGER] Posting skeptic trigger for PR #${PR_NUM}..."
            # Include custom prompt in trigger if SKEPTIC_CUSTOM_PROMPT repo var is set.
            # The AO worker reads this from the trigger comment and passes it to
            # ao skeptic verify --prompt "...". Useful for bootstrap PRs.
            CUSTOM_PROMPT_LINE=""
            if [ -n "$SKEPTIC_CUSTOM_PROMPT" ]; then
              CUSTOM_PROMPT_LINE="<!-- skeptic-custom-prompt: ${SKEPTIC_CUSTOM_PROMPT} -->"
            fi
            BODY=$(printf '%s\n%s\n%s' \
              "SKEPTIC_CRON_TRIGGER" \
              "<!-- skeptic-cron-trigger-${PR_SHA} -->" \
              "$CUSTOM_PROMPT_LINE")
            if gh api repos/${{ github.repository }}/issues/"$PR_NUM"/comments \
              --field body="$BODY" \
              --jq '.id' > /dev/null 2>&1; then
              echo "  [TRIGGER] Posted trigger for PR #${PR_NUM} (SHA ${PR_SHA:0:7})"
              TRIGGERED=$((TRIGGERED + 1))
            else
              echo "  [ERROR] Failed to post trigger for PR #${PR_NUM}" >&2
            fi
          done

          echo ""
          echo "=== Trigger summary ==="
          echo "Triggered: $TRIGGERED"
          echo "Skipped (Skeptic Gate not passed): $SKIPPED_GATE_NOT_PASSED"
          echo "Skipped (docs-only): $SKIPPED_DOCS"
          echo "Skipped (not 6-green): $SKIPPED_NOT_6GREEN"

      # ----------------------------------------------------------------
      # Step 3: Check 7-green conditions (gate 6 evidence + gate 7 skeptic)
      # and merge ready PRs. Skeptic verdict comes from VERDICT comment
      # posted by the AO worker after it processes the trigger above.
      # ----------------------------------------------------------------
      - name: Check 7-green conditions and merge ready PRs
        id: merge_prs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_JSON: ${{ steps.list_prs.outputs.pr_numbers }}
          STALE_HOURS: ${{ vars.STALE_HOURS || '3' }}
          # Default to github-actions[bot] — aligns with skeptic-gate.yml.
          # AO worker posts verdict via GITHUB_TOKEN (authenticates as github-actions[bot]).
          SKEPTIC_BOT_AUTHOR: ${{ vars.SKEPTIC_BOT_AUTHOR || 'github-actions[bot]' }}
        run: |
          MERGED=0

          for PR in $(echo "$PR_JSON" | jq -r '.[] | @base64'); do
            PR_DATA=$(echo "$PR" | base64 -d)
            PR_NUM=$(echo "$PR_DATA" | jq -r '.number')
            PR_TITLE=$(echo "$PR_DATA" | jq -r '.title')
            PR_SHA=$(echo "$PR_DATA" | jq -r '.head.sha')

            echo ""
            echo "--- Checking 7-green for PR #${PR_NUM}: ${PR_TITLE} ---"

            # Track PR age for staleness reporting
            PR_DETAIL=$(gh api repos/${{ github.repository }}/pulls/"$PR_NUM" \
              --jq '{created_at: .created_at}' 2>/dev/null || echo '{"created_at":null}')
            CREATED=$(echo "$PR_DETAIL" | jq -r '.created_at')
            if [ "$CREATED" != "null" ] && [ -n "$CREATED" ]; then
              epoch_now=$(date +%s)
              epoch_created=$(date -d "$CREATED" +%s 2>/dev/null) || epoch_created=0
              if [ "$epoch_created" -gt 0 ]; then
                age_sec=$((epoch_now - epoch_created))
                AGE_HRS=$(printf '%s' "$age_sec" | awk '{printf "%.1f", $1/3600}')
                STALE_STATUS="unknown"
                AGE_INT=$(echo "$AGE_HRS" | cut -d. -f1)
                if [ "${AGE_INT:-0}" -ge "${STALE_HOURS:-3}" ]; then
                  STALE_STATUS="STALE"
                else
                  STALE_STATUS="FRESH"
                fi
                echo "  [AGE] PR #${PR_NUM}: age=${AGE_HRS}h, status=${STALE_STATUS}"
              fi
            fi

            # 1. CI green
            HEAD_SHA=$(gh api repos/${{ github.repository }}/pulls/"$PR_NUM" --jq '.head.sha')
            CI_STATUS=$(gh api repos/${{ github.repository }}/commits/"$HEAD_SHA"/status \
              --jq '.state' 2>/dev/null || echo "error")
            CI_RESULT=$([ "$CI_STATUS" = "success" ] && echo "PASS" || echo "FAIL (state=$CI_STATUS)")
            echo "  [1] CI green:          $CI_RESULT"

            # 2. No merge conflicts
            PR_DATA2=$(gh api repos/${{ github.repository }}/pulls/"$PR_NUM" \
              --jq '{mergeable: .mergeable, merged: .merged}' 2>/dev/null)
            MERGEABLE=$(echo "$PR_DATA2" | jq -r '.mergeable // "unknown"')
            MERGED_FLAG=$(echo "$PR_DATA2" | jq -r '.merged // false')
            MERGE_CONFLICT=$(if [ "$MERGEABLE" = "true" ] || [ "$MERGED_FLAG" = "true" ]; then echo "PASS"; else echo "FAIL (mergeable=$MERGEABLE)"; fi)
            echo "  [2] No merge conflicts: $MERGE_CONFLICT"

            # 3. CR APPROVED
            LATEST_CR=$(gh api repos/${{ github.repository }}/pulls/"$PR_NUM"/reviews \
              --jq '[.[] | select(.user.login == "coderabbitai[bot]" and (.state == "APPROVED" or .state == "CHANGES_REQUESTED"))] | sort_by(.submitted_at) | reverse | .[0].state' 2>/dev/null || echo "none")
            CR_STATE="${LATEST_CR:-none}"
            CR_APPROVED=$([ "$CR_STATE" = "APPROVED" ] && echo "PASS" || echo "FAIL (state=$CR_STATE)")
            echo "  [3] CR APPROVED:        $CR_APPROVED"

            # 4. Bugbot clean
            BUGBOT_ERRORS=$(gh api repos/${{ github.repository }}/pulls/"$PR_NUM"/comments \
              --jq '[.[] | select(.user.login == "cursor[bot]" and (.body | test("error"; "i")))] | length' 2>/dev/null || echo 0)
            BUGBOT_STATUS=$(if [ "$BUGBOT_ERRORS" = "0" ] || [ -z "$BUGBOT_ERRORS" ]; then echo "PASS"; else echo "FAIL ($BUGBOT_ERRORS error(s))"; fi)
            echo "  [4] Bugbot clean:       $BUGBOT_STATUS"

            # 5. Inline comments resolved (GraphQL)
            PR_AUTHOR=$(gh api repos/${{ github.repository }}/pulls/"$PR_NUM" --jq '.user.login')
            REPO_NAME="${GITHUB_REPOSITORY#*/}"
            GQL_RESULT=$(gh api graphql -f query='
              query($owner: String!, $name: String!, $number: Int!) {
                repository(owner: $owner, name: $name) {
                  pullRequest(number: $number) {
                    reviewThreads(first: 100) {
                      pageInfo { hasNextPage }
                      nodes {
                        isResolved
                        comments(first: 50) {
                          pageInfo { hasNextPage }
                          nodes { author { login } body }
                        }
                      }
                    }
                  }
                }
              }
            ' -f owner='${{ github.repository_owner }}' -f name="$REPO_NAME" -F number="$PR_NUM" 2>/dev/null)
            if [ -z "$GQL_RESULT" ]; then
              UNRESOLVED="__GQL_ERROR__"
            elif [ "$(echo "$GQL_RESULT" | jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.hasNextPage')" = "true" ] || [ "$(echo "$GQL_RESULT" | jq -r '[.data.repository.pullRequest.reviewThreads.nodes[].comments.pageInfo.hasNextPage | select(. == true)] | length')" -gt 0 ]; then
              UNRESOLVED="__TRUNCATED__"
            else
              UNRESOLVED=$(echo "$GQL_RESULT" | jq -r "[.data.repository.pullRequest.reviewThreads.nodes[] | select(.isResolved == false) | .comments.nodes[] | select(.author.login != null and (.author.login | ascii_downcase) != (\"$PR_AUTHOR\" | ascii_downcase) and (.body | test(\"^\\\\s*(nit:|nitpick)\"; \"i\") | not))] | length")
            fi
            if [ "$UNRESOLVED" = "__GQL_ERROR__" ] || [ "$UNRESOLVED" = "__TRUNCATED__" ]; then
              COMMENTS_STATUS="FAIL (graphql-error or pagination-truncated)"
            elif [ "$UNRESOLVED" = "0" ] || [ -z "$UNRESOLVED" ]; then
              COMMENTS_STATUS="PASS"
            else
              COMMENTS_STATUS="FAIL ($UNRESOLVED unresolved)"
            fi
            echo "  [5] Comments resolved:   $COMMENTS_STATUS"

            # 6. Evidence review
            EVIDENCE_APPROVED=$(gh api repos/${{ github.repository }}/pulls/"$PR_NUM"/reviews \
              --jq '[.[] | select(.user.login == "evidence-review-bot" and .state == "APPROVED")] | length' 2>/dev/null || echo 0)
            EVIDENCE_STATUS=$(if [ "$EVIDENCE_APPROVED" = "0" ]; then echo "N/A (optional)"; else echo "PASS"; fi)
            echo "  [6] Evidence review:    $EVIDENCE_STATUS"

            # 7. Skeptic verdict — look for VERDICT comment from AO worker.
            # Filter by author + VERDICT: keyword + SHA marker (skeptic-cron-trigger-<SHA>)
            SKEPTIC_VERDICT=$(gh api repos/${{ github.repository }}/issues/"$PR_NUM"/comments \
              --paginate \
              --jq "[.[] | select(.user.login == \"${SKEPTIC_BOT_AUTHOR}\" and (.body | test(\"VERDICT:\"; \"i\")) and (.body | test(\"skeptic-cron-trigger-\" + \"$PR_SHA\"; \"i\"))) | .body] | last // empty" 2>/dev/null || echo "")
            if echo "$SKEPTIC_VERDICT" | grep -qi "VERDICT: PASS"; then
              SKEPTIC_STATUS="PASS"
            elif echo "$SKEPTIC_VERDICT" | grep -qi "VERDICT: SKIPPED"; then
              SKEPTIC_STATUS="SKIPPED"
            elif echo "$SKEPTIC_VERDICT" | grep -qi "VERDICT: FAIL"; then
              SKEPTIC_STATUS="FAIL"
            else
              # Fallback: also check github-actions[bot] author.
              # Use PR_SHA (captured at trigger time) not HEAD_SHA (refetched below).
              # The trigger comment was posted with PR_SHA; verdicts are keyed to it.
              FALLBACK_TRIGGER_RE="skeptic-cron-trigger-${PR_SHA}"
              SKEPTIC_VERDICT=$(gh api repos/${{ github.repository }}/issues/"$PR_NUM"/comments \
                --paginate \
                --jq "[.[] | select((.user.login == \"${SKEPTIC_BOT_AUTHOR}\" or .user.login == \"github-actions[bot]\") and (.body | test(\"VERDICT:\"; \"i\")) and (.body | test(\"$FALLBACK_TRIGGER_RE\"; \"i\"))) | .body] | last // empty" 2>/dev/null || echo "")
              if echo "$SKEPTIC_VERDICT" | grep -qi "VERDICT: PASS"; then
                SKEPTIC_STATUS="PASS"
              elif echo "$SKEPTIC_VERDICT" | grep -qi "VERDICT: SKIPPED"; then
                SKEPTIC_STATUS="SKIPPED"
              elif echo "$SKEPTIC_VERDICT" | grep -qi "VERDICT: FAIL"; then
                SKEPTIC_STATUS="FAIL"
              else
                SKEPTIC_STATUS="FAIL"
              fi
            fi
            echo "  [7] Skeptic verdict:    $SKEPTIC_STATUS"

            # All gates must PASS; SKIPPED (infra unavailable) does not block
            ALL_PASS=true
            for COND in "$CI_RESULT" "$MERGE_CONFLICT" "$CR_APPROVED" "$BUGBOT_STATUS" "$COMMENTS_STATUS"; do
              if echo "$COND" | grep -qi "FAIL"; then
                ALL_PASS=false
                break
              fi
            done
            if echo "$SKEPTIC_STATUS" | grep -qi "FAIL"; then
              ALL_PASS=false
            fi

            if [ "$ALL_PASS" = "true" ]; then
              echo ""
              echo "*** PR #${PR_NUM} is 7-green! Merging... ***"
              if [ "$MERGED_FLAG" = "true" ]; then
                echo "Already merged — skipping"
              else
                # SHA safety check: verify HEAD has not changed since we listed PRs.
                # Prevents merging if a new commit was pushed between listing and merge.
                CURRENT_SHA=$(gh api repos/${{ github.repository }}/pulls/"$PR_NUM" --jq '.head.sha' 2>/dev/null)
                if [ "$CURRENT_SHA" != "$PR_SHA" ]; then
                  echo "HEAD SHA changed ($PR_SHA -> $CURRENT_SHA) — skipping merge (will re-evaluate next cycle)"
                  continue
                fi
                # bd-weav: use --admin instead of --auto to merge immediately as GITHUB_TOKEN.
                # --auto delegates to GitHub's merge queue which sets merged_by=null, breaking
                # zero-touch auto-merge rate tracking (measured via merged_by=github-actions[bot]).
                MERGE_RESULT=$(gh pr merge "$PR_NUM" \
                  --repo ${{ github.repository }} \
                  --squash --admin \
                  --delete-branch \
                  2>&1 || echo "MERGE_FAILED")
                if echo "$MERGE_RESULT" | grep -Ei "MERGE_FAILED|error"; then
                  echo "Merge failed for PR #${PR_NUM}: $MERGE_RESULT"
                else
                  echo "Successfully merged PR #${PR_NUM}"
                  MERGED=$((MERGED + 1))
                fi
              fi
            else
              echo "PR #${PR_NUM} not yet merge-ready — skipping"
            fi
          done

          echo "merged_count=$MERGED" >> "$GITHUB_OUTPUT"
          echo ""
          echo "=== Skeptic cron complete: $MERGED PR(s) merged ==="
