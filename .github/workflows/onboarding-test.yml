name: Onboarding Integration Test

on:
  pull_request:
    paths:
      - 'packages/**'
      - 'scripts/**'
      - 'tests/integration/**'
      - '.github/workflows/onboarding-test.yml'
  push:
    branches: [main]

jobs:
  onboarding-test:
    name: Test Fresh Onboarding
    # SECURITY: Fork-aware runner selection — do not simplify. See PR #273.
    runs-on: ${{ vars.SELF_HOSTED_DISABLED == 'true' && 'ubuntu-latest'
              || (github.event.pull_request.head.repo.fork && github.event_name == 'pull_request'
                  && 'ubuntu-latest'
                  || fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","Linux","ARM64","agent-orchestrator"]')) }}
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Docker availability
        id: docker-check
        run: |
          if docker info > /dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Docker not available on this runner 💤 skipping onboarding test"
          fi

      - name: Pick available host ports
        id: pick-ports
        if: steps.docker-check.outputs.available == 'true'
        run: |
          # Reserve file tracks ports already allocated in this step to avoid duplicates
          RESERVED_PORTS_FILE=$(mktemp)
          pick_free_port() {
            local candidate
            local HAS_SS HAS_LSOF
            command -v ss >/dev/null 2>&1 && HAS_SS=1 || HAS_SS=0
            command -v lsof >/dev/null 2>&1 && HAS_LSOF=1 || HAS_LSOF=0
            for candidate in "$@"; do
              # Skip if already reserved by a prior pick_free_port call this step
              if grep -qx "$candidate" "$RESERVED_PORTS_FILE" 2>/dev/null; then
                continue
              fi
              # Skip if a listening process is using this port (check only with available tools)
              if [ "$HAS_SS" = "1" ] && ss -tlnp 2>/dev/null | grep -q ":${candidate} "; then
                continue
              fi
              if [ "$HAS_LSOF" = "1" ] && lsof -iTCP:${candidate} -sTCP:LISTEN 2>/dev/null | grep -q .; then
                continue
              fi
              echo "$candidate" >> "$RESERVED_PORTS_FILE"
              echo "$candidate"
              return
            done
            # All explicit candidates exhausted — use Python to bind an ephemeral port
            RESERVED_PORTS_FILE="$RESERVED_PORTS_FILE" python3 -c "
import socket, os
reserved = set()
rf = os.environ.get('RESERVED_PORTS_FILE', '')
if rf and os.path.exists(rf):
    reserved = set(open(rf).read().split())
for _ in range(20):
    s = socket.socket()
    s.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 0)
    s.bind(('', 0))
    p = str(s.getsockname()[1])
    s.close()
    if p not in reserved:
        if rf:
            open(rf, 'a').write(p + '\n')
        print(p)
        break
"
          }
          echo "dashboard=$(pick_free_port 9000 19000 29000)" >> "$GITHUB_OUTPUT"
          echo "ws=$(pick_free_port 9001 19001 29001)" >> "$GITHUB_OUTPUT"
          echo "dtw=$(pick_free_port 9003 19003 29003)" >> "$GITHUB_OUTPUT"
          rm -f "$RESERVED_PORTS_FILE"

      - name: Set up Docker Buildx
        if: steps.docker-check.outputs.available == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        if: steps.docker-check.outputs.available == 'true'
        working-directory: tests/integration
        run: docker compose build

      - name: Run onboarding test
        if: steps.docker-check.outputs.available == 'true'
        working-directory: tests/integration
        env:
          ONBOARDING_PORT_DASHBOARD: ${{ steps.pick-ports.outputs.dashboard }}
          ONBOARDING_PORT_WS: ${{ steps.pick-ports.outputs.ws }}
          ONBOARDING_PORT_DTW: ${{ steps.pick-ports.outputs.dtw }}
        run: docker compose up --abort-on-container-exit --exit-code-from onboarding-test

      - name: Extract metrics
        if: always() && steps.docker-check.outputs.available == 'true'
        run: |
          docker logs ao-onboarding-test 2>&1 | grep "Total onboarding time" || echo "Metrics not available"

      - name: Cleanup
        if: always() && steps.docker-check.outputs.available == 'true'
        working-directory: tests/integration
        run: docker compose down

      - name: Upload test logs
        if: failure() && steps.docker-check.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: onboarding-test-logs
          path: |
            tests/integration/*.log
          retention-days: 7

