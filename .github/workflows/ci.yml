name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    # SECURITY: Fork-aware runner selection — do not simplify. See PR #273.
    # Falls back to ubuntu-latest when SELF_HOSTED_DISABLED var is set (runner offline) or via fallback var.
    runs-on: ${{ vars.SELF_HOSTED_DISABLED == 'true' && 'ubuntu-latest'
              || (github.event.pull_request.head.repo.fork && github.event_name == 'pull_request'
                  && 'ubuntu-latest'
                  || fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","Linux","ARM64","agent-orchestrator"]')) }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Typecheck
    # SECURITY: Fork-aware runner selection — do not simplify. See PR #273.
    runs-on: ${{ vars.SELF_HOSTED_DISABLED == 'true' && 'ubuntu-latest'
              || (github.event.pull_request.head.repo.fork && github.event_name == 'pull_request'
                  && 'ubuntu-latest'
                  || fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","Linux","ARM64","agent-orchestrator"]')) }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # autonomous-harness must be built before ao-cli (CLI imports from the package)
      # Use '...' suffix to also build dependencies (ao-core)
      - run: pnpm --filter '@jleechanorg/ao-autonomous-harness...' build
      # Build remaining non-web packages (excluding autonomous-harness which was built above)
      - run: pnpm -r --filter '!@jleechanorg/ao-web' --filter '!@jleechanorg/ao-autonomous-harness' build
      # Typecheck all non-web packages + autonomous-harness
      - run: pnpm -r --filter '!@jleechanorg/ao-web' --filter '!@jleechanorg/ao-autonomous-harness' typecheck
      - run: pnpm --filter '@jleechanorg/ao-autonomous-harness' typecheck
      # Build web (Next.js build includes its own typecheck)
      # OOM kill (SIGKILL) from runner memory pressure — retry once before failing
      - name: Build web
        run: |
          pnpm --filter @jleechanorg/ao-web build 2>&1 | tee /tmp/web-build-output.txt
          rc=${PIPESTATUS[0]}
          if [ $rc -eq 137 ]; then
            echo "::warning::Next.js build OOM-killed — retrying once"
            pnpm --filter @jleechanorg/ao-web build
          elif [ $rc -ne 0 ]; then
            exit $rc
          fi

  test:
    name: Test
    timeout-minutes: 60
    # SECURITY: Fork-aware runner selection — do not simplify. See PR #273.
    runs-on: ${{ vars.SELF_HOSTED_DISABLED == 'true' && 'ubuntu-latest'
              || (github.event.pull_request.head.repo.fork && github.event_name == 'pull_request'
                  && 'ubuntu-latest'
                  || fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","Linux","ARM64","agent-orchestrator"]')) }}
    permissions:
      contents: read    # needed for git history and gh pr view in wholesome tests
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # wholesome.test.ts needs full history for commit prefix check
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --filter '!@jleechanorg/ao-web' build
      - name: Install pyyaml (required by validate-config.sh and start-all.sh)
        run: python3 -m pip install --break-system-packages --quiet pyyaml || python3 -m pip install --quiet pyyaml
      - name: Ensure base branch ref is available
        if: github.event_name == 'pull_request'
        # For fork PRs, origin/ is the fork; explicitly fetch base branch as local ref.
        run: git fetch origin ${{ github.base_ref }}:${{ github.base_ref }}
      - name: Kill stray ao processes from previous CI runs
        run: |
          pkill -f 'ao lifecycle-worker' || true
          pkill -f 'ao start' || true
          for i in 1 2 3 4 5; do
            if ! pgrep -f 'ao.*(lifecycle-worker|start)' >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
      - name: Run tests (non-CLI packages)
        run: pnpm -r --filter '!@jleechanorg/ao-cli' --filter '!@jleechanorg/ao-web' test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
      - name: Run shell and evidence-gate-patterns tests
        run: pnpm run test:shell && pnpm run test:evidence-gate-patterns
      - name: Run CLI tests
        id: cli-tests
        run: |
          rm -f /tmp/cli-test-output.txt
          # tee writes line-by-line to file + stdout — prevents summary loss when OOM-killed
          pnpm --filter @jleechanorg/ao-cli test 2>&1 | tee /tmp/cli-test-output.txt; rc=${PIPESTATUS[0]}
          # vitest forceExit sends SIGTERM (rc=143) to itself immediately after the
          # last fork exits. With forks pool, stdout may not flush the aggregate
          # summary line before the SIGTERM handler runs. Accept rc=143 as success
          # when: no failure markers (×) AND either the summary line OR at least one
          # file passed (✓). rc=143 can only come from forceExit (post-completion).
          if [ $rc -eq 143 ]; then
            # Use × (vitest per-test failure marker) only; avoid FAIL which also matches
            # intentional RED-phase output from shell test scripts (test-doctor-expand-home.sh).
            if ! grep -qE "^[[:space:]]*×" /tmp/cli-test-output.txt 2>/dev/null; then
              if grep -qE "(Test Files|Tests)[[:space:]].*passed" /tmp/cli-test-output.txt 2>/dev/null || \
                 grep -qE "^[[:space:]]*✓ " /tmp/cli-test-output.txt 2>/dev/null; then
                echo "CLI tests passed (vitest forceExit sent SIGTERM — treating as success)"
                exit 0
              fi
            fi
            echo "::error::CLI tests SIGTERM'd and no clean test results found"
            tail -50 /tmp/cli-test-output.txt 2>/dev/null || true
            exit 1
          elif [ $rc -ne 0 ]; then
            echo "::warning::CLI tests failed with exit code $rc"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
      - name: Run shell and evidence-gate-patterns tests
        run: pnpm run test:shell && pnpm run test:evidence-gate-patterns
      - name: Run CLI tests
        id: cli-tests
        continue-on-error: true
        run: |
          set +e
          OUTPUT_FILE="/tmp/cli-test-output-${{ github.run_id }}-${{ github.run_attempt }}.txt"
          setsid pnpm --filter @jleechanorg/ao-cli test > "$OUTPUT_FILE" 2>&1 &
          CLI_PID=$!
          CLI_PGRP=$(ps -o pgid= -p $CLI_PID | tr -d ' ')
          TIMEOUT=540
          ELAPSED=0
          while kill -0 $CLI_PID 2>/dev/null; do
            if [ $ELAPSED -ge $TIMEOUT ]; then
              echo "CLI tests timed out after ${TIMEOUT}s — killing process group $CLI_PGRP"
              [ -n "$CLI_PGRP" ] && kill -- -$CLI_PGRP 2>/dev/null || true
              sleep 2
              [ -n "$CLI_PGRP" ] && kill -9 -- -$CLI_PGRP 2>/dev/null || true
              break
            fi
            sleep 5
            ELAPSED=$((ELAPSED + 5))
          done
          wait $CLI_PID 2>/dev/null
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          echo "CLI test exit code: $EXIT_CODE"
          echo "cli_pid=$CLI_PID" >> "$GITHUB_OUTPUT"
          echo "cli_pgrp=$CLI_PGRP" >> "$GITHUB_OUTPUT"
          echo "output_file=$OUTPUT_FILE" >> "$GITHUB_OUTPUT"
          exit $EXIT_CODE
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
      - name: Evaluate CLI test result
        if: always()
        run: |
          OUTPUT="${{ steps.cli-tests.outputs.output_file }}"
          OUTCOME="${{ steps.cli-tests.outcome }}"
          EXIT_CODE="${{ steps.cli-tests.outputs.exit_code }}"
          echo "CLI test step outcome: $OUTCOME"
          echo "CLI test exit code: $EXIT_CODE"
          if [ "$OUTCOME" = "success" ] && [ "$EXIT_CODE" = "0" ]; then
            echo "CLI tests passed normally"
            exit 0
          fi
          if [ ! -f "$OUTPUT" ]; then
            echo "No output file found — treating as failure"
            exit 1
          fi
          if { [ "$EXIT_CODE" = "137" ] || [ "$EXIT_CODE" = "143" ]; } \
            && grep -qE "Tests.*passed" "$OUTPUT" 2>/dev/null; then
            PASSED=$(grep -oP '\d+(?= passed)' "$OUTPUT" | tail -1)
            FAILED=$(grep -oP '\d+(?= failed)' "$OUTPUT" | tail -1)
            if [ -z "$PASSED" ] || [ "$PASSED" -eq 0 ]; then
              echo "No passed count found or zero — treating as failure (possible truncation)"
              exit 1
            fi
            if [ -z "$FAILED" ]; then
              echo "Missing failed count — treating as failure (possible truncation or no test summary emitted)"
              exit 1
            fi
            echo "CLI tests exited abnormally ($EXIT_CODE) but $PASSED tests passed, ${FAILED:-0} failed"
            if [ "$FAILED" -eq 0 ] 2>/dev/null; then
              echo "No test failures detected — treating as success"
              exit 0
            else
              echo "Test failures detected — treating as failure"
              exit 1
            fi
          else
            echo "CLI tests exited with $EXIT_CODE — treating as failure"
            exit 1
          fi
      - name: Kill CLI test process group
        if: always()
        run: |
          CLI_PGRP="${{ steps.cli-tests.outputs.cli_pgrp }}"
          if [ -n "$CLI_PGRP" ]; then
            kill -- -$CLI_PGRP 2>/dev/null || true
          fi
          sleep 1

  builtin-plugin-deps:
    name: Builtin Plugin Deps
    # SECURITY: Fork-aware runner selection — do not simplify. See PR #273.
    runs-on: ${{ vars.SELF_HOSTED_DISABLED == 'true' && 'ubuntu-latest'
              || (github.event.pull_request.head.repo.fork && github.event_name == 'pull_request'
                  && 'ubuntu-latest'
                  || fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","Linux","ARM64","agent-orchestrator"]')) }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify all BUILTIN_PLUGINS are in CLI runtime dependencies
        run: pnpm --filter @jleechanorg/ao-core test -- src/__tests__/test_builtin_plugin_deps.test.ts

  test-web:
    name: Test (Web)
    # SECURITY: Fork-aware runner selection — do not simplify. See PR #273.
    runs-on: ${{ vars.SELF_HOSTED_DISABLED == 'true' && 'ubuntu-latest'
              || (github.event.pull_request.head.repo.fork && github.event_name == 'pull_request'
                  && 'ubuntu-latest'
                  || fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","Linux","ARM64","agent-orchestrator"]')) }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install tmux
        run: |
          if [ "$(uname)" = "Darwin" ]; then
            brew install tmux 2>/dev/null || true
          else
            sudo apt-get update && sudo apt-get install -y tmux
          fi
      - name: Start tmux server
        run: tmux start-server
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --filter '!@jleechanorg/ao-web' build
      - name: Run web server tests (unit + integration)
        run: pnpm --filter @jleechanorg/ao-web exec vitest run server/__tests__/
