name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    # SECURITY: Fork-aware runner selection — do not simplify. See PR #273.
    # Falls back to ubuntu-latest when SELF_HOSTED_DISABLED var is set (runner offline) or via fallback var.
    runs-on: ${{ vars.SELF_HOSTED_DISABLED == 'true' && 'ubuntu-latest'
              || (github.event.pull_request.head.repo.fork && github.event_name == 'pull_request'
                  && 'ubuntu-latest'
                  || fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","Linux","ARM64","agent-orchestrator"]')) }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Typecheck
    # SECURITY: Fork-aware runner selection — do not simplify. See PR #273.
    runs-on: ${{ vars.SELF_HOSTED_DISABLED == 'true' && 'ubuntu-latest'
              || (github.event.pull_request.head.repo.fork && github.event_name == 'pull_request'
                  && 'ubuntu-latest'
                  || fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","Linux","ARM64","agent-orchestrator"]')) }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # autonomous-harness must be built before ao-cli (CLI imports from the package)
      # Use '...' suffix to also build dependencies (ao-core)
      - run: pnpm --filter '@jleechanorg/ao-autonomous-harness...' build
      # Build remaining non-web packages (excluding autonomous-harness which was built above)
      - run: pnpm -r --filter '!@jleechanorg/ao-web' --filter '!@jleechanorg/ao-autonomous-harness' build
      # Typecheck all non-web packages + autonomous-harness
      - run: pnpm -r --filter '!@jleechanorg/ao-web' --filter '!@jleechanorg/ao-autonomous-harness' typecheck
      - run: pnpm --filter '@jleechanorg/ao-autonomous-harness' typecheck
      # Build web (Next.js build includes its own typecheck)
      - run: pnpm --filter @jleechanorg/ao-web build

  test:
    name: Test
    timeout-minutes: 60
    # SECURITY: Fork-aware runner selection — do not simplify. See PR #273.
    runs-on: ${{ vars.SELF_HOSTED_DISABLED == 'true' && 'ubuntu-latest'
              || (github.event.pull_request.head.repo.fork && github.event_name == 'pull_request'
                  && 'ubuntu-latest'
                  || fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","Linux","ARM64","agent-orchestrator"]')) }}
    permissions:
      contents: read    # needed for git history and gh pr view in wholesome tests
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # wholesome.test.ts needs full history for commit prefix check
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --filter '!@jleechanorg/ao-web' build
      - name: Install pyyaml (required by validate-config.sh and start-all.sh)
        run: python3 -m pip install --break-system-packages --quiet pyyaml || python3 -m pip install --quiet pyyaml
      - name: Ensure base branch ref is available
        if: github.event_name == 'pull_request'
        # For fork PRs, origin/ is the fork; explicitly fetch base branch as local ref.
        run: git fetch origin ${{ github.base_ref }}:${{ github.base_ref }}
      - name: Kill stray ao processes from previous CI runs
        run: pkill -f "ao lifecycle-worker" || true; pkill -f "ao start" || true; sleep 1
      - name: Run pnpm test
        id: pnpm-tests
        run: |
          # Use ${PIPESTATUS[0]} so rc reflects pnpm's exit, not tee's. Enabling
          # pipefail would trip GHA's `bash -e` before the handler runs.
          pnpm test 2>&1 | tee /tmp/pnpm-test-output.txt
          rc=${PIPESTATUS[0]}
          # vitest threads pool + forceExit can exit with SIGTERM (signal 15 → exit 143)
          # even when all tests pass. Treat exit 143 (SIGTERM) as success.
          # OOM killer sends SIGKILL (signal 9 → exit 137) — all tests may have
          # passed before the OOM; check the summary line before failing.
          if [ $rc -eq 143 ]; then
            echo "Tests passed (vitest forceExit sent SIGTERM — treating as success)"
            exit 0
          elif [ $rc -eq 137 ]; then
            if grep -q "Tests.*passed" /tmp/pnpm-test-output.txt && ! grep -qE "Tests.*[0-9]+ failed" /tmp/pnpm-test-output.txt; then
              echo "::warning::Test process OOM-killed but tests passed before kill — known CI memory issue"
              exit 0
            fi
            echo "::error::Tests OOM-killed and no passing summary found"
            exit 1
          elif [ $rc -ne 0 ]; then
            echo "::error::Tests failed with exit code $rc"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          GITHUB_BASE_REF: ${{ github.base_ref }}

  builtin-plugin-deps:
    name: Builtin Plugin Deps
    # SECURITY: Fork-aware runner selection — do not simplify. See PR #273.
    runs-on: ${{ vars.SELF_HOSTED_DISABLED == 'true' && 'ubuntu-latest'
              || (github.event.pull_request.head.repo.fork && github.event_name == 'pull_request'
                  && 'ubuntu-latest'
                  || fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","Linux","ARM64","agent-orchestrator"]')) }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify all BUILTIN_PLUGINS are in CLI runtime dependencies
        run: pnpm --filter @jleechanorg/ao-core test -- src/__tests__/test_builtin_plugin_deps.test.ts

  test-web:
    name: Test (Web)
    # SECURITY: Fork-aware runner selection — do not simplify. See PR #273.
    runs-on: ${{ vars.SELF_HOSTED_DISABLED == 'true' && 'ubuntu-latest'
              || (github.event.pull_request.head.repo.fork && github.event_name == 'pull_request'
                  && 'ubuntu-latest'
                  || fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","Linux","ARM64","agent-orchestrator"]')) }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      - name: Start tmux server
        run: tmux start-server
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --filter '!@jleechanorg/ao-web' build
      - name: Run web server tests (unit + integration)
        run: pnpm --filter @jleechanorg/ao-web exec vitest run server/__tests__/
