name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    # Fork PRs use ubuntu-latest to avoid running untrusted code on self-hosted infrastructure.
    # Self-hosted runners are only used for same-repo PRs and direct pushes to protected branches.
    runs-on: ${{ github.event.pull_request.head.repo.fork && github.event_name == 'pull_request'
              && 'ubuntu-latest'
              || fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","Linux","ARM64","agent-orchestrator"]') }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ${{ github.event.pull_request.head.repo.fork && github.event_name == 'pull_request'
              && 'ubuntu-latest'
              || fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","Linux","ARM64","agent-orchestrator"]') }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build all non-web packages
      - run: pnpm -r --filter '!@jleechanorg/ao-web' build
      # Typecheck all non-web packages
      - run: pnpm -r --filter '!@jleechanorg/ao-web' typecheck
      # Build web (Next.js build includes its own typecheck)
      - run: pnpm --filter @jleechanorg/ao-web build

  test:
    name: Test
    runs-on: ${{ github.event.pull_request.head.repo.fork && github.event_name == 'pull_request'
              && 'ubuntu-latest'
              || fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","Linux","ARM64","agent-orchestrator"]') }}
    permissions:
      contents: read    # needed for git history and gh pr view in wholesome tests
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # wholesome.test.ts needs full history for commit prefix check
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --filter '!@jleechanorg/ao-web' build
      - name: Ensure base branch ref is available
        if: github.event_name == 'pull_request'
        # For fork PRs, origin/ is the fork; explicitly fetch base branch as local ref.
        run: git fetch origin ${{ github.base_ref }}:${{ github.base_ref }}
      - run: pnpm test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          GITHUB_BASE_REF: ${{ github.base_ref }}

  test-web:
    name: Test (Web)
    runs-on: ${{ github.event.pull_request.head.repo.fork && github.event_name == 'pull_request'
              && 'ubuntu-latest'
              || fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","Linux","ARM64","agent-orchestrator"]') }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      - name: Start tmux server
        run: tmux start-server
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --filter '!@jleechanorg/ao-web' build
      - name: Run web server tests (unit + integration)
        run: pnpm --filter @jleechanorg/ao-web exec vitest run server/__tests__/
