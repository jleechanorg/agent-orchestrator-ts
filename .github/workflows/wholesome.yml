name: Wholesome PR Checks

on:
  pull_request:
    types: [opened, synchronize, edited, reopened]

concurrency:
  group: wholesome-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr-title-prefix:
    name: PR Title [agento] Prefix
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title prefix
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          # Use awk to extract only the first line — safe against script injection
          FIRST_LINE=$(printf '%s\n' "$TITLE" | awk 'NR==1')
          # case anchors to start of string: pattern must be at the beginning
          case "$FIRST_LINE" in
            '[agento]'*) echo "PASS: PR title has [agento] prefix" ;;
            *) echo "FAIL: PR title must start with '[agento]'"
               echo "Current title: $FIRST_LINE"
               exit 1 ;;
          esac

  evidence-section:
    name: Evidence Section Present
    runs-on: ubuntu-latest
    outputs:
      found: ${{ steps.check.outputs.found }}
    steps:
      - name: Check for Evidence section in PR body
        id: check
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          BODY="$PR_BODY"
          echo "PR body length: ${#BODY} chars"

          if [ ${#BODY} -eq 0 ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "reason=empty_body" >> "$GITHUB_OUTPUT"
            echo "FAIL: Empty PR body — ## Evidence section is required."
            exit 1
          fi

          # Use anchored regex: ## must be at start of line, followed by space + "Evidence" + space or EOL
          # grep -E enables extended regex; anchors ensure this is a markdown H2, not a word-in-sentence
          if printf '%s' "$BODY" | grep -qiE '^[[:space:]]*##[[:space:]]+[Ee]vidence([[:space:]]|$)'; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "reason=evidence_section_found" >> "$GITHUB_OUTPUT"
            echo "PASS: ## Evidence section found"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "reason=no_evidence_section" >> "$GITHUB_OUTPUT"
            echo "FAIL: No ## Evidence section found in PR body."
            echo ""
            echo "Every PR must include an Evidence section in the body."
            echo "Format:"
            echo '  ## Evidence'
            echo '  **Claim class**: <type>'
            echo '  **Verdict**: PASS'
            echo '  **Media**: <screenshot path or terminal output>'
            echo ""
            echo "See /pr-media skill for automated capture workflow."
            exit 1
          fi

  evidence-media-attachment:
    name: Evidence Has Media Attachment
    runs-on: ubuntu-latest
    needs: evidence-section
    # Only meaningful if Evidence section was found
    if: needs.evidence-section.outputs.found == 'true'
    env:
      PR_BODY: ${{ github.event.pull_request.body }}
    steps:
      - name: Check Evidence section has media (image or code block)
        run: |
          BODY="$PR_BODY"

          # Extract only the Evidence section content: from "## Evidence" to the next "## " heading
          # This prevents media from later sections (e.g. "## Other" with ![img]) from incorrectly passing the gate
          # Use awk for robust multi-line section boundary parsing
          EVIDENCE=$(printf '%s\n' "$BODY" | awk '
            /^[[:space:]]*## [Ee]vidence/ { in_section=1; next }
            in_section && /^[[:space:]]*## / { exit }
            in_section { print }
          ')

          if [ -z "$EVIDENCE" ]; then
            echo "No Evidence section found to validate"
            exit 1
          fi

          echo "=== Evidence section ==="
          printf '%s\n' "$EVIDENCE" | head -30
          echo "========================"

          # Check for markdown image attachment: ![alt](url)
          HAS_IMAGE=false
          if printf '%s' "$EVIDENCE" | grep -qiE '!\[.*\]\(https?://'; then
            echo "PASS: Markdown image with URL found in Evidence section"
            HAS_IMAGE=true
          elif printf '%s' "$EVIDENCE" | grep -qiE '\*\*Media\*\*.*\.(png|jpg|jpeg|gif|webp|mp4|webm)'; then
            echo "PASS: Media file path found in Evidence section"
            HAS_IMAGE=true
          fi

          # Check for terminal output / code block
          HAS_CODE=false
          if printf '%s' "$EVIDENCE" | grep -q '```'; then
            echo "PASS: Code block found in Evidence section"
            HAS_CODE=true
          elif printf '%s' "$EVIDENCE" | grep -qiF 'test output'; then
            echo "PASS: 'test output' reference found in Evidence section"
            HAS_CODE=true
          elif printf '%s' "$EVIDENCE" | grep -qiF 'terminal output'; then
            echo "PASS: 'terminal output' reference found in Evidence section"
            HAS_CODE=true
          fi

          # Pass if either media image or code output is present
          if [ "$HAS_IMAGE" = "true" ] || [ "$HAS_CODE" = "true" ]; then
            echo ""
            echo "Evidence section contains media: image=$HAS_IMAGE code=$HAS_CODE"
            exit 0
          else
            echo ""
            echo "FAIL: Evidence section exists but contains no media attachment."
            echo "Expected one of:"
            echo "  - Markdown image with URL: ![alt](https://...)"
            echo "  - Media file path: **Media**: ... .png/.jpg/.gif/.mp4/..."
            echo "  - Code block: \`\`\`...\`\`\`"
            echo "  - Text reference: 'test output' or 'terminal output'"
            exit 1
          fi
