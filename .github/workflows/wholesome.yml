name: Wholesome PR Checks

on:
  pull_request:
    types: [opened, synchronize, edited, reopened]

concurrency:
  group: wholesome-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # bd-fisn: Skip evidence-specific checks for merged/closed PRs.
  # A merged PR stops receiving pull_request events, so stale failed check runs
  # can never be overwritten. These checks are pre-merge gates; post-merge
  # they have no function and would permanently block the PR from showing green.
  # Using GitHub Actions native if: expressions (not bash string comparison)
  # to avoid type coercion issues (merged is a boolean, not a string "true"/"false").
  _merged-guard:
    name: Skip for merged/closed PRs
    runs-on: ${{ fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","Linux","ARM64","agent-orchestrator"]') }}
    outputs:
      skip: ${{ github.event.pull_request.merged == true || github.event.action == 'closed' }}
    steps:
      - run: 'echo "check complete"'

  pr-title-prefix:
    name: PR Title [agento] Prefix
    # Fork PRs use ubuntu-latest to avoid running untrusted code on self-hosted infrastructure.
    runs-on: ${{ github.event.pull_request.head.repo.fork && github.event_name == 'pull_request'
              && 'ubuntu-latest'
              || fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","Linux","ARM64","agent-orchestrator"]') }}
    steps:
      - name: Check PR title prefix
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Sanitize PR_TITLE: strip newlines and GitHub annotation commands to prevent log injection
          SAFE_PR_TITLE="$(printf '%s' "$PR_TITLE" | tr -d '\n\r' | sed 's/::/??/g')"
          case "$SAFE_PR_TITLE" in
            \[agento\]*) echo "PASS: PR title has [agento] prefix" ;;
            *) echo "FAIL: PR title must start with '[agento]'"
               echo "Current title: $SAFE_PR_TITLE"
               exit 1 ;;
          esac

  evidence-section:
    name: Evidence Section Present
    # Fork PRs use ubuntu-latest to avoid running untrusted code on self-hosted infrastructure.
    runs-on: ${{ github.event.pull_request.head.repo.fork && github.event_name == 'pull_request'
              && 'ubuntu-latest'
              || fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","Linux","ARM64","agent-orchestrator"]') }}
    needs: [_merged-guard]
    if: needs._merged-guard.outputs.skip != 'true'
    outputs:
      found: ${{ steps.check.outputs.found }}
    steps:
      - name: Check for Evidence section in PR body
        id: check
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          BODY="$PR_BODY"
          # Convert GitHub-escaped literal \n sequences to actual newlines before parsing.
          BODY=$(printf '%s' "$BODY" | sed 's/\\n/\n/g; s/\\r/\r/g')
          echo "PR body length: ${#BODY} chars"

          if [ ${#BODY} -eq 0 ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "reason=empty_body" >> "$GITHUB_OUTPUT"
            echo "FAIL: Empty PR body — ## Evidence section is required."
            exit 1
          fi

          # Use grep -F (fixed-string, case-insensitive) to match the ## Evidence header.
          # The PR body may be a single line with literal \n characters, so anchored regex
          # (^[[:space:]]*## Evidence) fails — use grep -F instead to find the pattern inline.
          if printf '%s' "$BODY" | grep -qiF '## Evidence'; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "reason=evidence_section_found" >> "$GITHUB_OUTPUT"
            echo "PASS: ## Evidence section found"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "reason=no_evidence_section" >> "$GITHUB_OUTPUT"
            echo "FAIL: No ## Evidence section found in PR body."
            echo ""
            echo "Every PR must include an Evidence section in the body."
            echo "Format:"
            echo '  ## Evidence'
            echo '  **Claim class**: <type>'
            echo '  **Verdict**: PASS'
            echo '  **Media**: <screenshot path or **Test output**: <value>>'
            echo ""
            echo "See /pr-media skill for automated capture workflow."
            exit 1
          fi

  actionlint:
    name: Actionlint (Workflow Lint)
    # Fork PRs use ubuntu-latest to avoid running untrusted code on self-hosted infrastructure.
    runs-on: ${{ github.event.pull_request.head.repo.fork && github.event_name == 'pull_request'
              && 'ubuntu-latest'
              || fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","Linux","ARM64","agent-orchestrator"]') }}
    steps:
      - uses: actions/checkout@v4

      - name: Install and run actionlint
        run: |
          # Normalize runner.arch to actionlint's naming: X64→amd64, ARM64→arm64
          ARCH_SUFFIX=$(echo "${{ runner.arch }}" | tr '[:upper:]' '[:lower:]' | sed 's/x64/amd64/')
          curl -sfL \
            "https://github.com/rhysd/actionlint/releases/download/v1.7.4/actionlint_1.7.4_linux_${ARCH_SUFFIX}.tar.gz" \
            | tar -xz -C /usr/local/bin
          # Use config file to suppress known false positives in existing workflows
          actionlint -config-file .actionlint.yaml .github/workflows/*.yml || {
            EXIT=$?
            # Exit 1 = warnings only (acceptable); exit 2/3 = errors (fail)
            # Exit 0 = no issues
            [ $EXIT -eq 1 ] && exit 0 || exit $EXIT
          }

  evidence-media-attachment:
    name: Evidence Has Media Attachment
    # Fork PRs use ubuntu-latest to avoid running untrusted code on self-hosted infrastructure.
    runs-on: ${{ github.event.pull_request.head.repo.fork && github.event_name == 'pull_request'
              && 'ubuntu-latest'
              || fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","Linux","ARM64","agent-orchestrator"]') }}
    needs: [_merged-guard, evidence-section]
    # Only meaningful if Evidence section was found
    if: needs._merged-guard.outputs.skip != 'true' && needs.evidence-section.outputs.found == 'true'
    env:
      PR_BODY: ${{ github.event.pull_request.body }}
    steps:
      - name: Check Evidence section has media (image or code block)
        run: |
          BODY="$PR_BODY"

          # Convert GitHub-escaped literal \n sequences to actual newlines before parsing.
          # GHA passes multi-line PR body as literal backslash-n strings, not real newlines.
          BODY=$(printf '%s' "$BODY" | sed 's/\\n/\n/g; s/\\r/\r/g')

          # Extract the Evidence section (from ## Evidence marker to next ## section or EOF).
          # Use grep -i for case-insensitive matching, then extract to the next ## heading.
          # The PR body may contain literal \n (backslash+n) instead of actual newlines, so we use
          # grep -F (fixed-string) to match the "## Evidence" pattern wherever it appears.
          # Use tr to handle single-line bodies with literal \n as actual line separators.
          # bd-ara.3: explicit character class [Ee] avoids [[:space:]]+ matching \n on some runners.
          echo "DEBUG PR_BODY chars: ${#PR_BODY}"
          echo "DEBUG BODY (after sed) chars: ${#BODY}"
          if ! printf '%s' "$BODY" | grep -qiF '## Evidence'; then
            echo "No ## Evidence section found in PR body"
            exit 1
          fi
          EVIDENCE=$(printf '%s' "$BODY" \
            | tr '\n' '\x00' \
            | xargs -0 printf '%s\n' \
            | awk '
              BEGIN { capture=0 }
              /^[[:space:]]*##[[:space:]]+[Ee][Vv][Ii][Dd][Ee][Nn][Cc][Ee]([[:space:]]|$)/ { capture=1; next }
              capture && /^[[:space:]]*##[[:space:]]+[Ss][Uu][Mm][Mm][Aa][Rr][Yy]/ { exit }
              capture && /^[[:space:]]*##[[:space:]]+/ { exit }
              capture { print }
            ')

          if [ -z "$EVIDENCE" ]; then
            echo "No Evidence section found to validate"
            exit 1
          fi

          echo "=== Evidence section ==="
          printf '%s\n' "$EVIDENCE" | head -30
          echo "========================"

          # Check for markdown image attachment: require HTTPS URL scheme
          HAS_IMAGE=false
          if printf '%s' "$EVIDENCE" | grep -qiE '!\[[^]]*\]\(https://[^)]+\)'; then
            echo "PASS: Markdown image with HTTPS URL found in Evidence section"
            HAS_IMAGE=true
          elif printf '%s' "$EVIDENCE" | grep -qiE '\*\*Media\*\*:[[:space:]]*https://[^[:space:]]+\.(png|jpg|jpeg|gif|webp|mp4|webm)'; then
            echo "PASS: Media with HTTPS URL found in Evidence section"
            HAS_IMAGE=true
          fi

          # Check for terminal output / code block
          HAS_CODE=false
          if printf '%s' "$EVIDENCE" | grep -q '```'; then
            echo "PASS: Code block found in Evidence section"
            HAS_CODE=true
          elif printf '%s' "$EVIDENCE" | grep -qiE '\*\*(Test|Terminal) output\*\*:[[:space:]]+\S'; then
            echo "PASS: Structured output reference found in Evidence section"
            HAS_CODE=true
          fi

          # Pass if either media image or code output is present
          if [ "$HAS_IMAGE" = "true" ] || [ "$HAS_CODE" = "true" ]; then
            echo ""
            echo "Evidence section contains media: image=$HAS_IMAGE code=$HAS_CODE"
            exit 0
          else
            echo ""
            echo "FAIL: Evidence section exists but contains no media attachment."
            echo "Expected one of:"
            echo "  - Markdown image with URL: ![alt](https://...)"
            echo "  - Media with HTTPS: **Media**: https://... .png/.jpg/.gif/.mp4/..."
            echo "  - Code block: \`\`\`...\`\`\`"
            echo "  - Structured text reference: **Test output**: or **Terminal output**:"
            exit 1
          fi
