name: Wholesome PR Checks

on:
  pull_request:
    types: [opened, synchronize, edited, reopened]

# Per-workflow concurrency group prevents cross-workflow blocking when multiple
# workflows share the same PR number.
concurrency:
  group: wholesome-pr-checks-${{ github.event.pull_request.number }}-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  # bd-fisn: Skip evidence-specific checks for merged/closed PRs.
  # A merged PR stops receiving pull_request events, so stale failed check runs
  # can never be overwritten. These checks are pre-merge gates; post-merge
  # they have no function and would permanently block the PR from showing green.
  # Using GitHub Actions native if: expressions (not bash string comparison)
  # to avoid type coercion issues (merged is a boolean, not a string "true"/"false").
  _merged-guard:
    name: Skip for merged/closed PRs
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ github.event.pull_request.merged == true || github.event.action == 'closed' }}
    steps:
      - run: 'echo "check complete"'

  pr-title-prefix:
    name: PR Title [agento] Prefix
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title prefix
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Sanitize PR_TITLE: strip newlines and GitHub annotation commands to prevent log injection
          SAFE_PR_TITLE="$(printf '%s' "$PR_TITLE" | tr -d '\n\r' | sed 's/::/??/g')"
          case "$SAFE_PR_TITLE" in
            \[agento\]*) echo "PASS: PR title has [agento] prefix" ;;
            *) echo "FAIL: PR title must start with '[agento]'"
               echo "Current title: $SAFE_PR_TITLE"
               exit 1 ;;
          esac

  evidence-section:
    name: Evidence Section Present
    runs-on: ubuntu-latest
    needs: [_merged-guard]
    if: needs._merged-guard.outputs.skip != 'true'
    outputs:
      found: ${{ steps.check.outputs.found }}
    steps:
      - name: Check for Evidence section in PR body
        id: check
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          BODY="$PR_BODY"
          echo "PR body length: ${#BODY} chars"

          if [ ${#BODY} -eq 0 ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "reason=empty_body" >> "$GITHUB_OUTPUT"
            echo "FAIL: Empty PR body — ## Evidence section is required."
            exit 1
          fi

          # Use anchored regex: ## must be at start of line, followed by space + "Evidence" + space or EOL
          # grep -E enables extended regex; anchors ensure this is a markdown H2, not a word-in-sentence
          if printf '%s' "$BODY" | grep -qiE '^[[:space:]]*##[[:space:]]+[Ee]vidence([[:space:]]|$)'; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "reason=evidence_section_found" >> "$GITHUB_OUTPUT"
            echo "PASS: ## Evidence section found"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "reason=no_evidence_section" >> "$GITHUB_OUTPUT"
            echo "FAIL: No ## Evidence section found in PR body."
            echo ""
            echo "Every PR must include an Evidence section in the body."
            echo "See CLAUDE.md — Evidence Bundle v2 (repro gist + terminal media + terminal test logs + UI media or N/A)."
            echo "See /pr-media skill for automated capture workflow."
            exit 1
          fi

  actionlint:
    name: Actionlint (Workflow Lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.1

      - name: Install and run actionlint
        run: |
          # Download actionlint binary directly from GitHub releases
          curl -sfL \
            "https://github.com/rhysd/actionlint/releases/download/v1.7.4/actionlint_1.7.4_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin
          # Use config file to suppress known false positives in existing workflows
          actionlint -config-file .actionlint.yaml .github/workflows/*.yml || {
            EXIT=$?
            # Exit 1 = warnings only (acceptable); exit 2/3 = errors (fail)
            # Exit 0 = no issues
            [ $EXIT -eq 1 ] && exit 0 || exit $EXIT
          }

  pr-rescue-script-syntax:
    name: PR rescue script (bash -n)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.1

      - name: Syntax-check scripts/pr-rescue-status.sh
        run: bash -n scripts/pr-rescue-status.sh

  evidence-media-attachment:
    name: Evidence Has Media Attachment
    runs-on: ubuntu-latest
    needs: [_merged-guard, evidence-section]
    # Only meaningful if Evidence section was found
    if: needs._merged-guard.outputs.skip != 'true' && needs.evidence-section.outputs.found == 'true'
    permissions:
      contents: read
      pull-requests: read
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check Evidence Bundle v2 (block-level enforcement)
        run: |-
          # Read PR body via heredoc with single-quoted delimiter to prevent
          # shell re-interpretation of $() expressions in the body text.
          BODY=$(cat <<'GITHUB_PR_BODY'
${{ github.event.pull_request.body }}
GITHUB_PR_BODY
)

          # Extract claim class — normalize to lowercase short form for CLAIM-based enforcement
          # Supports: **Claim class**: value and "- **Claim class**: ..." list formats.
          CLAIM=$(printf '%s' "$BODY" \
            | grep -i '\*\*Claim class' | grep -v '^- ' | head -1 \
            | tr -d '*' \
            | sed 's/.*Claim class: *//I' \
            | sed 's/(.*//' \
            | tr '[:upper:]' '[:lower:]' \
            | tr ' ' '-' | tr -d '\t' \
            | sed 's/^[ \t-]*//;s/[ \t-]*$//')
          # Fallback to list-bullet format
          if [ -z "$CLAIM" ]; then
            CLAIM=$(printf '%s' "$BODY" \
              | grep -i '^-.*\*\*Claim class' | head -1 \
              | tr -d '*' \
              | sed 's/.*Claim class: *//I' \
              | sed 's/(.*//' \
              | tr '[:upper:]' '[:lower:]' \
              | tr ' ' '-' | tr -d '\t' \
              | sed 's/^[ \t-]*//;s/[ \t-]*$//')
          fi
          # Normalize long-form names to canonical short forms
          case "$CLAIM" in
            unit-test-coverage|unit-test) CLAIM="unit" ;;
            integration-test) CLAIM="integration" ;;
            pr-lifecycle) CLAIM="pr-lifecycle-e2e" ;;
            merge-gate-green) CLAIM="merge-gate" ;;
          esac
          echo "Claim class: $CLAIM"

          # bd-vidcap: frontend file paths for UI video requirement (deterministic globs).
          if ! FILES="$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" --paginate --jq '.[].filename' 2>/dev/null)"; then
            echo "FAIL: Could not list PR files for frontend detection"
            exit 1
          fi
          FRONTEND_TOUCH=false
          if printf '%s' "$FILES" | grep -qiE '\.(tsx|jsx|vue|svelte)$'; then
            FRONTEND_TOUCH=true
          fi
          echo "frontend_touch=$FRONTEND_TOUCH"

          # Extract Evidence section — merged approach:
          # bd-ara.2's tolower() for mawk portability + HTML comment stripping
          EVIDENCE_SECTION=$(printf '%s\n' "$BODY" | awk '
            # Strip single-line HTML comments inline (CR bd-357-fix).
            # gsub replaces <!--...--> with nothing rather than { next }, preserving
            # surrounding text so downstream label checks (e.g. **UI media:) work.
            { gsub(/<!--[^-]*-->/, "") }
            # Strip multi-line HTML comment open/close
            # Only enter multi-line mode if <!-- is NOT immediately followed by -->,
            # otherwise single-line <!--...--> comments would be treated as multi-line openers.
            /^[[:space:]]*<!--/ && $0 !~ /<!--.*-->/ { in_comment=1; next }
            in_comment && /^[[:space:]]*-->/ { in_comment=0; next }
            in_comment { next }
            # Case-insensitive Evidence section header (tolower for mawk portability)
            tolower($0) ~ /^[[:space:]]*##[[:space:]]+evidence([[:space:]]|$)/ { in_section=1; next }
            in_section && /^[[:space:]]*##[[:space:]]/ { exit }
            in_section { print }
          ')

          if [ -z "$EVIDENCE_SECTION" ]; then
            echo "No Evidence section found to validate"
            exit 1
          fi

          echo "=== Evidence section (preview) ==="
          printf '%s\n' "$EVIDENCE_SECTION" | head -40
          echo "===================================="

          # Extract block-level content for targeted checks.
          # Actual label format: **Label**: value (bold, colon after closing **).
          TM_BLOCK=$(printf '%s' "$EVIDENCE_SECTION" | awk '
            /[*][*]Terminal media[*][*]:/ { show=1 }
            show && /[*][*]Terminal test output[*][*]:/ { exit }
            show { print }
          ')
          TTO_BLOCK=$(printf '%s' "$EVIDENCE_SECTION" | awk '
            /[*][*]Terminal test output[*][*]:/ { show=1 }
            show && /[*][*]UI media[*][*]:/ { exit }
            show { print }
          ')
          UI_BLOCK=$(printf '%s' "$EVIDENCE_SECTION" | awk '
            /[*][*]UI media[*][*]:/ { show=1 }
            show { print }
          ')

          # 1) Repro gist URL is mandatory — scope to Repro gist line only (not entire EVIDENCE_SECTION)
          # Label format: **Repro gist**: <url> (bold text, colon after closing **)
          REPRO_LINE=$(printf '%s' "$EVIDENCE_SECTION" | grep -iF '**Repro gist**:' | head -1)
          if [ -z "$REPRO_LINE" ]; then
            echo "FAIL: Missing '**Repro gist**' label in Evidence section"
            exit 1
          fi
          if ! printf '%s' "$REPRO_LINE" | grep -qE 'https://gist\.github\.com/[^[:space:]]+'; then
            echo "FAIL: Missing required gist URL (https://gist.github.com/...) in Evidence section"
            exit 1
          fi
          echo "Repro gist: PASS"

          # 2) Terminal media (bd-vidcap: HTTPS video for non-unit) + tmux/terminal context + caption
          # Unit claims are exempt: no runtime tmux/terminal output for pure-docs/automation PRs.
          # Unit claims exempt from runtime terminal proof (evidence-gate.yml handles unit coverage separately).
          if ! printf '%s' "$TM_BLOCK" | grep -qF '**Terminal media**:'; then
            echo "FAIL: Missing '**Terminal media**' label in Evidence section"
            exit 1
          fi
          if [ "$CLAIM" != "unit" ]; then
            HAS_TM_VIDEO=false
            if printf '%s' "$TM_BLOCK" | grep -qiE 'https://[^[:space:]]+\.(mp4|gif|webm|mov)([/?#]|$)'; then HAS_TM_VIDEO=true; fi
            if [ "$HAS_TM_VIDEO" = "false" ] && printf '%s' "$TM_BLOCK" | grep -qiE 'https://github\.com/user-attachments/assets/[a-f0-9-]+'; then HAS_TM_VIDEO=true; fi
            if [ "$HAS_TM_VIDEO" = "false" ] && printf '%s' "$TM_BLOCK" | grep -qiE '!\[[^]]*\]\(https://[^)]+\.(mp4|gif|webm|mov)([?#)]|$)'; then HAS_TM_VIDEO=true; fi
            if [ "$HAS_TM_VIDEO" != "true" ]; then
              echo "FAIL: **Terminal media** must include a captioned HTTPS video URL (.mp4, .gif, .webm, .mov) or GitHub user-attachments asset URL"
              exit 1
            fi
            TM_URL_LINE=$(printf '%s' "$TM_BLOCK" | grep -n 'https://' | head -1 | cut -d: -f1)
            # Strip the bold label prefix from the URL line so only the caption survives.
            # awk strips "**Terminal media**: " from inline label+URL+caption lines.
            CAPTION_LINES=$(printf '%s' "$TM_BLOCK" | tail -n +"${TM_URL_LINE:-1}" | grep -v '^[[:space:]]*$' | grep -v '^[[:space:]]*```' | awk '{ sub(/^\*\*Terminal media\*\*:[[:space:]]*/, ""); print }')
            if [ -z "$CAPTION_LINES" ]; then
              echo "FAIL: Terminal media must include caption text (inline or following lines)"
              exit 1
            fi
            if ! printf '%s' "$CAPTION_LINES" | grep -qiE 'tmux|terminal'; then
              echo "FAIL: Terminal media caption must reference tmux or terminal context (not only the **Terminal media** label)"
              exit 1
            fi
            echo "Terminal media + caption: PASS (video URL)"
          else
            # Unit claim: accept N/A text for terminal media (no runtime tmux output for docs/automation PRs)
            if printf '%s' "$TM_BLOCK" | grep -qE 'https://[^[:space:]]+'; then
              echo "Terminal media + caption: PASS (URL present)"
            elif printf '%s' "$TM_BLOCK" | grep -qiF 'N/A'; then
              echo "Terminal media: PASS (unit claim — N/A accepted)"
            else
              echo "FAIL: Terminal media requires HTTPS URL or 'N/A' for unit claims"
              exit 1
            fi
          fi

          # 3) Terminal test output — mandatory in addition to terminal media (fenced logs + concrete test command)
          # Unit claims: exempt from the concrete-test-command requirement (evidence-gate handles
          # unit coverage separately). Unit claims still need the fenced block label+code presence.
          if ! printf '%s' "$TTO_BLOCK" | grep -qF '**Terminal test output**:'; then
            echo "FAIL: Missing '**Terminal test output**' label in Evidence section"
            exit 1
          fi
          if ! printf '%s' "$TTO_BLOCK" | grep -qE '```|~~~'; then
            echo "FAIL: Terminal test output must include a fenced code block with real logs"
            exit 1
          fi
          # Only enforce concrete test command for non-unit claims; unit claims pass without it
          # FIX bd-ao357r2: add '\$[[:space:]]+bash' and '\$[[:space:]]+sh' as standalone alternatives
          # so that 'bash scripts/...' (no 'test' on same line) also qualifies.
          if [ "$CLAIM" != "unit" ] && [ -n "$CLAIM" ]; then
            if ! printf '%s' "$TTO_BLOCK" | grep -qiE '\$[ \t]*(pnpm|npm|yarn|bun|pnpm exec|npx).+test|\$\.?/[a-z_-]+ (test|spec|rake)|bash.+test|sh.+test|\$[[:space:]]+bash[[:space:]]|\$[[:space:]]+sh[[:space:]]|python -m pytest|\b(pnpm|npm|yarn|bun|npx|pnpm exec).+\b(test|jest|vitest|mocha|rspec|pytest)\b|\bgo test\b|\bcargo test\b|\brake test\b|\bmvn test\b|\bgradle test\b|\bmake test\b|\bbun test\b|\brspec\b'; then
              echo "FAIL: Terminal test output must mention at least one concrete test command"
              exit 1
            fi
          fi
          echo "Terminal test output: PASS"

          # 4) UI media OR exact no-UI line (bd-vidcap: frontend PRs need captioned UI video when UI is shown)
          if printf '%s' "$EVIDENCE_SECTION" | grep -qF 'N/A - no UI changes'; then
            echo "UI media: PASS (exact N/A - no UI changes)"
          else
            if [ "$FRONTEND_TOUCH" = "true" ]; then
              HAS_UI_VIDEO=false
              if printf '%s' "$UI_BLOCK" | grep -qiE 'https://[^[:space:]]+\.(mp4|gif|webm|mov)([/?#]|$)'; then HAS_UI_VIDEO=true; fi
              if [ "$HAS_UI_VIDEO" = "false" ] && printf '%s' "$UI_BLOCK" | grep -qiE 'https://github\.com/user-attachments/assets/[a-f0-9-]+'; then HAS_UI_VIDEO=true; fi
              if [ "$HAS_UI_VIDEO" = "false" ] && printf '%s' "$UI_BLOCK" | grep -qiE '!\[[^]]*\]\(https://[^)]+\.(mp4|gif|webm|mov)([?#)]|$)'; then HAS_UI_VIDEO=true; fi
              if [ "$HAS_UI_VIDEO" != "true" ]; then
                echo "FAIL: Frontend PRs require **UI media** captioned video URL (.mp4, .gif, .webm, .mov) or GitHub user-attachments, or exact N/A - no UI changes"
                exit 1
              fi
            else
              if ! printf '%s' "$UI_BLOCK" | grep -qiE 'https://[^[:space:]]+'; then
                echo "FAIL: Add exact text: N/A - no UI changes  OR  **UI media**: <HTTPS screenshot/video URL> with caption"
                exit 1
              fi
            fi
            if ! printf '%s' "$UI_BLOCK" | grep -qiE 'caption'; then
              echo "FAIL: UI media must include caption text (inline or following lines)"
              exit 1
            fi
            echo "UI media + caption: PASS"
          fi

          # 5) Reject placeholders/fabrication language
          NON_CODE_EVIDENCE=$(printf '%s\n' "$EVIDENCE_SECTION" | awk '
            /^[[:space:]]*```/ { in_code=(!in_code); next }
            /^[[:space:]]*~~~/ { in_code=(!in_code); next }
            !in_code { print }
          ')
          if printf '%s' "$NON_CODE_EVIDENCE" | grep -qiE '\bsimulated\b'; then
            echo "FAIL: Evidence contains 'simulated' — fabricated output is not valid evidence."
            exit 1
          fi
          if printf '%s' "$NON_CODE_EVIDENCE" | grep -qiE 'https?://(www\.)?example\.com'; then
            echo "FAIL: Evidence contains example.com placeholder URL"
            exit 1
          fi
          if printf '%s' "$NON_CODE_EVIDENCE" | grep -qiE '<path>|<value>|:[[:space:]]*(TODO|TBD)([[:space:][:punct:]]|$)'; then
            echo "FAIL: Evidence contains placeholder template text"
            exit 1
          fi

          # Unit claims: exempt from Bundle v2 field enforcement (evidence-gate handles unit separately)
          if [ "$CLAIM" = "unit" ] || [ -z "$CLAIM" ]; then
            echo ""
            echo "PASS: Evidence section has no placeholders (unit claim — evidence-gate handles Bundle v2)"
            exit 0
          fi

          # integration+ claims: enforce Bundle v2 — repro gist + UI media + self-validation language
          # (terminal checks 1-4 already passed above)
          HAS_UI_MEDIA=false
          if printf '%s' "$EVIDENCE_SECTION" | grep -qF 'N/A - no UI changes'; then
            HAS_UI_MEDIA=true
          elif printf '%s' "$UI_BLOCK" | grep -qF '**UI media**:' && printf '%s' "$UI_BLOCK" | grep -qiE 'N/A.*no UI|N/A - no UI'; then
            HAS_UI_MEDIA=true
          elif [ "$FRONTEND_TOUCH" = "true" ]; then
            if printf '%s' "$UI_BLOCK" | grep -qiE 'https://[^[:space:]]+\.(mp4|gif|webm|mov)([/?#]|$)'; then HAS_UI_MEDIA=true; fi
            if [ "$HAS_UI_MEDIA" = "false" ] && printf '%s' "$UI_BLOCK" | grep -qiE 'https://github\.com/user-attachments/assets/[a-f0-9-]+'; then HAS_UI_MEDIA=true; fi
            if [ "$HAS_UI_MEDIA" = "false" ] && printf '%s' "$UI_BLOCK" | grep -qiE '!\[[^]]*\]\(https://[^)]+\.(mp4|gif|webm|mov)([?#)]|$)'; then HAS_UI_MEDIA=true; fi
          else
            if printf '%s' "$UI_BLOCK" | grep -qiE 'https://[^[:space:]]+\.(png|jpg|jpeg|gif|webp|mp4|webm|mov)'; then
              HAS_UI_MEDIA=true
            elif printf '%s' "$UI_BLOCK" | grep -qiE '!\[[^]]*\]\(https://[^)]+\.(png|jpg|jpeg|gif|webp|mp4|webm|mov)\)'; then
              HAS_UI_MEDIA=true
            fi
          fi

          # bd-357-fix: CLAUDE.md line 273 requires self-validation language in TTO block for non-unit claims.
          HAS_SELF_VALIDATION=false
          if printf '%s' "$TTO_BLOCK" | grep -qiE 'verified|confirmed|reproduced|error case|test passed|test failed|all tests|results? (show|indicate|demonstrate)'; then
            HAS_SELF_VALIDATION=true
          fi

          echo ""
          echo "Bundle v2 standard for non-unit claim (claim=$CLAIM):"
          echo "  repro_gist=pass terminal_media=pass terminal_output=pass ui_media=$HAS_UI_MEDIA self_validation=$HAS_SELF_VALIDATION"
          if [ "$HAS_UI_MEDIA" = "true" ] && [ "$HAS_SELF_VALIDATION" = "true" ]; then
            echo "PASS: Non-unit claim — repro gist + UI media confirmed (wholesome)"
            exit 0
          else
            echo "FAIL: Non-unit claim requires ALL of:"
            echo "  1) **Repro gist**: https://gist.github.com/... URL (pass)"
            echo "  2) **Terminal media**: screenshot/video + tmux caption (pass)"
            echo "  3) **Terminal test output**: fenced block + concrete test command (pass)"
            echo "  4) **UI media**: URL or 'N/A - no UI changes' ($HAS_UI_MEDIA)"
            echo "  5) **Terminal test output** self-validation: verified/confirmed/reproduced language"
            exit 1
          fi

