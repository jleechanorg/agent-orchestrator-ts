name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no publish, no tags)"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Phase 1: detect what the next release type would be
  detect-release:
    name: Detect release type
    runs-on: ${{ fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","self-hosted-mikey"]') }}
    outputs:
      release_type: ${{ steps.detect.outputs.release_type }}
      next_version: ${{ steps.detect.outputs.next_version }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - id: detect
        run: |
          OUTPUT=$(npx semantic-release --dry-run --no-ci 2>&1)
          EXIT=$?
          echo "$OUTPUT"
          NEXT=$(echo "$OUTPUT" | grep -oP 'The next release version is \K[0-9]+\.[0-9]+\.[0-9]+' | head -1 || echo "")
          CURRENT=$(node -p "require('./package.json').version")
          if [ -z "$NEXT" ]; then
            if [ $EXIT -ne 0 ]; then
              echo "release_type=error" >> $GITHUB_OUTPUT
            else
              echo "release_type=none" >> $GITHUB_OUTPUT
            fi
            echo "next_version=" >> $GITHUB_OUTPUT
          else
            MAJOR_CURRENT=$(echo "$CURRENT" | cut -d. -f1)
            MAJOR_NEXT=$(echo "$NEXT" | cut -d. -f1)
            if [ "$MAJOR_NEXT" -gt "$MAJOR_CURRENT" ]; then
              echo "release_type=major" >> $GITHUB_OUTPUT
            else
              MINOR_CURRENT=$(echo "$CURRENT" | cut -d. -f2)
              MINOR_NEXT=$(echo "$NEXT" | cut -d. -f2)
              if [ "$MINOR_NEXT" -gt "$MINOR_CURRENT" ]; then
                echo "release_type=minor" >> $GITHUB_OUTPUT
              else
                echo "release_type=patch" >> $GITHUB_OUTPUT
              fi
            fi
            echo "next_version=$NEXT" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Phase 2a: auto-release for patch/minor
  release-auto:
    name: Release (patch/minor — automatic)
    needs: detect-release
    if: needs.detect-release.outputs.release_type == 'patch' || needs.detect-release.outputs.release_type == 'minor'
    runs-on: ${{ fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","self-hosted-mikey"]') }}
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --filter '!@jleechanorg/ao-web' build
        # Disable husky — gitleaks not installed on runner
      - run: echo "HUSKY=0" >> $GITHUB_ENV
      - run: npx semantic-release ${{ inputs.dry_run && '--dry-run' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com

  # Phase 2b: major releases require human approval
  # Approval mechanism: GitHub environment protection on "major-release" (configured in
  # repo Settings → Environments). Add required reviewers there. The environment gate
  # pauses this job until at least one reviewer approves. Dry-run is always allowed.
  release-major:
    name: Release (major)
    needs: detect-release
    if: needs.detect-release.outputs.release_type == 'major'
    runs-on: ${{ fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","self-hosted-mikey"]') }}
    # Requires repo Settings → Environments → "major-release" with required reviewers set.
    environment: major-release
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Open tracking issue
        run: |
          gh issue create \
            --title "🚨 Major release queued: v${{ needs.detect-release.outputs.next_version }}" \
            --body "A **BREAKING CHANGE** was detected in commits merged to main.

          **Next version:** \`v${{ needs.detect-release.outputs.next_version }}\`

          This workflow run will **publish** the major release.
          To cancel: close this issue or cancel the workflow run." \
            --label "release" \
            --repo ${{ github.repository }} || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --filter '!@jleechanorg/ao-web' build
      - run: echo "HUSKY=0" >> $GITHUB_ENV
      - run: npx semantic-release ${{ inputs.dry_run && '--dry-run' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com

  # No-op when nothing to release
  no-release:
    name: No release needed
    needs: detect-release
    if: needs.detect-release.outputs.release_type == 'none'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No releasable commits since last release."

  # Fail when semantic-release errors (auth/config issues — not no-op)
  release-error:
    name: Release error
    needs: detect-release
    if: needs.detect-release.outputs.release_type == 'error'
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "::error::semantic-release --dry-run failed — check auth, token permissions, and plugin configuration."
          exit 1
