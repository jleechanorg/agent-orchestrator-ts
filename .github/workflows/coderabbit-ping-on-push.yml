name: CodeRabbit ping on push

on:
  push:
    branches-ignore:
      - main
      - master

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: coderabbit-ping-${{ github.repository }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  ping-coderabbit:
    runs-on: ubuntu-latest
    steps:
      - name: Comment on matching open PR
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = context.ref.replace('refs/heads/', '');

            // Skip tag pushes
            if (context.ref.startsWith('refs/tags/')) {
              core.info('Skipping tag push');
              return;
            }

            const { data: prs } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head: `${owner}:${branch}`,
              per_page: 10,
            });

            if (!prs.length) {
              core.info(`No open PR for branch ${branch}; skipping.`);
              return;
            }

            const body = '@coderabbitai all good?';

            for (const pr of prs) {
              const { data: comments } = await github.rest.issues.listComments({
                owner,
                repo,
                issue_number: pr.number,
                per_page: 30,
              });
              const alreadyPosted = comments.some(
                (c) => c.user?.type === 'Bot' && c.body?.trim() === body
              );
              if (alreadyPosted) {
                core.info(`PR #${pr.number} already has ping comment; skipping.`);
                continue;
              }
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body,
              });
              core.info(`Commented on PR #${pr.number}`);
            }
