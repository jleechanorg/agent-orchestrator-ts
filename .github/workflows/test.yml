name: Skeptic Gate CI
on:
  pull_request:
    types: [opened, synchronize, edited, reopened]
  workflow_dispatch:
concurrency:
  group: skeptic-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false
jobs:
  # Workflow name kept as "Skeptic Gate CI" to avoid workflow-name collision
  # with skeptic-gate.yml. Job-level name:"Skeptic Gate" ensures the check run
  # always matches the jq filter in skeptic-cron.yml regardless of workflow name.
  skeptic_gate_check:
    name: Skeptic Gate
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ${{ vars.SELF_HOSTED_DISABLED == 'true' && 'ubuntu-latest'
              || (github.event.pull_request.head.repo.fork && github.event_name == 'pull_request'
                  && 'ubuntu-latest'
                  || fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","Linux","ARM64","agent-orchestrator"]')) }}
    permissions:
      pull-requests: write
      issues: write
      contents: read
    outputs:
      trigger_updated: ${{ steps.post_trigger.outputs.trigger_updated }}
      trigger_sha: ${{ steps.post_trigger.outputs.trigger_sha }}
      request_id: ${{ steps.post_trigger.outputs.request_id }}
    steps:
      - name: Post skeptic trigger comment
        id: post_trigger
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          TRIGGER_SHA="$HEAD_SHA"
          REQUEST_ID="gate-${TRIGGER_SHA}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          # Capture gh api stdout separately from stderr to avoid JSON contamination.
          # gh api writes advisory messages (e.g. rate-limit notices) to stderr; stdout is
          # always pure JSON. We only merge them when gh itself fails so the error message
          # is informative. When gh succeeds, we parse pure JSON from stdout only.
          _GH_STDERR=$(mktemp)
          RESPONSE=$(printf 'SKEPTIC_GATE_TRIGGER\n<!-- skeptic-request-id-%s -->\n<!-- skeptic-head-sha-%s -->\n<!-- skeptic-gate-trigger-%s -->' \
              "$REQUEST_ID" "$TRIGGER_SHA" "$TRIGGER_SHA" \
            | jq -Rs '{body: .}' - \
            | gh api \
              --method POST \
              "repos/${GITHUB_REPOSITORY}/issues/${PR_NUM}/comments" \
              -H "Content-Type: application/json" \
              --input - 2>"$_GH_STDERR")
          _RC=$?
          if [ "$_RC" -ne 0 ]; then
            echo "ERROR: gh api POST failed (rc=$_RC): $(cat "$_GH_STDERR")" >&2
            rm -f "$_GH_STDERR"
            exit 1
          fi
          rm -f "$_GH_STDERR"
          # Parse pure JSON from stdout — no stderr contamination possible.
          TRIGGER_UPDATED=$(echo "$RESPONSE" | jq -r '.updated_at // empty' 2>/dev/null)
          if [ -z "$TRIGGER_UPDATED" ] || [ "$TRIGGER_UPDATED" = "null" ]; then
            echo "ERROR: trigger comment posted but .updated_at missing: ${RESPONSE:0:300}" >&2
            exit 1
          fi
          echo "Trigger posted at: $TRIGGER_UPDATED"
          {
            echo "trigger_updated=$TRIGGER_UPDATED"
            echo "trigger_sha=$TRIGGER_SHA"
            echo "request_id=$REQUEST_ID"
          } >> "$GITHUB_OUTPUT"

      - name: Poll for skeptic VERDICT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          TRIGGER_UPDATED: ${{ steps.post_trigger.outputs.trigger_updated }}
          TRIGGER_SHA: ${{ steps.post_trigger.outputs.trigger_sha }}
          REQUEST_ID: ${{ steps.post_trigger.outputs.request_id }}
          SKEPTIC_BOT_AUTHOR: ${{ vars.SKEPTIC_BOT_AUTHOR || 'jleechan2015' }}
        timeout-minutes: 11  # headroom over POLL_TIMEOUT=10m below
        run: |
          set +e

          if [ -z "$TRIGGER_UPDATED" ] || [ "$TRIGGER_UPDATED" = "null" ]; then
            echo "ERROR: trigger_updated not set — cannot poll" >&2
            exit 1
          fi
          echo "Polling for VERDICT on PR #$PR_NUM (trigger SHA ${TRIGGER_SHA:0:7})"
          echo "Only accepting verdicts after: $TRIGGER_UPDATED"
          echo "REQUEST_ID: $REQUEST_ID"

          # ao skeptic verify runs without REQUEST_ID (local invocation vs GHA).
          # Make the request-id marker check optional — head-sha + trigger-sha are sufficient
          # to uniquely identify a verdict for a given PR+SHA.
          if [ -z "$REQUEST_ID" ] || [ "$REQUEST_ID" = "null" ]; then
            NEED_REQUEST_ID="false"
            echo "REQUEST_ID is empty — verdict matching is SHA-only (accepting ao skeptic verify verdicts)"
          else
            NEED_REQUEST_ID="true"
          fi

          # ao skeptic verify runs without REQUEST_ID (local invocation vs GHA).
          # Make the request-id marker check optional — head-sha + trigger-sha are sufficient
          # to uniquely identify a verdict for a given PR+SHA.
          if [ -z "$REQUEST_ID" ] || [ "$REQUEST_ID" = "null" ]; then
            NEED_REQUEST_ID="false"
            echo "REQUEST_ID is empty — verdict matching is SHA-only (accepting ao skeptic verify verdicts)"
          else
            NEED_REQUEST_ID="true"
          fi

          POLL_TIMEOUT=600  # seconds — MUST match (timeout-minutes - 1min-headroom) * 60
          INTERVAL=15
          MAX_ATTEMPTS=$((POLL_TIMEOUT / INTERVAL))  # = 40; update POLL_TIMEOUT if INTERVAL changes

          PR_STATE_API_FAILURES=0
          COMMENTS_API_FAILURES=0
          for i in $(seq 1 "$MAX_ATTEMPTS"); do
            PR_STATE=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUM}" --jq '.state' 2>&1)
            PR_STATE_EXIT=$?
            if [ "$PR_STATE_EXIT" -ne 0 ]; then
              PR_STATE_API_FAILURES=$((PR_STATE_API_FAILURES + 1))
              echo "API warning: PR state lookup failed (attempt $i): ${PR_STATE:0:100}"
              if [ "$PR_STATE_API_FAILURES" -ge 3 ]; then
                echo "ERROR: Too many consecutive PR state API failures" >&2
                exit 1
              fi
              echo "Attempt $i/$MAX_ATTEMPTS — sleeping ${INTERVAL}s..."
              sleep "$INTERVAL"
              continue
            else
              PR_STATE_API_FAILURES=0
            fi

            if [ "$PR_STATE" = "closed" ]; then
              echo "PR closed — exiting"
              exit 0
            fi

            _RAW_STDERR=$(mktemp)
            RAW_COMMENTS=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUM}/comments" \
              --paginate 2>"$_RAW_STDERR")
            GH_EXIT=$?
            if [ "$GH_EXIT" -ne 0 ]; then
              COMMENTS_API_FAILURES=$((COMMENTS_API_FAILURES + 1))
              echo "API warning: verdict lookup failed (exit=$GH_EXIT, attempt $i): $(cat "$_RAW_STDERR" | head -1)"
              rm -f "$_RAW_STDERR"
              if [ "$COMMENTS_API_FAILURES" -ge 3 ]; then
                echo "ERROR: Too many consecutive verdict comment API failures" >&2
                exit 1
              fi
              echo "Attempt $i/$MAX_ATTEMPTS — sleeping ${INTERVAL}s..."
              sleep "$INTERVAL"
              continue
            fi
            rm -f "$_RAW_STDERR"

            VERDICT_JSON=$(printf '%s\n' "$RAW_COMMENTS" \
              | jq -s --arg author "$SKEPTIC_BOT_AUTHOR" \
                --arg tu "$TRIGGER_UPDATED" --arg ts "$TRIGGER_SHA" \
                --arg request "$REQUEST_ID" \
                --arg need_request_id "$NEED_REQUEST_ID" \
                'add
                | map(. + {verdict: (try (.body | capture("^[ \\t]*(?:> ?)?(?:#{1,6}[ \\t]*)?(?:\\*{1,2})?VERDICT:[ \\t]*(?<verdict>PASS|FAIL|SKIPPED)(?:\\*{1,2})?[ \\t]*(?:[-—:].*)?$"; "im").verdict | ascii_upcase) catch "")})
                | map(select(
                    ((.user.login == $author) or (.user.login == "github-actions[bot]"))
                    and (.body | test("<!--\\s*skeptic-agent-verdict\\s*-->"; "i"))
                    and (.body | test("VERDICT:"; "i"))
                    and (((.updated_at // "") | if test("\\.[0-9]+Z$") then sub("\\.[0-9]+Z$"; "Z") else . end)
                         >= ($tu | if test("\\.[0-9]+Z$") then sub("\\.[0-9]+Z$"; "Z") else . end))
                    and (.body | test("skeptic-gate-trigger-" + $ts; "i"))
                    and (if $need_request_id == "true"
                         # Accept verdicts from ao skeptic verify (no request-id marker)
                         # and verdicts with any gate- request-id marker (GHA format).
                         then (.body | test("<!--\\s*skeptic-request-id-[^>]*-->"; "i") | not)
                         or (.body | test("<!--\\s*skeptic-request-id-gate-[a-zA-Z0-9_-]+\\s*-->"; "i"))
                         else true end)
                    and (.body | test("<!--\\s*skeptic-head-sha-" + $ts + "\\s*-->"; "i"))
                    and (.body as $body |
                      ($body | test("(^|\\n)[[:space:]>#*]*VERDICT:[[:space:]]*(FAIL|SKIPPED)([[:space:][:punct:]]|$)"; "i"))
                      or (
                        ($body | test("(^|\\n)[[:space:]>#*]*VERDICT:[[:space:]]*PASS([[:space:][:punct:]]|$)"; "i"))
                        and all(range(1; 9); . as $gate | $body | test("<!--\\s*skeptic-gate-" + ($gate | tostring) + "\\s*:\\s*PASS\\s*-->"; "i"))
                      )
                      and ($body | test("<!--\\s*skeptic-agent-verdict\\s*-->"; "i"))
                      and (.verdict != "")
                      and (((.updated_at // "") | if test("\\.[0-9]+Z$") then sub("\\.[0-9]+Z$"; "Z") else . end)
                           >= ($tu | if test("\\.[0-9]+Z$") then sub("\\.[0-9]+Z$"; "Z") else . end))
                      and ($body | test("skeptic-gate-trigger-" + $ts; "i"))
                      and ($body | test("<!--\\s*skeptic-request-id-" + $request + "\\s*-->"; "i"))
                      and ($body | test("<!--\\s*skeptic-head-sha-" + $ts + "\\s*-->"; "i"))
                      and ((.verdict != "PASS")
                           or (all(range(1;9); . as $gate | ($body | test("<!--\\s*skeptic-gate-" + ($gate | tostring) + "\\s*:\\s*PASS\\s*-->"; "i"))))))
                  ))
                | last // empty' 2>/dev/null)
            JQ_EXIT=$?
            if [ "$JQ_EXIT" -ne 0 ]; then
              COMMENTS_API_FAILURES=$((COMMENTS_API_FAILURES + 1))
              echo "API warning: verdict parsing failed (exit=$JQ_EXIT, attempt $i)"
              if [ "$COMMENTS_API_FAILURES" -ge 3 ]; then
                echo "ERROR: Too many consecutive verdict comment parse failures" >&2
                exit 1
              fi
              echo "Attempt $i/$MAX_ATTEMPTS — sleeping ${INTERVAL}s..."
              sleep "$INTERVAL"
              continue
            fi
            COMMENTS_API_FAILURES=0
            if [ -z "$VERDICT_JSON" ]; then
              VERDICT_JSON="empty"
            fi

            if ! echo "$VERDICT_JSON" | jq -e 'if . == null or (.body == null) then empty else .body end | length > 0' >/dev/null 2>&1; then
              echo "Attempt $i/$MAX_ATTEMPTS — no fresh VERDICT yet, sleeping ${INTERVAL}s..."
              sleep "$INTERVAL"
              continue
            fi

            VERDICT_BODY=$(echo "$VERDICT_JSON" | jq -r '.body')
            VERDICT_CREATED=$(echo "$VERDICT_JSON" | jq -r '.updated_at')
            echo ""
            echo "=== Found VERDICT (posted $VERDICT_CREATED) ==="
            echo "$VERDICT_BODY"

            BLOCKING_VERDICT=$(
              printf '%s\n' "$VERDICT_BODY" \
                | grep -Ei '^[[:space:]>#*]*VERDICT:[[:space:]]*(FAIL|SKIPPED)([[:space:][:punct:]]|$)' \
                | grep -m 1 \
                | awk '{
                    line=$0
                    sub(/^[[:space:]>#*]*/, "", line)
                    sub(/^VERDICT:[[:space:]]*/, "", line)
                    split(line, parts, /[^A-Za-z]+/)
                    print toupper(parts[1])
                  }'
            )
            if [ -n "$BLOCKING_VERDICT" ]; then
              VERDICT="$BLOCKING_VERDICT"
            else
              VERDICT=$(
                printf '%s\n' "$VERDICT_BODY" \
                  | grep -Ei '^[[:space:]>#*]*VERDICT:[[:space:]]*PASS([[:space:][:punct:]]|$)' \
                  | grep -m 1 \
                  | awk '{
                      line=$0
                      sub(/^[[:space:]>#*]*/, "", line)
                      sub(/^VERDICT:[[:space:]]*/, "", line)
                      split(line, parts, /[^A-Za-z]+/)
                      print toupper(parts[1])
                    }'
              )
            fi

            if [ "$VERDICT" = "PASS" ]; then
              echo "=== SKEPTIC GATE: PASS ==="
              exit 0
            elif [ "$VERDICT" = "FAIL" ]; then
              echo "=== SKEPTIC GATE: FAIL ==="
              exit 1
            elif [ "$VERDICT" = "SKIPPED" ]; then
              echo "=== SKEPTIC GATE: SKIPPED (fail closed) ==="
              exit 1
            else
              echo "WARNING: VERDICT body is malformed — sleeping ${INTERVAL}s before retry"
              sleep "$INTERVAL"
              continue
            fi
          done

          echo "TIMEOUT: No fresh VERDICT after $((MAX_ATTEMPTS * INTERVAL / 60)) minutes" >&2
          echo "::error::Skeptic Gate timed out waiting for VERDICT — failing closed" >&2
          exit 1
