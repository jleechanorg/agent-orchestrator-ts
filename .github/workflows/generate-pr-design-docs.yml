name: Generate PR Design Docs

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Do not run concurrently on the same PR — design doc generation is idempotent
concurrency:
  group: design-doc-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  generate-design-doc:
    name: Generate Design Doc
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit design docs to the PR branch
      pull-requests: write # needed to post PR comment
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          # For fork PRs, head.repo.full_name differs from github.repository.
          # Set repository so actions/checkout can fetch the branch from the fork.
          # For same-repo PRs this equals github.repository — checkout still works.
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install gh CLI
        run: npm install -g gh

      - name: Authenticate gh CLI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh auth status || gh auth login --token "$GITHUB_TOKEN"

      - name: Generate design doc for this PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          echo "Generating design doc for PR #${PR_NUM} ..."

          # Run the generator in single-PR mode
          node scripts/generate-pr-design-docs.mjs \
            --repo="$REPO" \
            --single-pr="$PR_NUM" \
            --force

          MD_FILE="docs/design/pr-designs/pr-${PR_NUM}.md"
          HTML_FILE="docs/design/pr-designs/pr-${PR_NUM}.html"

          if [ -f "$MD_FILE" ]; then
            echo "✅ Design doc generated: $MD_FILE"
          else
            echo "❌ Design doc not found after generation: $MD_FILE"
            exit 1
          fi

      - name: Commit design docs to PR branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          MD_FILE="docs/design/pr-designs/pr-${PR_NUM}.md"
          HTML_FILE="docs/design/pr-designs/pr-${PR_NUM}.html"

          # Check if there are changes to commit
          # Note: git diff --quiet only checks tracked files; use git status --porcelain
          # to also detect newly created (untracked) design doc files.
          if git status --porcelain "$MD_FILE" "$HTML_FILE" | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "$MD_FILE" "$HTML_FILE"
            git commit -m "[agento] docs: add design doc for PR #${PR_NUM}

Generated by generate-pr-design-docs.yml workflow
Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
            git push origin "${{ github.event.pull_request.head.ref }}"
            echo "✅ Design docs committed to PR branch"
          else
            echo "No design doc changes to commit — doc already up to date."
          fi

      - name: Post confirmation comment on PR
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          gh pr comment "$PR_NUM" \
            --repo "${{ github.repository }}" \
            --body "## Design Doc Generated

Design documentation has been generated for this PR and committed to the branch.

You can view the design doc here:
\`docs/design/pr-designs/pr-${PR_NUM}.md\`

_Skippet agent will review this PR against the design doc as part of the skeptic gate._"
            || echo "WARN: Could not post PR comment (may lack permissions)"
