name: Generate PR Design Docs

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Skip PR #231 — design doc already generated; preventing further auto-commits
# to avoid CR re-review loops while this PR is under review.
# Remove this condition after PR #231 is merged.
if: github.event.pull_request.number != 231

# Do not run concurrently on the same PR — design doc generation is idempotent
concurrency:
  group: design-doc-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  generate-design-doc:
    name: Generate Design Doc
    runs-on: ubuntu-latest
    # Skip for fork PRs — head branches live in the fork repo; GITHUB_TOKEN
    # from a fork_PR event only has read access, so we cannot push design docs.
    # Also skip runs triggered by our own bot commits to avoid regenerate loops.
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'github-actions[bot]'
    permissions:
      contents: write   # needed to commit design docs to the PR branch
      pull-requests: write # needed to post PR comment
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Generate design doc for this PR
        env:
          # GITHUB_TOKEN is pre-authenticated in Actions and works for gh api/gh pr
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          echo "Generating design doc for PR #${PR_NUM} ..."

          # Run the generator in single-PR mode
          node scripts/generate-pr-design-docs.mjs \
            --repo="$REPO" \
            --single-pr="$PR_NUM" \
            --force

          MD_FILE="docs/design/pr-designs/pr-${PR_NUM}.md"
          HTML_FILE="docs/design/pr-designs/pr-${PR_NUM}.html"

          # Verify both output files were generated
          if [ -f "$MD_FILE" ] && [ -f "$HTML_FILE" ]; then
            echo "✅ Design docs generated: $MD_FILE and $HTML_FILE"
          else
            if [ ! -f "$MD_FILE" ]; then
              echo "❌ Design doc Markdown not found: $MD_FILE"
            fi
            if [ ! -f "$HTML_FILE" ]; then
              echo "❌ Design doc HTML not found: $HTML_FILE"
            fi
            exit 1
          fi

      - name: Commit design docs to PR branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          MD_FILE="docs/design/pr-designs/pr-${PR_NUM}.md"
          HTML_FILE="docs/design/pr-designs/pr-${PR_NUM}.html"

          # Check if there are changes to commit
          # Use git status --porcelain to detect both tracked changes AND untracked files
          if [ -n "$(git status --porcelain -- "$MD_FILE" "$HTML_FILE")" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "$MD_FILE" "$HTML_FILE"
            COMMIT_MSG="[agento] docs: add design doc for PR #${PR_NUM}"
            git commit -m "$COMMIT_MSG" -m "Generated by generate-pr-design-docs.yml workflow" -m "Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
            git push origin "$PR_HEAD_REF"
            echo "✅ Design docs committed to PR branch"
          else
            echo "No design doc changes to commit — doc already up to date."
          fi

      - name: Post confirmation comment on PR
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          BODY_FILE=$(mktemp)
          printf '%s\n' \
            "## Design Doc Generated" \
            "" \
            "Design documentation has been generated for this PR and committed to the branch." \
            "" \
            "You can view the design doc here:" \
            "\`docs/design/pr-designs/pr-${PR_NUM}.md\`" \
            "" \
            "_The Skeptic agent will review this PR against the design doc as part of the skeptic gate._" \
            > "$BODY_FILE"
          gh pr comment "$PR_NUM" \
            --repo "${{ github.repository }}" \
            --body-file "$BODY_FILE" \
            || echo "WARN: Could not post PR comment (may lack permissions)"
          rm -f "$BODY_FILE"
# trigger CI
