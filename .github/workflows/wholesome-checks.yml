name: Wholesome Checks

# "Multiple shots on goal" — structural CI assertions supplementing runtime hooks.
# Asserts invariants on code structure and PR metadata rather than just behavior.
# Runs on every PR push; failures block merge when required checks are enabled.

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: wholesome-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read    # needed for git history and diff operations
  pull-requests: read  # needed for gh CLI to fetch PR title

jobs:
  wholesome:
    name: Wholesome Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history for merge-base computation

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run wholesome tests
        env:
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_HEAD_REF:   ${{ github.head_ref }}
          # GITHUB_BASE_REF is the PR target branch (e.g. main) — used as the base
          # for diff and commit checks; avoids false positives on fork PRs where
          # origin/main differs from the actual PR base.
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: pnpm --filter @jleechanorg/ao-core test -- --reporter verbose src/__tests__/wholesome.test.ts
