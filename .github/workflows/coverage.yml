name: PR Diff Coverage

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect changed packages
    runs-on: ${{ vars.SELF_HOSTED_DISABLED == 'true' && 'ubuntu-latest'
              || (github.event.pull_request.head.repo.fork && github.event_name == 'pull_request'
                  && 'ubuntu-latest'
                  || fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","Linux","ARM64","agent-orchestrator"]')) }}
    outputs:
      core: ${{ steps.filter.outputs.core }}
      cli: ${{ steps.filter.outputs.cli }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core:
              - 'packages/core/**'
            cli:
              - 'packages/cli/**'

  diff-coverage:
    name: Diff Coverage (70% on changed code)
    needs: detect-changes
    if: needs.detect-changes.outputs.core == 'true' || needs.detect-changes.outputs.cli == 'true'
    runs-on: ${{ vars.SELF_HOSTED_DISABLED == 'true' && 'ubuntu-latest'
              || (github.event.pull_request.head.repo.fork && github.event_name == 'pull_request'
                  && 'ubuntu-latest'
                  || fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","Linux","ARM64","agent-orchestrator"]')) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/setup-python@v5
        id: setup-python
        with:
          python-version: "3.12"

      - name: Install diff-cover
        run: |
          python3 -m pip install --break-system-packages --upgrade pip setuptools wheel
          python3 -m pip install --break-system-packages diff-cover pyyaml
          python3 -c "import yaml; print('pyyaml version:', yaml.__version__)"

      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build

      - name: Ensure base branch ref is available
        run: |
          git fetch origin ${{ github.base_ref }}:${{ github.base_ref }}
          git branch main origin/main || true

      - name: Clean up stale lock files
        run: rm -f /tmp/ao-start-all.lock /tmp/ao-start-all-*.lock

      - name: Set Python path for scripts
        run: echo "PYTHON_BIN=$(python3 -c 'import sysconfig; print(sysconfig.get_path("scripts"))')/python3" >> $GITHUB_ENV && echo "PATH=$(python3 -c 'import sysconfig; print(sysconfig.get_path("scripts"))'):$PATH" >> $GITHUB_ENV

      - name: Core tests with coverage
        if: needs.detect-changes.outputs.core == 'true'
        run: pnpm --filter @jleechanorg/ao-core exec vitest run --coverage --coverage.reporter=lcov --coverage.include='src/**/*.ts' --coverage.exclude='src/__tests__/**,src/index.ts,src/recovery/index.ts'

      - name: CLI tests with coverage
        if: needs.detect-changes.outputs.cli == 'true'
        run: pnpm --filter @jleechanorg/ao-cli exec vitest run --coverage --coverage.reporter=lcov --coverage.include='src/lib/llm-eval.ts' --coverage.exclude='**/__tests__/**' -- __tests__/lib/llm-eval.test.ts __tests__/lib/llm-eval.claude.test.ts __tests__/lib/llm-eval.gemini.test.ts

      - name: Prepare and merge lcov reports
        run: |
          mkdir -p combined-coverage
          touch combined-coverage/lcov.info

          if [ -f packages/core/coverage/lcov.info ]; then
            sed 's|^SF:|SF:packages/core/|' packages/core/coverage/lcov.info >> combined-coverage/lcov.info
          fi
          if [ -f packages/cli/coverage/lcov.info ]; then
            sed 's|^SF:|SF:packages/cli/|' packages/cli/coverage/lcov.info >> combined-coverage/lcov.info
          fi

      - name: Check diff coverage (80% on changed lines)
        run: |
          diff-cover combined-coverage/lcov.info \
            --compare-branch=origin/${{ github.base_ref }} \
            --fail-under=70 \
            --diff-range-notation='...'
