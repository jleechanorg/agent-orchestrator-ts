name: PR Diff Coverage

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-context:
    name: Resolve PR context
    runs-on: ${{ vars.SELF_HOSTED_DISABLED == 'true' && 'ubuntu-latest'
              || (github.event.pull_request.head.repo.fork && github.event_name == 'pull_request'
                  && 'ubuntu-latest'
                  || fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","Linux","ARM64","agent-orchestrator"]')) }}
    permissions:
      contents: read
      pull-requests: read
    outputs:
      base_ref: ${{ steps.pr-context.outputs.base_ref }}
      pr_number: ${{ steps.pr-context.outputs.pr_number }}
      head_sha: ${{ steps.pr-context.outputs.head_sha }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve PR context
        id: pr-context
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/resolve-pr-context.sh

  detect-changes:
    name: Detect changed packages
    needs: [pr-context]
    runs-on: ${{ vars.SELF_HOSTED_DISABLED == 'true' && 'ubuntu-latest'
              || (github.event.pull_request.head.repo.fork && github.event_name == 'pull_request'
                  && 'ubuntu-latest'
                  || fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","Linux","ARM64","agent-orchestrator"]')) }}
    outputs:
      core: ${{ steps.filter.outputs.core }}
      cli: ${{ steps.filter.outputs.cli }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ needs.pr-context.outputs.base_ref }}
          ref: ${{ needs.pr-context.outputs.head_sha }}
          filters: |
            core:
              - 'packages/core/**'
            cli:
              - 'packages/cli/**'

  diff-coverage:
    name: Diff Coverage (70% on changed code)
    needs: [pr-context, detect-changes]
    if: needs.detect-changes.outputs.core == 'true' || needs.detect-changes.outputs.cli == 'true'
    timeout-minutes: 15
    runs-on: ${{ vars.SELF_HOSTED_DISABLED == 'true' && 'ubuntu-latest'
              || (github.event.pull_request.head.repo.fork && github.event_name == 'pull_request'
                  && 'ubuntu-latest'
                  || fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","Linux","ARM64","agent-orchestrator"]')) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Python (Linux)
        if: runner.os != 'macOS'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Python (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install python@3.12 2>/dev/null || true
          python3.12 --version || python3 --version

      - name: Install diff-cover
        run: |
          python3 -m pip install --break-system-packages --upgrade pip setuptools wheel 2>/dev/null || python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install --break-system-packages diff-cover pyyaml 2>/dev/null || python3 -m pip install diff-cover pyyaml
          python3 -c "import yaml; print('pyyaml version:', yaml.__version__)"

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter '@jleechanorg/ao-core' build
      - run: pnpm -r build

      - name: Ensure base branch ref is available
        run: |
          # Re-establish auth header in case the self-hosted runner cleaned it up
          git config --local "http.https://github.com/.extraheader" "Authorization: basic $(echo -n "x-access-token:${{ github.token }}" | base64)" 2>/dev/null || true
          if git fetch origin "${{ needs.pr-context.outputs.base_ref }}":"${{ needs.pr-context.outputs.base_ref }}"; then
            git branch "${{ needs.pr-context.outputs.base_ref }}" "origin/${{ needs.pr-context.outputs.base_ref }}" 2>/dev/null || true
            echo "COMPARE_REF=origin/${{ needs.pr-context.outputs.base_ref }}" >> "$GITHUB_ENV"
          else
            echo "Base branch fetch failed (network issue) — coverage diff will fall back to origin/main"
            git fetch origin main || true
            git branch "${{ needs.pr-context.outputs.base_ref }}" "origin/main" 2>/dev/null || true
            echo "COMPARE_REF=origin/main" >> "$GITHUB_ENV"
          fi

      - name: Clean up stale lock files
        run: rm -f /tmp/ao-start-all.lock /tmp/ao-start-all-*.lock

      - name: Set Python path for scripts
        run: echo "PYTHON_BIN=$(python3 -c 'import sysconfig; print(sysconfig.get_path("scripts"))')/python3" >> $GITHUB_ENV && echo "PATH=$(python3 -c 'import sysconfig; print(sysconfig.get_path("scripts"))'):$PATH" >> $GITHUB_ENV

      - name: Core tests with coverage
        if: needs.detect-changes.outputs.core == 'true'
        run: pnpm --filter @jleechanorg/ao-core exec vitest run --coverage --coverage.reporter=lcov --coverage.include='src/**/*.ts' --coverage.exclude='src/__tests__/**,src/index.ts,src/recovery/index.ts'

      - name: CLI tests with coverage
        if: needs.detect-changes.outputs.cli == 'true'
        working-directory: packages/cli
        run: npx vitest run --coverage --coverage.reporter=lcov --coverage.include='src/lib/llm-eval.ts,src/lib/web-dir.ts' --coverage.exclude='**/__tests__/**' __tests__/lib/llm-eval.test.ts __tests__/lib/llm-eval.claude.test.ts __tests__/lib/llm-eval.gemini.test.ts __tests__/lib/web-dir.test.ts

      - name: Prepare and merge lcov reports
        run: |
          mkdir -p combined-coverage
          touch combined-coverage/lcov.info

          if [ -f packages/core/coverage/lcov.info ]; then
            sed 's|^SF:|SF:packages/core/|' packages/core/coverage/lcov.info >> combined-coverage/lcov.info
          fi
          if [ -f packages/cli/coverage/lcov.info ]; then
            sed 's|^SF:|SF:packages/cli/|' packages/cli/coverage/lcov.info >> combined-coverage/lcov.info
          fi

      - name: Check diff coverage (80% on changed lines)
        run: |
          diff-cover combined-coverage/lcov.info \
            --compare-branch=${{ env.COMPARE_REF || format('origin/{0}', needs.pr-context.outputs.base_ref) }} \
            --fail-under=70 \
            --diff-range-notation='...' \
            --exclude '.*\.sh' '^scripts/.*'
