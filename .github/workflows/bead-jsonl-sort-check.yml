name: bead-jsonl-sort

# Companion to bead-pr-lint: catches wholesale JSONL re-sorts in PR diffs
# (worldai PR #7848 showed +1683/-1682 noise on an unrelated PR because
# the JSONL was re-sorted by a different br version).
# Same shape as worldai.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check-sort:
    name: .beads/issues.jsonl sorted by id
    # SECURITY: Fork-aware runner selection — do not simplify. See PR #273.
    runs-on: ${{ vars.SELF_HOSTED_DISABLED == 'true' && 'ubuntu-latest'
              || (github.event.pull_request.head.repo.fork && github.event_name == 'pull_request'
                  && 'ubuntu-latest'
                  || fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","Linux","ARM64","agent-orchestrator"]')) }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55  # v5.5.0
        with:
          python-version: "3.13"
      - name: Check JSONL sort order
        run: python3 scripts/check_bead_jsonl_sort.py
