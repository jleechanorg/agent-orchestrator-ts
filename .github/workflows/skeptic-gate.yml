name: Skeptic Gate

on:
  pull_request:
    types: [opened, synchronize, edited, reopened]
  issue_comment:
    types: [created]

concurrency:
  group: skeptic-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  skeptic_gate:
    name: Skeptic Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
    steps:
      - uses: actions/checkout@v4

      - name: Resolve skeptic verdict from existing PR comments
        id: verdict
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
        set -euo pipefail
        PR=${{ github.event.pull_request.number }}

        # Accept either AO worker bot or workflow bot comments.
        # Match either marker-based comment or explicit VERDICT line.
        COMMENTS=$(gh api repos/${{ github.repository }}/issues/$PR/comments --paginate)

        VERDICT=$(echo "$COMMENTS" | jq -s 'add' | jq -r '
          [.[]
            | select(
                (.user.login == "jleechan-agent[bot]" or .user.login == "github-actions[bot]")
                and (
                  (.body | test("<!-- skeptic-agent-verdict -->"; "i"))
                  or
                  (.body | test("VERDICT:"; "i"))
                )
              )
          ]
          | sort_by(.created_at)
          | reverse
          | .[0].body // ""
        ')

        if echo "$VERDICT" | grep -qi "VERDICT:[[:space:]]*PASS"; then
          echo "verdict=PASS" >> "$GITHUB_OUTPUT"
          echo "Skeptic verdict PASS"
          exit 0
        fi

        if echo "$VERDICT" | grep -qi "VERDICT:[[:space:]]*FAIL"; then
          echo "verdict=FAIL" >> "$GITHUB_OUTPUT"
          echo "Skeptic verdict FAIL"
          exit 1
        fi

        # Fail closed if no verdict comment yet.
        echo "verdict=MISSING" >> "$GITHUB_OUTPUT"
        echo "No skeptic VERDICT comment found yet (expected AO worker verdict)."
        exit 1

      - name: Post gate status summary
        if: always()
        run: |
        echo "Skeptic gate result: ${{ steps.verdict.outputs.verdict }}"
