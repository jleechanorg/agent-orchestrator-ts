name: Skeptic Gate

# Deterministic 6-green check. No polling, no LLM evaluation.
# Checks gates 1-5 and posts a result comment on every run.
# Exit PASS when all gates pass, FAIL when any gate fails.
on:
  pull_request:
    types: [opened, synchronize, edited, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number"
        required: true
        type: string
      head_sha:
        description: "PR head commit SHA"
        required: true
        type: string

jobs:
  skeptic_gate:
    name: Skeptic Gate
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      contents: read
      checks: write
    steps:
      - name: Run 6-green gate checks
        id: gates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ github.event.inputs.pr_number || github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.inputs.head_sha || github.event.pull_request.head.sha }}
        run: |
          set +e
          PR_NUM=$PR_NUM
          FAILED_GATES=""
          GATE_ROWS=""

          # Resolve HEAD_SHA if not provided (workflow_dispatch may have stale value)
          if [ -z "$HEAD_SHA" ]; then
            HEAD_SHA=$(gh api repos/${{ github.repository }}/pulls/"$PR_NUM" --jq '.head.sha' 2>/dev/null || echo "")
          fi
          if [ -z "$HEAD_SHA" ]; then
            echo "ERROR: could not determine HEAD SHA for PR #$PR_NUM"
            exit 1
          fi
          echo "Checking PR #$PR_NUM at SHA ${HEAD_SHA:0:12}"

          # ----------------------------------------------------------------
          # Gate 1: CI green — all check runs and commit status must pass.
          # Exclude our own check (Skeptic Gate) to avoid self-reference.
          # ----------------------------------------------------------------
          CI_STATUS_JSON=$(gh api repos/${{ github.repository }}/commits/"$HEAD_SHA"/status \
            --jq '{state: .state, total: .total_count}' 2>/dev/null || echo '{"state":"error","total":0}')
          CI_STATUS=$(echo "$CI_STATUS_JSON" | jq -r '.state')
          CI_STATUS_TOTAL=$(echo "$CI_STATUS_JSON" | jq -r '.total')
          # When no commit status contexts exist (total_count=0), GitHub returns "pending".
          # This is a false negative — treat it as "success" since only check-runs matter.
          if [ "$CI_STATUS" = "pending" ] && [ "${CI_STATUS_TOTAL:-0}" -eq 0 ]; then
            CI_STATUS="success"
          fi
          # Also check GitHub check runs (Actions checks use check runs API, not commit status).
          # Multiple runs exist per check name (re-runs, concurrent triggers) — deduplicate
          # by keeping only the latest run per name (sort by started_at desc, take first).
          # Exclude: Skeptic Gate (self-reference), cancelled (superseded runs), skipped, neutral.
          # Gate 1: CI green — check only the 4 core CI job names.
          # Scoping prevents stuck self-hosted runners on unrelated PRs from
          # causing false negatives for this PR's CI gate.
          CHECK_RUNS_FAILED=$(gh api repos/${{ github.repository }}/commits/"$HEAD_SHA"/check-runs \
            --jq '[.check_runs | group_by(.name) | .[] | sort_by(.started_at) | reverse | .[0] | select((.name == "Lint" or .name == "Typecheck" or .name == "Test" or .name == "Test (Web)") and .conclusion != null and .conclusion != "success" and .conclusion != "skipped" and .conclusion != "neutral" and .conclusion != "cancelled")] | length' 2>/dev/null || echo "__API_ERROR__")
          CHECK_RUNS_PENDING=$(gh api repos/${{ github.repository }}/commits/"$HEAD_SHA"/check-runs \
            --jq '[.check_runs | group_by(.name) | .[] | sort_by(.started_at) | reverse | .[0] | select((.name == "Lint" or .name == "Typecheck" or .name == "Test" or .name == "Test (Web)") and .status != "completed")] | length' 2>/dev/null || echo "__API_ERROR__")

          # Count total CI check runs to detect "no CI registered yet".
          TOTAL_CHECKS=$(gh api repos/${{ github.repository }}/commits/"$HEAD_SHA"/check-runs \
            --jq '[.check_runs | group_by(.name) | .[] | sort_by(.started_at) | reverse | .[0] | select(.name == "Lint" or .name == "Typecheck" or .name == "Test" or .name == "Test (Web)")] | length' 2>/dev/null || echo "0")

          CI_DETAIL="commit-status=$CI_STATUS, failed-checks=${CHECK_RUNS_FAILED:-0}, pending-checks=${CHECK_RUNS_PENDING:-0}, total-checks=${TOTAL_CHECKS:-0}"

          # Only "success" passes. "pending" means no statuses exist or checks
          # are still running — both are NOT green. Never let pending pass.
          # Also fail when total non-Skeptic-Gate check runs == 0: CI hasn't registered yet.
          if [ "$CI_STATUS" = "success" ] && [ "${CHECK_RUNS_FAILED:-0}" -eq 0 ] && [ "${CHECK_RUNS_PENDING:-0}" -eq 0 ] && [ "${TOTAL_CHECKS:-0}" -gt 0 ]; then
            GATE1="PASS"
          else
            GATE1="FAIL"
            FAILED_GATES="${FAILED_GATES}1, "
            if [ "${CHECK_RUNS_FAILED:-0}" != "__API_ERROR__" ] && [ "${CHECK_RUNS_PENDING:-0}" != "__API_ERROR__" ] && [ "${CHECK_RUNS_PENDING:-0}" -gt 0 ]; then
              CI_DETAIL="${CI_DETAIL} (checks still running)"
            fi
          fi
          echo "Gate 1: $GATE1 ($CI_DETAIL)"
          GATE_ROWS="${GATE_ROWS}| 1. CI green | ${GATE1} | ${CI_DETAIL} |\n"

          # ----------------------------------------------------------------
          # Gate 2: No merge conflicts
          # ----------------------------------------------------------------
          PR_META=$(gh api repos/${{ github.repository }}/pulls/"$PR_NUM" \
            --jq '{mergeable: .mergeable, mergeable_state: .mergeable_state, merged: .merged}' 2>/dev/null)
          MERGEABLE=$(echo "$PR_META" | jq -r '.mergeable // "unknown"')
          MERGED_FLAG=$(echo "$PR_META" | jq -r '.merged // false')
          MERGEABLE_STATE=$(echo "$PR_META" | jq -r '.mergeable_state // "unknown"')

          if [ "$MERGED_FLAG" = "true" ]; then
            GATE2="PASS"
            GATE2_DETAIL="already merged"
          elif [ "$MERGEABLE" = "true" ]; then
            GATE2="PASS"
            GATE2_DETAIL="mergeable=$MERGEABLE, state=$MERGEABLE_STATE"
          else
            GATE2="FAIL"
            GATE2_DETAIL="mergeable=$MERGEABLE, state=$MERGEABLE_STATE"
            FAILED_GATES="${FAILED_GATES}2, "
          fi
          echo "Gate 2: $GATE2 ($GATE2_DETAIL)"
          GATE_ROWS="${GATE_ROWS}| 2. No conflicts | ${GATE2} | ${GATE2_DETAIL} |\n"

          # ----------------------------------------------------------------
          # Gate 3: CR APPROVED (latest CR review is APPROVED)
          # ----------------------------------------------------------------
          LATEST_CR=$(gh api repos/${{ github.repository }}/pulls/"$PR_NUM"/reviews \
            --jq '[.[] | select(.user.login == "coderabbitai[bot]" and (.state == "APPROVED" or .state == "CHANGES_REQUESTED"))] | sort_by(.submitted_at) | last | .state // "none"' \
            2>/dev/null || echo "none")
          LATEST_CR="${LATEST_CR:-none}"

          if [ "$LATEST_CR" = "APPROVED" ]; then
            GATE3="PASS"
          else
            GATE3="FAIL"
            FAILED_GATES="${FAILED_GATES}3, "
          fi
          GATE3_DETAIL="state=$LATEST_CR"
          echo "Gate 3: $GATE3 ($GATE3_DETAIL)"
          GATE_ROWS="${GATE_ROWS}| 3. CR approved | ${GATE3} | ${GATE3_DETAIL} |\n"

          # ----------------------------------------------------------------
          # Gate 4: Bugbot clean — use Cursor Bugbot check-run conclusion.
          # The check-run API is authoritative; text-scanning PR comments
          # for "error" produces false positives (review comments about
          # error handling match the pattern).
          # ----------------------------------------------------------------
          BUGBOT_CONCLUSION=$(gh api repos/${{ github.repository }}/commits/"$HEAD_SHA"/check-runs \
            --jq '[.check_runs[] | select(.name == "Cursor Bugbot")] | sort_by(.started_at) | reverse | .[0].conclusion // "none"' \
            2>/dev/null || echo "none")

          if [ "$BUGBOT_CONCLUSION" = "failure" ]; then
            GATE4="FAIL"
            FAILED_GATES="${FAILED_GATES}4, "
          else
            GATE4="PASS"
          fi
          GATE4_DETAIL="check-run=$BUGBOT_CONCLUSION"
          echo "Gate 4: $GATE4 ($GATE4_DETAIL)"
          GATE_ROWS="${GATE_ROWS}| 4. Bugbot clean | ${GATE4} | ${GATE4_DETAIL} |\n"

          # ----------------------------------------------------------------
          # Gate 5: Inline comments resolved (GraphQL — REST lacks isResolved)
          # ----------------------------------------------------------------
          PR_AUTHOR=$(gh api repos/${{ github.repository }}/pulls/"$PR_NUM" --jq '.user.login' 2>/dev/null || echo "")
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          GQL_RESULT=$(gh api graphql -f query='
            query($owner: String!, $name: String!, $number: Int!) {
              repository(owner: $owner, name: $name) {
                pullRequest(number: $number) {
                  reviewThreads(first: 100) {
                    pageInfo { hasNextPage }
                    nodes {
                      isResolved
                      comments(first: 50) {
                        pageInfo { hasNextPage }
                        nodes { author { login } body }
                      }
                    }
                  }
                }
              }
            }
          ' -f owner='${{ github.repository_owner }}' -f name="$REPO_NAME" -F number="$PR_NUM" 2>/dev/null)

          if [ -z "$GQL_RESULT" ]; then
            UNRESOLVED="__GQL_ERROR__"
          elif [ "$(echo "$GQL_RESULT" | jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.hasNextPage')" = "true" ] || \
               [ "$(echo "$GQL_RESULT" | jq -r '[.data.repository.pullRequest.reviewThreads.nodes[].comments.pageInfo.hasNextPage | select(. == true)] | length')" -gt 0 ]; then
            UNRESOLVED="__TRUNCATED__"
          else
            UNRESOLVED=$(echo "$GQL_RESULT" | jq -r "[.data.repository.pullRequest.reviewThreads.nodes[] | select(.isResolved == false) | .comments.nodes[] | select(.author.login != null and (.author.login | ascii_downcase) != (\"$PR_AUTHOR\" | ascii_downcase) and (.body | test(\"^\\\\s*(nit:|nitpick)\"; \"i\") | not))] | length")
          fi

          # Gate 5: Inline comments resolved
          # If CR has APPROVED, non-nit unresolved comments are non-blocking (CR
          # has already signed off despite the noise). Without CR APPROVED, unresolved
          # comments remain a hard failure (fail-closed).
          if [ "$LATEST_CR" = "APPROVED" ]; then
            GATE5="PASS"
            GATE5_DETAIL="n unresolved (CR approved — non-blocking)"
          elif [ "${UNRESOLVED:-0}" -gt 0 ]; then
            GATE5="FAIL"
            GATE5_DETAIL="${UNRESOLVED} unresolved"
            FAILED_GATES="${FAILED_GATES}5, "
          else
            GATE5="PASS"
            GATE5_DETAIL="all resolved"
          fi
          echo "Gate 5: $GATE5 ($GATE5_DETAIL)"
          GATE_ROWS="${GATE_ROWS}| 5. Comments resolved | ${GATE5} | ${GATE5_DETAIL} |\n"

          # ----------------------------------------------------------------
          # Build result
          # ----------------------------------------------------------------
          # Trim trailing ", " from FAILED_GATES
          FAILED_GATES=$(echo "$FAILED_GATES" | sed 's/, $//')

          if [ -z "$FAILED_GATES" ]; then
            OVERALL="PASS"
            RESULT_LINE="**Result: PASS** — all gates green"
          else
            OVERALL="FAIL"
            RESULT_LINE="**Result: FAIL** — gates ${FAILED_GATES} failed"
          fi

          echo "overall=$OVERALL" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"

          # Build the comment body
          COMMENT_BODY="## Skeptic Gate — Deterministic 6-Green Check

          | Gate | Result | Detail |
          |------|--------|--------|
          $(printf '%s' "$GATE_ROWS")

          ${RESULT_LINE}

          VERDICT: ${OVERALL}
          <!-- skeptic-gate-result-${HEAD_SHA} -->"

          # Remove leading whitespace from heredoc-style indentation
          COMMENT_BODY=$(echo "$COMMENT_BODY" | sed 's/^          //')

          echo "comment_body<<COMMENT_EOF" >> "$GITHUB_OUTPUT"
          echo "$COMMENT_BODY" >> "$GITHUB_OUTPUT"
          echo "COMMENT_EOF" >> "$GITHUB_OUTPUT"

      - name: Post gate results comment
        if: always()
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ github.event.inputs.pr_number || github.event.pull_request.number }}
          HEAD_SHA: ${{ steps.gates.outputs.head_sha }}
          COMMENT_BODY: ${{ steps.gates.outputs.comment_body }}
        run: |
          # Delete previous skeptic-gate-result comments to avoid clutter
          PREV_COMMENTS=$(gh api repos/${{ github.repository }}/issues/"$PR_NUM"/comments \
            --paginate \
            --jq '[.[] | select(.user.login == "github-actions[bot]" and (.body | test("skeptic-gate-result-"))) | .id]' 2>/dev/null || echo "[]")

          for CID in $(echo "$PREV_COMMENTS" | jq -r '.[]' 2>/dev/null); do
            gh api repos/${{ github.repository }}/issues/comments/"$CID" --method DELETE 2>/dev/null || true
          done

          # Post the new comment
          gh api repos/${{ github.repository }}/issues/"$PR_NUM"/comments \
            --field body="$COMMENT_BODY" \
            --jq '.id' > /dev/null 2>&1
          echo "Posted gate results comment on PR #$PR_NUM"

      - name: Set check result
        if: always()
        env:
          OVERALL: ${{ steps.gates.outputs.overall }}
        run: |
          if [ "$OVERALL" = "PASS" ]; then
            echo "Skeptic Gate: PASS"
            exit 0
          else
            echo "Skeptic Gate: FAIL"
            exit 1
          fi
