name: Skeptic Gate

on:
  pull_request:
    types: [opened, synchronize, edited, reopened]
  issue_comment:
    types: [created]

concurrency:
  group: skeptic-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  skeptic_gate:
    name: Skeptic Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/skeptic-setup

      - name: Run Skeptic
        id: run
        uses: ./.github/actions/skeptic-run
        with:
          pr_number: ${{ github.event.pull_request.number }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}

      - name: Post skeptic findings as PR comment
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ github.event.pull_request.number }}
          if [ -f skeptic-output.txt ]; then
            {
              printf '<!-- skeptic-agent-verdict -->\n'
              printf '%s\n' "**Skeptic Gate Evaluation**"
              printf '\n'
              printf '%s\n' "```"
              head -c 5800 skeptic-output.txt
              printf '\n%s\n' "```"
              VERDICT_LINE=$(grep -i "VERDICT:" skeptic-output.txt | tail -1 || echo "VERDICT: FAIL")
              printf '\n%s\n' "**$VERDICT_LINE**"
            } > "$RUNNER_TEMP/pr_comment.txt"
            gh api repos/${{ github.repository }}/issues/$PR/comments \
              --method POST \
              --field body="$(cat "$RUNNER_TEMP/pr_comment.txt")" \
              || echo "WARN: Could not post skeptic comment (may lack permissions)"
          fi

      - name: Gate result
        run: |
          VERDICT=${{ steps.run.outputs.verdict || 'UNKNOWN' }}
          echo "Skeptic gate verdict: $VERDICT"
          if [ "$VERDICT" = "PASS" ]; then exit 0; else exit 1; fi
