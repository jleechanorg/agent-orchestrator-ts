name: Skeptic Gate

on:
  pull_request:
    types: [opened, synchronize, edited, reopened]

concurrency:
  group: skeptic-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  skeptic_gate:
    name: Skeptic Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/skeptic-setup

      - name: Build all packages
        run: pnpm -r --filter '!@jleechanorg/ao-web' build
        shell: bash

      - name: Run Skeptic
        uses: ./.github/actions/skeptic-run
        with:
          pr_number: ${{ github.event.pull_request.number }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}

      - name: Post skeptic findings as PR comment
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f skeptic-output.txt ]; then
            {
              echo "## Skeptic Gate Findings"
              echo ""
              echo '```'
              head -c 5800 skeptic-output.txt
              echo ""
              echo '```'
              echo ""
              echo "_Skeptic gate ran on commit \`${GITHUB_SHA:0:7}\`_"
            } > "$RUNNER_TEMP/pr_comment.txt"
            # Post comment — fail the step if posting fails (bd-skp2: catch silent failures)
            gh pr comment ${{ github.event.pull_request.number }} \
              --body-file "$RUNNER_TEMP/pr_comment.txt" \
              || { echo "ERROR: Failed to post skeptic comment to PR" >&2; exit 1; }
          fi
